name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-unit:
    name: Platform abstraction unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # These tests are pure-logic (stdlib only) — no torch/whisper/flask/mlx
      # needed, so CI stays fast and green on both Linux and macOS.
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run cross-platform abstraction unit tests
        working-directory: backend
        run: |
          python -m pytest \
            tests/test_platform_backend.py \
            tests/test_ffmpeg_locate.py \
            tests/test_asr_profiles_platform.py \
            tests/test_qwen_venv_path.py \
            -v
