<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoTitle</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* ── Layout ─────────────────────────────────── */
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header overrides */
    .header select#profileSelect {
      max-width: 200px;
      font-size: 12px;
      padding: 3px 8px;
      height: 28px;
    }
    .header-spacer { flex: 1; }
    .header-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
    }
    .header-link:hover { background: var(--border); color: var(--text); }

    /* Main grid */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Left column ─────────────────────────────── */
    .left-col {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    /* Video wrap */
    .video-section {
      position: relative;
      background: #000;
      flex-shrink: 0;
      max-height: 240px;
      aspect-ratio: 16 / 9;
      width: 100%;
    }
    .video-section video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 12px;
    }
    .video-placeholder .vp-icon { font-size: 32px; opacity: 0.5; }

    /* Subtitle overlay on video */
    .subtitle-overlay {
      position: absolute;
      bottom: var(--preview-margin-bottom, 40px);
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    /* Playback strip */
    .playback-strip {
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .playback-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    .playback-btn:hover { background: var(--surface2); }
    .playback-timecode {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      color: var(--text-muted);
      flex: 1;
    }
    .playback-progress {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }
    .playback-progress-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
    }

    /* File zone = upload prompt + file list, full drag-drop target */
    .file-zone {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .file-zone.drag-over {
      background: rgba(108, 99, 255, 0.06);
      outline: 2px dashed var(--accent);
      outline-offset: -4px;
    }

    /* Upload prompt (shown when no files or always at top) */
    .upload-prompt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .upload-prompt:hover {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.05);
      color: var(--text);
    }
    .upload-prompt-icon { font-size: 20px; }
    .upload-prompt-text { flex: 1; }
    .upload-prompt-hint { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* ── File cards ──────────────────────────────── */
    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }
    .file-card.fc-active {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.06);
    }

    /* Row 1: icon + name + size + playing chip */
    .fc-row1 {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }
    .fc-icon { font-size: 16px; flex-shrink: 0; }
    .fc-name {
      flex: 1;
      min-width: 0;
      font-size: 12px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .fc-size {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .fc-playing-chip {
      display: none;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      background: rgba(108, 99, 255, 0.2);
      color: var(--accent2);
      border: 1px solid var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .fc-playing-chip.visible { display: inline-flex; }

    /* Row 2: pipeline dots */
    .fc-row2 {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Row 3: detail text */
    .fc-row3 {
      font-size: 11px;
      color: var(--text-muted);
      min-height: 14px;
    }

    /* Row 4: actions */
    .fc-row4 {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .fc-row4 .btn { font-size: 11px; padding: 3px 9px; height: auto; }

    /* Download dropdown wrapper */
    .fc-dl-wrap {
      position: relative;
      display: inline-block;
    }
    .fc-dl-menu {
      display: none;
      position: absolute;
      bottom: calc(100% + 4px);
      left: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      min-width: 100px;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .fc-dl-menu.open { display: block; }
    .fc-dl-item {
      display: block;
      width: 100%;
      padding: 5px 10px;
      font-size: 11px;
      text-align: left;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      border-radius: 4px;
      white-space: nowrap;
    }
    .fc-dl-item:hover { background: var(--surface2); }

    /* Overflow menu */
    .fc-overflow-wrap {
      position: relative;
      margin-left: auto;
    }
    .fc-overflow-menu {
      display: none;
      position: absolute;
      bottom: calc(100% + 4px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      min-width: 120px;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .fc-overflow-menu.open { display: block; }
    .fc-overflow-item {
      display: block;
      width: 100%;
      padding: 6px 10px;
      font-size: 11px;
      text-align: left;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      border-radius: 4px;
    }
    .fc-overflow-item:hover { background: var(--surface2); }
    .fc-overflow-item.danger { color: var(--danger); }
    .fc-overflow-item.danger:hover { background: rgba(239, 68, 68, 0.12); }

    /* Progress strip inside file card */
    .fc-progress {
      display: none;
      flex-direction: column;
      gap: 3px;
    }
    .fc-progress.visible { display: flex; }
    .fc-progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .fc-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .fc-progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ── Right column — Transcript ───────────────── */
    .right-col {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .transcript-header {
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
      background: var(--surface);
    }
    .transcript-header span { margin-left: auto; font-size: 11px; font-weight: 400; }
    .transcript-panel {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .transcript-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 12px;
      gap: 8px;
    }
    .transcript-empty .te-icon { font-size: 28px; opacity: 0.4; }
    .transcript-item {
      display: flex;
      gap: 8px;
      padding: 7px 8px;
      background: var(--surface2);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      border-left: 2px solid transparent;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .transcript-item.active {
      border-left-color: var(--accent);
      background: rgba(108, 99, 255, 0.1);
    }
    .transcript-time {
      color: var(--accent2);
      font-size: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: nowrap;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .transcript-text { flex: 1; }
    .transcript-zh { color: var(--text); }
    .transcript-en { color: var(--text-muted); font-size: 11px; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────── -->
<header class="header">
  <div class="logo">MoTitle</div>
  <label for="profileSelect" class="sr-only">Profile</label>
  <select id="profileSelect" title="切換 Profile">
    <option value="">載入中...</option>
  </select>
  <div class="header-spacer"></div>
  <a href="settings.html" class="header-link" title="設定">⚙</a>
</header>

<!-- ── Main grid ───────────────────────────────── -->
<div class="main-grid">

  <!-- ── Left column ─────────────────────────── -->
  <div class="left-col">

    <!-- Video -->
    <div class="video-section" id="videoSection">
      <div class="video-placeholder" id="videoPlaceholder">
        <div class="vp-icon">📹</div>
        <div>選擇文件以預覽</div>
      </div>
      <video id="videoPlayer" style="display:none;"></video>

      <!-- Subtitle overlay -->
      <div class="subtitle-overlay">
        <svg id="subtitleSvg"
             xmlns="http://www.w3.org/2000/svg"
             width="100%" height="60" overflow="visible">
          <text id="subtitleSvgText"
                x="50%" y="50"
                text-anchor="middle"
                font-weight="600"
                paint-order="stroke fill"
                stroke-linejoin="round"
                opacity="0"
                style="transition: opacity 0.3s ease;">
          </text>
        </svg>
      </div>
    </div>

    <!-- Playback strip -->
    <div class="playback-strip">
      <button class="playback-btn" id="playBtn" onclick="togglePlay()" title="播放/暫停">▶</button>
      <div class="playback-progress" id="playbackProgress" onclick="seekVideo(event)">
        <div class="playback-progress-fill" id="playbackFill"></div>
      </div>
      <span class="playback-timecode" id="timecode">--:--</span>
    </div>

    <!-- File zone: drag-drop target + upload prompt + file list -->
    <div class="file-zone" id="fileZone">
      <!-- Upload prompt -->
      <div class="upload-prompt" id="uploadPrompt" onclick="document.getElementById('fileInput').click()">
        <div class="upload-prompt-icon">⬆</div>
        <div class="upload-prompt-text">
          <div>拖放或點擊選擇文件</div>
          <div class="upload-prompt-hint">支持: MP4 · MXF · MOV · AVI · MKV · WebM · MP3 · WAV · M4A</div>
        </div>
      </div>
      <input type="file" id="fileInput" accept="video/*,audio/*,.mxf" style="display:none;" />

      <!-- File list rendered here -->
      <div id="fileList"></div>
    </div>

  </div><!-- /left-col -->

  <!-- ── Right column — Transcript ──────────── -->
  <div class="right-col">
    <div class="transcript-header">
      📄 轉錄文字
      <span id="segmentCount">0 段</span>
    </div>
    <div class="transcript-panel" id="transcriptPanel">
      <div class="transcript-empty" id="transcriptEmpty">
        <div class="te-icon">📝</div>
        <div>轉錄文字將顯示在這裡</div>
      </div>
    </div>
  </div>

</div><!-- /main-grid -->

<!-- Toast container -->
<div id="toastContainer" class="toast-container"></div>

<!-- Scripts -->
<script src="js/font-preview.js"></script>
<script src="js/shared.js"></script>
<script>
'use strict';

/* ══════════════════════════════════════════════════
   State
══════════════════════════════════════════════════ */
let socket = null;
let uploadedFiles = {};      // id → file object
let activeFileId  = null;    // file currently loaded in video player
let isTranscribing = false;
let segments = [];           // transcript segments for active file
let translations = {};       // fileId → array of translation objects
let fileProgress = {};       // fileId → { pct, eta, elapsed }

/* ══════════════════════════════════════════════════
   Profile dropdown
══════════════════════════════════════════════════ */
async function loadProfiles() {
  try {
    const [allRes, activeRes] = await Promise.all([
      fetch(`${API_BASE}/api/profiles`),
      fetch(`${API_BASE}/api/profiles/active`),
    ]);
    if (!allRes.ok || !activeRes.ok) throw new Error('profile fetch failed');
    const allData    = await allRes.json();
    const activeData = await activeRes.json();

    const profiles  = allData.profiles || [];
    const activeId  = activeData.profile?.id || null;
    const sel       = document.getElementById('profileSelect');

    sel.innerHTML = profiles.map(p =>
      `<option value="${escapeHtml(p.id)}"${p.id === activeId ? ' selected' : ''}>${escapeHtml(p.name)}</option>`
    ).join('');
    if (profiles.length === 0) sel.innerHTML = '<option value="">（無 Profile）</option>';
  } catch (err) {
    console.warn('[profiles] load failed:', err);
  }
}

document.getElementById('profileSelect').addEventListener('change', async function () {
  const id   = this.value;
  const prev = [...this.options].find(o => o.selected === false)?.value || '';
  if (!id) return;
  try {
    const res = await fetch(`${API_BASE}/api/profiles/${encodeURIComponent(id)}/activate`, { method: 'POST' });
    if (!res.ok) throw new Error((await res.json()).error || 'activate failed');
    showToast('Profile 已切換', 'success', 2000);
  } catch (err) {
    showToast(`切換失敗：${err.message}`, 'error');
    // Revert
    await loadProfiles();
  }
});

/* ══════════════════════════════════════════════════
   File upload & drag-drop
══════════════════════════════════════════════════ */
const fileZone   = document.getElementById('fileZone');
const fileInput  = document.getElementById('fileInput');

fileZone.addEventListener('dragover',  e => { e.preventDefault(); fileZone.classList.add('drag-over'); });
fileZone.addEventListener('dragleave', e => { if (!fileZone.contains(e.relatedTarget)) fileZone.classList.remove('drag-over'); });
fileZone.addEventListener('drop',      e => {
  e.preventDefault();
  fileZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
});
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) uploadFile(file);
  fileInput.value = '';
});

async function uploadFile(file) {
  if (isTranscribing) { showToast('轉錄進行中，請稍候', 'error'); return; }
  if (!socket?.id) { showToast('未連接伺服器', 'error'); return; }

  isTranscribing = true;
  const fd = new FormData();
  fd.append('file', file);
  fd.append('sid', socket.id);

  try {
    showToast(`上傳中：${file.name}`, 'info', 2000);
    const res = await fetch(`${API_BASE}/api/transcribe`, { method: 'POST', body: fd });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || `HTTP ${res.status}`);
    }
    // file_added socket event will update UI
  } catch (err) {
    isTranscribing = false;
    showToast(`上傳失敗：${err.message}`, 'error');
  }
}

/* ══════════════════════════════════════════════════
   File list rendering
══════════════════════════════════════════════════ */
function renderFileList() {
  const container = document.getElementById('fileList');
  const files = Object.values(uploadedFiles).sort((a, b) => b.uploaded_at - a.uploaded_at);

  if (files.length === 0) {
    container.innerHTML = '';
    return;
  }

  container.innerHTML = files.map(f => buildFileCard(f)).join('');
  // Wire events after DOM insertion
  files.forEach(f => wireFileCard(f.id));
}

function buildFileCard(f) {
  const id   = f.id;   // backend UUID — contains only [0-9a-f-], safe in HTML attributes
  const name = f.original_name || 'unknown';
  const size   = formatFileSize(f.size || 0);
  const status = f.status || 'pending';
  const tStat  = f.translation_status || 'pending';
  const segs   = f.segment_count || 0;
  const isActive = id === activeFileId;

  // Pipeline dot states
  const asrDone   = ['transcribed', 'translating', 'translated'].includes(status);
  const asrActive = status === 'transcribing';
  const asrError  = status === 'error';

  const transDone   = tStat === 'done';
  const transActive = tStat === 'translating';

  // Proofread = translation complete; Render = hidden until render triggered
  const proofDone = transDone;

  // Detail text
  let detail = '';
  if (status === 'transcribing') {
    const p = fileProgress[id];
    detail = p ? `轉錄中… ${p.pct}%` : '轉錄中…';
  } else if (asrError) {
    detail = '轉錄失敗';
  } else if (transDone) {
    detail = `${segs} 段 · 翻譯完成`;
  } else if (transActive) {
    const p = fileProgress[id];
    detail = p ? `翻譯中… ${p.pct}%` : '翻譯中…';
  } else if (asrDone) {
    detail = `${segs} 段 · 待翻譯`;
  } else {
    detail = segs > 0 ? `${segs} 段` : '待轉錄';
  }

  // Proofread button disabled unless translation complete
  const proofDisabled = !transDone ? 'disabled' : '';

  return `
<div class="file-card${isActive ? ' fc-active' : ''}" id="fc-${id}" data-id="${id}">

  <!-- Row 1: icon + name + size + playing chip -->
  <div class="fc-row1" onclick="loadMedia('${id}')">
    <span class="fc-icon">${name.match(/\.(mp4|mov|avi|mkv|webm|mxf)/i) ? '🎬' : '🎵'}</span>
    <span class="fc-name" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
    <span class="fc-size">${size}</span>
    <span class="fc-playing-chip${isActive ? ' visible' : ''}" id="fc-playing-${id}">▶ 播放中</span>
  </div>

  <!-- Row 2: pipeline dots -->
  <div class="fc-row2 pipeline-dots">
    <span class="pipeline-dot${asrDone ? ' done' : asrActive ? ' active' : asrError ? ' error' : ''}">ASR</span>
    <span class="pipeline-dot${transDone ? ' done' : transActive ? ' active' : asrDone && !asrError ? '' : ' hidden'}">翻譯</span>
    <span class="pipeline-dot${proofDone ? ' done' : transDone ? '' : ' hidden'}">校對</span>
    <span class="pipeline-dot hidden" id="fc-render-dot-${id}">渲染</span>
  </div>

  <!-- Row 3: detail -->
  <div class="fc-row3" id="fc-detail-${id}">${escapeHtml(detail)}</div>

  <!-- Progress strip (visible during transcription/translation) -->
  <div class="fc-progress${(asrActive || transActive) ? ' visible' : ''}" id="fc-progress-${id}">
    <div class="fc-progress-bar">
      <div class="fc-progress-fill" id="fc-fill-${id}" style="width:${fileProgress[id]?.pct || 0}%"></div>
    </div>
    <div class="fc-progress-meta">
      <span id="fc-pct-${id}">${fileProgress[id]?.pct || 0}%</span>
      <span id="fc-eta-${id}">${fileProgress[id]?.eta ? fileProgress[id].eta + 's' : ''}</span>
    </div>
  </div>

  <!-- Row 4: actions -->
  <div class="fc-row4">
    <button class="btn" onclick="navigateToProofread('${id}')" ${proofDisabled}>校對→</button>

    <div class="fc-dl-wrap" id="fc-dl-wrap-${id}">
      <button class="btn" onclick="toggleDlMenu('${id}', event)">下載↓</button>
      <div class="fc-dl-menu" id="fc-dl-menu-${id}">
        <button class="fc-dl-item" onclick="downloadSubtitle('${id}','srt')">SRT</button>
        <button class="fc-dl-item" onclick="downloadSubtitle('${id}','vtt')">VTT</button>
        <button class="fc-dl-item" onclick="downloadSubtitle('${id}','txt')">TXT</button>
      </div>
    </div>

    <div class="fc-overflow-wrap" id="fc-ov-wrap-${id}">
      <button class="btn btn-icon" onclick="toggleOverflowMenu('${id}', event)" title="更多">⋮</button>
      <div class="fc-overflow-menu" id="fc-ov-menu-${id}">
        <button class="fc-overflow-item" onclick="retranslate('${id}')">重新翻譯</button>
        <button class="fc-overflow-item danger" onclick="deleteFile('${id}')">刪除</button>
      </div>
    </div>
  </div>

</div>`;
}

function wireFileCard(id) {
  // No complex delegation needed — onclick attrs handle it
}

function updateFileCard(f) {
  const id   = f.id;
  const card = document.getElementById(`fc-${id}`);
  if (!card) {
    // Card doesn't exist yet — re-render entire list
    renderFileList();
    return;
  }
  // Re-build and replace
  const tmp = document.createElement('div');
  tmp.innerHTML = buildFileCard(f);
  const newCard = tmp.firstElementChild;
  card.replaceWith(newCard);
}

/* ══════════════════════════════════════════════════
   Dropdown menus (dl + overflow)
══════════════════════════════════════════════════ */
function toggleDlMenu(id, e) {
  e.stopPropagation();
  closeAllMenus();
  document.getElementById(`fc-dl-menu-${id}`)?.classList.toggle('open');
}
function toggleOverflowMenu(id, e) {
  e.stopPropagation();
  closeAllMenus();
  document.getElementById(`fc-ov-menu-${id}`)?.classList.toggle('open');
}
function closeAllMenus() {
  document.querySelectorAll('.fc-dl-menu.open, .fc-overflow-menu.open').forEach(m => m.classList.remove('open'));
}
document.addEventListener('click', closeAllMenus);

/* ══════════════════════════════════════════════════
   File actions
══════════════════════════════════════════════════ */
async function deleteFile(id) {
  closeAllMenus();
  if (!confirm('確定刪除此文件？')) return;
  try {
    const res = await fetch(`${API_BASE}/api/files/${encodeURIComponent(id)}`, { method: 'DELETE' });
    if (!res.ok) throw new Error((await res.json()).error || `HTTP ${res.status}`);
    delete uploadedFiles[id];
    if (activeFileId === id) {
      activeFileId = null;
      unloadVideo();
      clearTranscript();
    }
    renderFileList();
  } catch (err) {
    showToast(`刪除失敗：${err.message}`, 'error');
  }
}

async function retranslate(id) {
  closeAllMenus();
  if (!socket?.id) { showToast('未連接伺服器', 'error'); return; }
  try {
    const res = await fetch(`${API_BASE}/api/translate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file_id: id, sid: socket.id }),
    });
    if (!res.ok) throw new Error((await res.json()).error || `HTTP ${res.status}`);
    showToast('翻譯已開始', 'info', 2000);
  } catch (err) {
    showToast(`翻譯失敗：${err.message}`, 'error');
  }
}

function downloadSubtitle(id, fmt) {
  closeAllMenus();
  window.open(`${API_BASE}/api/files/${encodeURIComponent(id)}/subtitle.${fmt}`, '_blank');
}

function navigateToProofread(id) {
  // Save sessionStorage before navigate
  const fileZoneEl = document.getElementById('fileZone');
  const state = { scrollTop: fileZoneEl.scrollTop, selectedFileId: id };
  try { sessionStorage.setItem('motitle_state', JSON.stringify(state)); } catch (_) {}
  location.href = `proofread.html?file_id=${encodeURIComponent(id)}`;
}

/* ══════════════════════════════════════════════════
   Media loading
══════════════════════════════════════════════════ */
function loadMedia(id) {
  if (activeFileId === id) return;
  activeFileId = id;

  // Update playing chip
  document.querySelectorAll('.fc-playing-chip').forEach(c => c.classList.remove('visible'));
  document.querySelectorAll('.file-card').forEach(c => c.classList.remove('fc-active'));
  const chip = document.getElementById(`fc-playing-${id}`);
  if (chip) chip.classList.add('visible');
  const card = document.getElementById(`fc-${id}`);
  if (card) card.classList.add('fc-active');

  const video   = document.getElementById('videoPlayer');
  const ph      = document.getElementById('videoPlaceholder');
  video.src     = `${API_BASE}/api/files/${encodeURIComponent(id)}/media`;
  video.style.display = 'block';
  ph.style.display    = 'none';

  video.load();
  video.play().catch(() => {});

  // Load segments for transcript
  loadSegments(id);
}

function unloadVideo() {
  const video = document.getElementById('videoPlayer');
  const ph    = document.getElementById('videoPlaceholder');
  video.pause();
  video.src = '';
  video.style.display = 'none';
  ph.style.display    = 'flex';
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('playbackFill').style.width = '0%';
  document.getElementById('timecode').textContent = '--:--';
}

async function loadSegments(id) {
  clearTranscript();
  // Prefer translations if available
  const file = uploadedFiles[id];
  if (file && file.translation_status === 'done') {
    try {
      const res = await fetch(`${API_BASE}/api/files/${encodeURIComponent(id)}/translations`);
      if (res.ok) {
        const data = await res.json();
        const segs = data.translations || data;
        renderTranscript(segs.map(s => ({ id: s.id, start: s.start, end: s.end, text: s.zh_text || s.text, en_text: s.text })), true);
        return;
      }
    } catch (_) {}
  }
  // Fallback to EN segments
  try {
    const res = await fetch(`${API_BASE}/api/files/${encodeURIComponent(id)}/segments`);
    if (res.ok) {
      const data = await res.json();
      renderTranscript(data.segments || data, false);
    }
  } catch (err) {
    console.warn('[loadSegments]', err);
  }
}

/* ══════════════════════════════════════════════════
   Transcript
══════════════════════════════════════════════════ */
function clearTranscript() {
  segments = [];
  document.getElementById('transcriptPanel').innerHTML = `
    <div class="transcript-empty" id="transcriptEmpty">
      <div class="te-icon">📝</div>
      <div>轉錄文字將顯示在這裡</div>
    </div>`;
  document.getElementById('segmentCount').textContent = '0 段';
}

function renderTranscript(segs, isZh) {
  segments = segs;
  document.getElementById('segmentCount').textContent = `${segs.length} 段`;
  const panel = document.getElementById('transcriptPanel');
  if (segs.length === 0) {
    clearTranscript();
    return;
  }
  panel.innerHTML = segs.map(s => `
    <div class="transcript-item" id="ti-${s.id}" data-start="${s.start}" data-end="${s.end}">
      <span class="transcript-time">${formatTime(s.start)}</span>
      <div class="transcript-text">
        ${isZh ? `<div class="transcript-zh">${escapeHtml(s.text)}</div>` : ''}
        ${isZh && s.en_text ? `<div class="transcript-en">${escapeHtml(s.en_text)}</div>` : ''}
        ${!isZh ? `<div>${escapeHtml(s.text)}</div>` : ''}
      </div>
    </div>`).join('');
}

function appendTranscriptSegment(seg) {
  const empty = document.getElementById('transcriptEmpty');
  if (empty) empty.remove();

  const panel = document.getElementById('transcriptPanel');
  const div = document.createElement('div');
  div.className = 'transcript-item';
  div.id = `ti-${seg.id}`;
  div.dataset.start = seg.start;
  div.dataset.end   = seg.end;
  div.innerHTML = `
    <span class="transcript-time">${formatTime(seg.start)}</span>
    <div class="transcript-text">${escapeHtml(seg.text)}</div>`;
  panel.appendChild(div);

  segments.push(seg);
  document.getElementById('segmentCount').textContent = `${segments.length} 段`;
}

/* ══════════════════════════════════════════════════
   Video controls
══════════════════════════════════════════════════ */
const video = document.getElementById('videoPlayer');

function togglePlay() {
  if (!video.src) return;
  if (video.paused) { video.play(); } else { video.pause(); }
}
function seekVideo(e) {
  if (!video.src || !video.duration) return;
  const bar = document.getElementById('playbackProgress');
  const rect = bar.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  video.currentTime = pct * video.duration;
}

video.addEventListener('play',  () => { document.getElementById('playBtn').textContent = '⏸'; });
video.addEventListener('pause', () => { document.getElementById('playBtn').textContent = '▶'; });
video.addEventListener('ended', () => { document.getElementById('playBtn').textContent = '▶'; });

video.addEventListener('timeupdate', () => {
  const cur = video.currentTime;
  const dur = video.duration || 1;
  document.getElementById('playbackFill').style.width = `${(cur / dur) * 100}%`;
  document.getElementById('timecode').textContent = `${formatTime(cur)} / ${formatTime(dur)}`;

  // Subtitle overlay
  const activeSeg = segments.find(s => cur >= s.start && cur <= s.end);
  FontPreview.updateText(activeSeg ? activeSeg.text : '');

  // Highlight active transcript item
  document.querySelectorAll('.transcript-item').forEach(el => {
    const s = parseFloat(el.dataset.start);
    const e = parseFloat(el.dataset.end);
    el.classList.toggle('active', cur >= s && cur <= e);
  });
});

/* ══════════════════════════════════════════════════
   Fetch file list on load
══════════════════════════════════════════════════ */
async function fetchFileList() {
  try {
    const res = await fetch(`${API_BASE}/api/files`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data  = await res.json();
    const files = data.files || data;
    uploadedFiles = {};
    files.forEach(f => { uploadedFiles[f.id] = f; });
    renderFileList();
  } catch (err) {
    console.warn('[fetchFileList]', err);
  }
}

/* ══════════════════════════════════════════════════
   sessionStorage restore
══════════════════════════════════════════════════ */
function restoreSessionState() {
  try {
    const raw = sessionStorage.getItem('motitle_state');
    if (!raw) return;
    const state = JSON.parse(raw);
    sessionStorage.removeItem('motitle_state');

    const { scrollTop, selectedFileId } = state;
    if (selectedFileId && uploadedFiles[selectedFileId]) {
      loadMedia(selectedFileId);
    }
    if (scrollTop != null) {
      const fz = document.getElementById('fileZone');
      fz.scrollTop = scrollTop;
    }
  } catch (_) {}
}

/* ══════════════════════════════════════════════════
   Utility
══════════════════════════════════════════════════ */
function formatFileSize(bytes) {
  if (!bytes) return '—';
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
}

/* ══════════════════════════════════════════════════
   Socket handlers
══════════════════════════════════════════════════ */
socket = connectSocket({

  connected(data) {
    fetchFileList().then(() => {
      restoreSessionState();
    });
  },

  file_added(data) {
    const f = data.file || data;
    uploadedFiles[f.id] = f;
    renderFileList();
  },

  file_updated(data) {
    const f = data.file || data;
    if (!f || !f.id) return;
    // Merge into existing record
    uploadedFiles[f.id] = Object.assign({}, uploadedFiles[f.id] || {}, f);
    if (f.status && !['transcribing', 'translating'].includes(f.status)) {
      isTranscribing = false;
    }
    updateFileCard(uploadedFiles[f.id]);
    // Reload transcript panel when translation completes for the active file
    if (f.id === activeFileId && f.translation_status === 'done') {
      loadSegments(f.id);
    }
  },

  subtitle_segment(data) {
    if (!data) return;
    // If this segment's file isn't the active one, skip transcript update
    const fileId = data.file_id;

    // Update progress
    if (data.progress != null) {
      fileProgress[fileId] = Object.assign({}, fileProgress[fileId] || {}, {
        pct: Math.round(data.progress),
        eta: data.eta_seconds != null ? Math.round(data.eta_seconds) : null,
      });
      const fill = document.getElementById(`fc-fill-${fileId}`);
      const pct  = document.getElementById(`fc-pct-${fileId}`);
      const eta  = document.getElementById(`fc-eta-${fileId}`);
      if (fill) fill.style.width = `${fileProgress[fileId].pct}%`;
      if (pct)  pct.textContent  = `${fileProgress[fileId].pct}%`;
      if (eta)  eta.textContent  = fileProgress[fileId].eta != null ? `${fileProgress[fileId].eta}s` : '';

      // Show progress strip
      const prog = document.getElementById(`fc-progress-${fileId}`);
      if (prog) prog.classList.add('visible');
    }

    if (fileId === activeFileId) {
      appendTranscriptSegment({ id: data.id, start: data.start, end: data.end, text: data.text });
    }
  },

  transcription_complete(data) {
    isTranscribing = false;
    showToast(`轉錄完成：${data.segment_count || 0} 段`, 'success', 3000);
  },

  transcription_error(data) {
    isTranscribing = false;
    showToast(`轉錄失敗：${data.error || '未知錯誤'}`, 'error');
  },

  translation_progress(data) {
    if (!data || !data.file_id) return;
    const id = data.file_id;
    fileProgress[id] = Object.assign({}, fileProgress[id] || {}, {
      pct:     Math.round(data.percent || 0),
      elapsed: data.elapsed_seconds,
    });
    const fill = document.getElementById(`fc-fill-${id}`);
    const pct  = document.getElementById(`fc-pct-${id}`);
    if (fill) fill.style.width = `${fileProgress[id].pct}%`;
    if (pct)  pct.textContent  = `${fileProgress[id].pct}%`;

    // Show progress strip
    const prog = document.getElementById(`fc-progress-${id}`);
    if (prog) prog.classList.add('visible');
  },

  pipeline_timing(data) {
    if (!data) return;
    const parts = [];
    if (data.asr_seconds != null)         parts.push(`ASR ${data.asr_seconds.toFixed(1)}s`);
    if (data.translation_seconds != null) parts.push(`翻譯 ${data.translation_seconds.toFixed(1)}s`);
    if (data.total_seconds != null)       parts.push(`總計 ${data.total_seconds.toFixed(1)}s`);
    if (parts.length === 0) return;
    showToast(`⏱ ${parts.join(' · ')}`, 'info', 5000);
  },

}, {
  onConnect:    () => {},
  onDisconnect: () => {},
});

/* ══════════════════════════════════════════════════
   beforeunload guard
══════════════════════════════════════════════════ */
window.addEventListener('beforeunload', e => {
  if (isTranscribing) {
    e.preventDefault();
    e.returnValue = '轉錄進行中，確定離開？';
  }
});

/* ══════════════════════════════════════════════════
   Init
══════════════════════════════════════════════════ */
loadProfiles();
</script>
