<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoTitle — 術語表</title>
  <style>
    /* ============================================================
       Tokens — copied from frontend/index.html so the page matches
       the rest of the app without pulling a stylesheet.
       ============================================================ */
    :root {
      --bg:        #0a0a0f;
      --bg-soft:   #0f0f18;
      --surface:   #13131a;
      --surface-2: #1a1a24;
      --surface-3: #222232;
      --border:    #2a2a3d;
      --border-strong: #35354d;

      --text:      #e6e6f0;
      --text-mid:  #a8a8bf;
      --text-dim:  #6e6e85;

      --accent:       #6c63ff;
      --accent-2:     #a78bfa;
      --accent-soft:  rgba(108, 99, 255, 0.12);
      --accent-softer:rgba(108, 99, 255, 0.06);
      --accent-ring:  rgba(108, 99, 255, 0.35);

      --success: #22c55e;
      --warning: #f59e0b;
      --danger:  #ef4444;
      --info:    #38bdf8;

      --radius-sm: 6px;
      --radius:    10px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 0 rgba(255,255,255,0.03), 0 2px 8px rgba(0,0,0,0.25);
      --shadow:    0 12px 40px rgba(0,0,0,0.45);

      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei',
                 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-ui); font-size: 14px; line-height: 1.5;
      -webkit-font-smoothing: antialiased; letter-spacing: -0.005em;
      overflow: hidden;
    }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
    input, select, textarea { font: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    /* ============================================================
       Buttons (subset reused from index.html)
       ============================================================ */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 8px 14px;
      background: var(--surface-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; font-weight: 600;
      transition: background 0.12s, border-color 0.12s, transform 0.06s;
    }
    .btn:hover { border-color: var(--border-strong); background: var(--surface-3); }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5b52e0; border-color: #5b52e0; }
    .btn-secondary { background: var(--surface-2); color: var(--text); }
    .btn-ghost { background: transparent; color: var(--text-mid); border-color: transparent; }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

    /* ============================================================
       Layout shell + Rail (same icons as Dashboard / Proofread)
       ============================================================ */
    .bold {
      display: grid; grid-template-columns: 64px 1fr;
      height: 100vh; min-height: 0;
    }
    .b-rail {
      background: var(--bg-soft);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 0; gap: 8px;
    }
    .b-rail .mark {
      width: 36px; height: 36px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff; font-weight: 800; font-size: 15px;
      border-radius: 10px; margin-bottom: 10px;
    }
    .rail-btn {
      position: relative;
      width: 40px; height: 40px;
      display: grid; place-items: center;
      color: var(--text-dim); border-radius: 10px;
      font-size: 16px;
    }
    .rail-btn:hover { color: var(--text); background: var(--surface-2); }
    .rail-btn.on { color: var(--accent-2); background: var(--accent-soft); }
    .rail-btn.on::before {
      content: ""; position: absolute; left: -14px; top: 10px; bottom: 10px;
      width: 3px; background: var(--accent); border-radius: 2px;
    }
    .rail-btn .tt {
      position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%);
      background: var(--surface); color: var(--text);
      padding: 4px 10px; border-radius: 6px;
      font-size: 11px; white-space: nowrap;
      border: 1px solid var(--border);
      opacity: 0; pointer-events: none; transition: opacity .15s; z-index: 5;
    }
    .rail-btn:hover .tt { opacity: 1; }
    .b-rail .flex1 { flex: 1; }

    /* ============================================================
       Glossary shell (adapted from design's glossary-styles.css —
       mapped to project tokens).
       ============================================================ */
    .b-main { min-width: 0; min-height: 0; display: flex; flex-direction: column; }
    .gl-shell { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    .gl-header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 40;
    }
    /* Backend model health pills (restored). */
    .health-cluster { display: flex; align-items: center; gap: 6px; }
    .hpill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 9px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface-2); white-space: nowrap; }
    .hpill .led { width: 7px; height: 7px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }
    .hpill .hk { font-size: 9px; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-dim); }
    .hpill .hv { font-size: 10.5px; color: var(--text-mid); font-family: var(--font-mono); }
    @media (max-width: 1100px) { .hpill { display: none; } }
    .gl-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 600; color: var(--text-mid);
      cursor: pointer;
    }
    .gl-back:hover { background: var(--surface-3); border-color: var(--border-strong); color: var(--text); }
    .gl-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 700; color: var(--text);
    }
    .gl-title-sep { color: var(--text-dim); margin: 0 2px; }
    .gl-title-active {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 9px;
      background: color-mix(in srgb, var(--g-color, var(--accent-2)) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--g-color, var(--accent-2)) 30%, transparent);
      border-radius: 5px;
      color: var(--g-color, var(--accent-2));
      font-weight: 600;
    }
    .gl-vtabs { display: flex; gap: 2px; margin-left: auto; }
    .gl-vtab {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 9px;
      border-radius: 6px;
      color: var(--text-mid); font-size: 12px; font-weight: 600;
      background: transparent;
    }
    .gl-vtab:hover { background: var(--surface-2); color: var(--text); }
    .gl-vtab.on { background: var(--accent-soft); color: var(--accent-2); }
    .gl-vtab-letter {
      display: inline-grid; place-items: center;
      width: 16px; height: 16px;
      font-size: 10px; font-family: var(--font-mono); font-weight: 700;
      background: var(--surface-2); border-radius: 3px;
    }
    .gl-vtab.on .gl-vtab-letter { background: var(--accent); color: #fff; }

    .gl-body { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }

    /* Variant A — 3-pane editor */
    .gl-edit {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 360px;
      height: 100%; min-height: 0;
    }

    /* Left: glossary list */
    .gl-list {
      display: flex; flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      min-height: 0;
    }
    .gl-list-head {
      display: flex; align-items: center;
      padding: 14px 14px 8px;
    }
    .gl-list-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-dim); flex: 1;
    }
    .gl-icon-btn {
      width: 24px; height: 24px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--text-mid); border-radius: 5px;
    }
    .gl-icon-btn:hover { background: var(--surface-2); color: var(--text); }
    .gl-icon-btn.danger:hover { color: var(--danger); background: rgba(239,68,68,0.10); }

    .gl-list-search {
      display: flex; align-items: center; gap: 6px;
      margin: 0 12px 10px;
      padding: 6px 10px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .gl-list-search input {
      flex: 1; min-width: 0;
      background: transparent; border: 0; outline: 0;
      font-size: 12px; color: var(--text);
    }
    .gl-list-search input::placeholder { color: var(--text-dim); }

    .gl-list-items {
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 0 8px 8px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .gl-list-item {
      display: flex; flex-direction: column; gap: 4px;
      padding: 10px 12px;
      background: transparent; border: 1px solid transparent; border-radius: 8px;
      text-align: left; transition: background 0.1s;
    }
    .gl-list-item:hover { background: var(--surface-2); }
    .gl-list-item.active {
      background: color-mix(in srgb, var(--g-color, var(--accent-2)) 12%, transparent);
      border-color: color-mix(in srgb, var(--g-color, var(--accent-2)) 25%, transparent);
    }
    .gli-row { display: flex; align-items: center; gap: 8px; }
    .gli-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--g-color, var(--accent-2));
      flex-shrink: 0;
    }
    .gli-name {
      flex: 1; min-width: 0;
      font-size: 13px; font-weight: 600; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .gli-del {
      flex-shrink: 0; margin-left: 2px;
      width: 22px; height: 22px; line-height: 20px; text-align: center;
      border-radius: 6px; font-size: 13px; color: var(--text-dim);
      opacity: 0; cursor: pointer;
      transition: opacity 0.1s, background 0.1s, color 0.1s;
    }
    .gl-list-item:hover .gli-del,
    .gl-list-item.active .gli-del { opacity: 1; }
    .gli-del:hover { background: color-mix(in srgb, #e5484d 18%, transparent); color: #e5484d; }
    .gli-meta {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-mid); font-family: var(--font-mono);
    }
    .gli-list-empty {
      padding: 28px 14px;
      text-align: center;
      color: var(--text-dim); font-size: 12px;
    }
    .gl-list-foot {
      display: flex; gap: 6px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }
    .gl-list-foot .btn { flex: 1; font-size: 11px; padding: 6px 8px; }

    /* Middle: terms table */
    .gl-table-wrap {
      display: flex; flex-direction: column;
      min-width: 0; min-height: 0;
      background: var(--bg);
    }
    .gl-table-head {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .gl-search-big {
      display: flex; align-items: center; gap: 8px;
      flex: 1; min-width: 200px;
      padding: 8px 12px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 7px;
    }
    .gl-search-big input {
      flex: 1; min-width: 0;
      background: transparent; border: 0; outline: 0;
      font-size: 13px; color: var(--text);
    }
    .gl-search-big input::placeholder { color: var(--text-dim); }
    .gl-search-clr { color: var(--text-dim); font-size: 16px; padding: 0 4px; }
    .gl-sort {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-dim);
    }
    .gl-sort select {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 11px; color: var(--text);
    }

    .gl-table { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .gl-tr {
      display: grid;
      grid-template-columns: 1.6fr 1.6fr 110px;
      align-items: center; gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: transparent;
      text-align: left; width: 100%; color: var(--text);
    }
    .gl-tr.gl-th {
      background: var(--surface);
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-dim);
      cursor: default; padding: 8px 16px;
    }
    .gl-tr:not(.gl-th):hover { background: var(--surface-2); }
    .gl-tr.active {
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .gl-table-body { flex: 1; overflow-y: auto; min-height: 0; }
    .gl-td-source {
      font-size: 13px; font-weight: 600;
      display: flex; flex-direction: column; gap: 2px;
      overflow: hidden;
    }
    .gl-td-source > span:first-child {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .gl-alt {
      font-size: 11px; color: var(--text-dim); font-weight: 400;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .gl-td-target {
      font-size: 14px;
      font-family: 'Noto Sans HK', 'PingFang HK', 'Microsoft JhengHei', sans-serif;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .gl-td-actions {
      display: flex; gap: 4px; justify-content: flex-end;
    }
    .gl-empty {
      padding: 60px 16px;
      text-align: center; color: var(--text-dim); font-size: 12.5px;
    }

    .gl-table-foot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-mid);
    }

    /* Right: term detail */
    .gl-detail {
      display: flex; flex-direction: column;
      background: var(--surface);
      border-left: 1px solid var(--border);
      min-height: 0;
    }
    .gl-detail-head {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .gl-detail-title {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-dim); flex: 1;
    }
    .gl-detail-actions { display: flex; gap: 4px; }
    .gl-detail-body {
      flex: 1; overflow-y: auto; min-height: 0;
      padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .gl-detail-empty {
      flex: 1;
      display: grid; place-items: center;
      padding: 30px 24px; text-align: center;
      color: var(--text-dim); font-size: 13px;
    }
    .gl-field { display: flex; flex-direction: column; gap: 5px; }
    .gl-field label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-dim);
    }
    .gl-input {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px; color: var(--text);
      font-family: inherit;
      outline: 0;
      transition: border-color 0.1s, box-shadow 0.1s;
    }
    .gl-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-softer);
    }
    .gl-input-zh {
      font-family: 'Noto Sans HK', 'PingFang HK', 'Microsoft JhengHei', sans-serif;
      font-size: 14px; font-weight: 500;
    }

    .gl-chips {
      display: flex; flex-wrap: wrap; gap: 5px;
      padding: 6px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-height: 36px;
    }
    .gl-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px;
      font-size: 12px;
    }
    .gl-chip button {
      color: var(--text-dim); font-size: 14px; padding: 0; line-height: 1;
    }
    .gl-chip button:hover { color: var(--danger); }
    .gl-chip-add {
      padding: 3px 8px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-size: 11px;
    }
    .gl-chip-add:hover { color: var(--text-mid); border-color: var(--border-strong); }

    .gl-detail-foot {
      display: flex; gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    .gl-detail-foot .btn { flex: 1; }

    /* Variant B placeholder */
    .gl-cmp-soon {
      flex: 1; display: grid; place-items: center;
      padding: 60px 30px;
    }
    .gl-cmp-soon-card {
      max-width: 540px;
      padding: 36px 32px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 8%, var(--surface)), var(--surface));
      border: 1px solid color-mix(in srgb, var(--accent) 25%, var(--border));
      border-radius: 14px;
      text-align: center;
    }
    .gl-cmp-soon-card h2 {
      font-size: 18px; font-weight: 700; margin-bottom: 10px;
    }
    .gl-cmp-soon-card p {
      color: var(--text-mid); font-size: 13px; line-height: 1.6;
      margin-bottom: 14px;
    }
    .gl-cmp-soon-card ul {
      text-align: left; max-width: 360px; margin: 0 auto;
      color: var(--text-mid); font-size: 12.5px; line-height: 1.8;
      list-style: none;
    }
    .gl-cmp-soon-card li::before { content: "·  "; color: var(--accent-2); }

    /* Toast */
    .toast {
      position: fixed; right: 24px; bottom: 24px; z-index: 4000;
      padding: 10px 14px; min-width: 220px;
      background: var(--surface-3); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      box-shadow: var(--shadow);
      font-size: 12.5px;
      transform: translateY(8px); opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .toast.show { opacity: 1; transform: none; }
    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--danger); }

    /* Responsive */
    @media (max-width: 1280px) {
      .gl-edit { grid-template-columns: 240px minmax(0, 1fr) 320px; }
    }
    @media (max-width: 1100px) {
      .gl-edit { grid-template-columns: 220px minmax(0, 1fr); }
      .gl-detail { display: none; }
    }
  </style>
</head>
<body>

<div class="bold">

  <!-- Persistent rail (mirrors Dashboard / Proofread). 術語表 button stays
       'on' since this is the glossary page; others link back to Dashboard. -->
  <aside class="b-rail">
    <div class="mark" title="MoTitle">M</div>
    <a class="rail-btn" href="/" title="主頁"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8l6-5 6 5v6H2z M6 14V9h4v5"/></svg><span class="tt">主頁</span></a>
    <a class="rail-btn" href="Files.html" title="檔案"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M2 6h12M2 10h12M5 3v10M11 3v10"/></svg><span class="tt">檔案</span></a>
    <a class="rail-btn" href="proofread.html" title="校對"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3-8 8H3v-3z"/></svg><span class="tt">校對</span></a>
    <a class="rail-btn on" href="Glossary.html" title="術語表"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h4a3 3 0 013 3v8a2 2 0 00-2-2H3z M13 3H9a3 3 0 00-3 3v8a2 2 0 012-2h5z"/></svg><span class="tt">術語表</span></a>
    <a class="rail-btn" href="user.html" title="User"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="5.5" r="2.75"/><path d="M2.5 14a5.5 5.5 0 0111 0"/></svg><span class="tt">User</span></a>
    <div class="flex1"></div>
  </aside>

  <!-- Main glossary shell -->
  <div class="b-main">
    <div class="gl-shell">

      <!-- Header: breadcrumb + variant toggle -->
      <div class="gl-header">
        <a class="gl-back" href="/">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M7 4l-4 4 4 4"/></svg>
          Dashboard

<script>
  const API_BASE = '';

  /* Per-glossary color palette — deterministic by id hash so the same
     glossary always gets the same accent across reloads. */
  const PALETTE = ['#a78bfa', '#60a5fa', '#34d399', '#fb923c', '#f472b6', '#22d3ee'];
  function colorFor(id) {
    let h = 0;
    for (const ch of String(id || '')) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
    return PALETTE[h % PALETTE.length];
  }

  /* App state */
  const state = {
    glossaries: [],       // {id, name, description, entry_count, ...}
    activeId: null,       // glossary id
    entries: [],          // entries of the active glossary
    selectedEntryId: null,
    listFilter: '',
    termFilter: '',
    sort: 'alpha',
  };

  /* ============================================================
     Toast
     ============================================================ */
  let _toastTimer = null;
  function toast(msg, kind = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + kind;
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  /* ============================================================
     HTML helpers
     ============================================================ */
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  /* ============================================================
     Backend calls
     ============================================================ */
  async function apiJson(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(`${API_BASE}${path}`, opts);
    if (!r.ok) {
      const txt = await r.text().catch(() => '');
      throw new Error(`HTTP ${r.status}${txt ? ': ' + txt.slice(0, 120) : ''}`);
    }
    return r.json();
  }

  async function loadGlossaries() {
    const data = await apiJson('GET', '/api/glossaries');
    state.glossaries = data.glossaries || [];
    if (!state.activeId && state.glossaries.length) {
      state.activeId = state.glossaries[0].id;
    }
    renderList();
    renderHeader();
    if (state.activeId) await loadEntries(state.activeId);
  }

  /* Guards stale async re-syncs of state.entries: bumped on every glossary
     (re)load and on every save, so only the NEWEST in-flight response may
     overwrite the entries list (e.g. a slow PATCH landing after the user
     switched to another glossary must not clobber it). */
  let _entriesSyncSeq = 0;

  async function loadEntries(glossaryId) {
    _entriesSyncSeq++;
    const data = await apiJson('GET', `/api/glossaries/${encodeURIComponent(glossaryId)}`);
    state.entries = data.entries || [];
    state.selectedEntryId = null;
    renderTable();
    renderDetail();
    document.getElementById('glAddEntryBtn').disabled = false;
  }

  /* ============================================================
     Render: glossary list (left)
     ============================================================ */
  function renderList() {
    const wrap = document.getElementById('glListItems');
    const filter = state.listFilter.toLowerCase();
    const visible = state.glossaries.filter(g => {
      if (!filter) return true;
      return (g.name || '').toLowerCase().includes(filter)
          || (g.description || '').toLowerCase().includes(filter);
    });
    if (!visible.length) {
      wrap.innerHTML = `<div class="gli-list-empty">${state.glossaries.length === 0 ? '未有術語表 — 撳右上 + 新增' : '搜尋無結果'}</div>`;
      return;
    }
    wrap.innerHTML = visible.map(g => {
      const c = colorFor(g.id);
      const isActive = g.id === state.activeId;
      const srcLang = (g.source_lang || '?').toUpperCase();
      const tgtLang = (g.target_lang || '?').toUpperCase();
      return `
        <button class="gl-list-item ${isActive ? 'active' : ''}" data-id="${escapeHtml(g.id)}" style="--g-color: ${c};">
          <div class="gli-row">
            <span class="gli-dot"></span>
            <span class="gli-name">${escapeHtml(g.name || '(未命名)')}</span>
            <span class="gli-del" data-del="${escapeHtml(g.id)}" role="button" tabindex="0" title="刪除呢個術語表" aria-label="刪除術語表">✕</span>
          </div>
          <div class="gli-meta">
            <span>${srcLang} → ${tgtLang}</span>
            <span>·</span>
            <span>${g.entry_count != null ? g.entry_count + ' 條' : '—'}</span>
          </div>
        </button>`;
    }).join('');
    wrap.querySelectorAll('.gl-list-item').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        if (id === state.activeId) return;
        state.activeId = id;
        renderList();
        renderHeader();
        await loadEntries(id);
      });
    });
    // Per-glossary delete (whole glossary). stopPropagation so it doesn't also
    // select the item; confirm first since deletion is irreversible.
    wrap.querySelectorAll('.gli-del').forEach(del => {
      const onDelete = async (e) => {
        e.stopPropagation();
        e.preventDefault();
        const id = del.dataset.del;
        const g = state.glossaries.find(x => x.id === id);
        const nm = g ? (g.name || '(未命名)') : id;
        if (!confirm(`確定刪除術語表「${nm}」？\n連同入面所有術語，此操作無法復原。`)) return;
        try {
          await apiJson('DELETE', `/api/glossaries/${encodeURIComponent(id)}`);
          if (state.activeId === id) state.activeId = null;
          await loadGlossaries();
        } catch (err) {
          const msg = String((err && err.message) || err);
          // 403 = 共享術語表只可由管理員刪除（後端 can_edit 拒絕非管理員）。
          // 出清楚提示，唔好令用戶以為係功能壞咗。
          if (/HTTP 403/.test(msg)) {
            alert('你唔係管理員（Admin）帳戶，無權刪除共享術語表。\n如需刪除，請聯絡管理員。');
          } else {
            alert('刪除失敗：' + msg);
          }
        }
      };
      del.addEventListener('click', onDelete);
      del.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') onDelete(e); });
    });
  }

  function renderHeader() {
    const titleEl = document.getElementById('glActiveTitle');
    const active = state.glossaries.find(g => g.id === state.activeId);
    if (!active) {
      titleEl.textContent = '— 未選擇 —';
      titleEl.style.setProperty('--g-color', 'var(--text-dim)');
      return;
    }
    titleEl.textContent = active.name || '(未命名)';
    titleEl.style.setProperty('--g-color', colorFor(active.id));
  }

  /* ============================================================
     Render: terms table (middle)
     ============================================================ */
  function filteredEntries() {
    let list = state.entries.slice();
    const q = state.termFilter.trim().toLowerCase();
    if (q) {
      list = list.filter(e =>
        (e.source || '').toLowerCase().includes(q) ||
        (e.target || '').includes(state.termFilter) ||
        (Array.isArray(e.target_aliases) && e.target_aliases.some(a => a.includes(state.termFilter)))
      );
    }
    if (state.sort === 'alpha') list.sort((a, b) => (a.source || '').localeCompare(b.source || ''));
    else if (state.sort === 'alpha-desc') list.sort((a, b) => (b.source || '').localeCompare(a.source || ''));
    else if (state.sort === 'recent') list.reverse();
    return list;
  }

  function renderTable() {
    const body = document.getElementById('glTableBody');
    const count = document.getElementById('glTableCount');
    if (!state.activeId) {
      body.innerHTML = '<div class="gl-empty">— 揀左邊嘅術語表查看條目 —</div>';
      count.textContent = '— 條';
      return;
    }
    const list = filteredEntries();
    count.textContent = `顯示 ${list.length} / ${state.entries.length} 條`;
    if (!list.length) {
      body.innerHTML = `<div class="gl-empty">${state.entries.length === 0 ? '未有術語 — 撳下方「新增術語」' : '搜尋無結果'}</div>`;
      return;
    }
    body.innerHTML = list.map(e => `
      <button class="gl-tr ${e.id === state.selectedEntryId ? 'active' : ''}" data-id="${escapeHtml(e.id)}">
        <div class="gl-td-source">
          <span>${escapeHtml(e.source || '(未填)')}</span>
        </div>
        <div class="gl-td-target">${escapeHtml(e.target || '(未填)')}</div>
        <div class="gl-td-actions"></div>
      </button>`).join('');
    body.querySelectorAll('.gl-tr:not(.gl-th)').forEach(tr => {
      tr.addEventListener('click', () => {
        state.selectedEntryId = tr.dataset.id;
        renderTable();
        renderDetail();
      });
    });
  }

  /* ============================================================
     Render: term detail (right)
     ============================================================ */
  function renderDetail() {
    const body = document.getElementById('glDetailBody');
    const delBtn = document.getElementById('glDeleteEntryBtn');
    const entry = state.entries.find(e => e.id === state.selectedEntryId);
    if (!entry) {
      body.innerHTML = '<div class="gl-detail-empty">揀一條術語查看 / 編輯詳情</div>';
      delBtn.disabled = true;
      return;
    }
    delBtn.disabled = false;
    const aliases = Array.isArray(entry.target_aliases) ? entry.target_aliases : [];
    body.innerHTML = `
      <div class="gl-field">
        <label>原文</label>
        <input class="gl-input" id="dSource" value="${escapeHtml(entry.source || '')}" />
      </div>
      <div class="gl-field">
        <label>譯文</label>
        <input class="gl-input gl-input-zh" id="dTarget" value="${escapeHtml(entry.target || '')}" />
      </div>
      <div class="gl-field">
        <label>替代寫法 (別名)</label>
        <div class="gl-chips" id="dAliases">
          ${aliases.map((a, i) => `<span class="gl-chip">${escapeHtml(a)}<button data-idx="${i}" title="移除">×</button></span>`).join('')}
          <button class="gl-chip-add" id="dAliasAdd">+ 加入</button>
        </div>
      </div>`;

    /* Auto-save source/target on blur — same UX pattern we use in proofread.html. */
    const sourceInput = document.getElementById('dSource');
    const targetInput = document.getElementById('dTarget');
    sourceInput.addEventListener('blur', () => saveEntryField('source', sourceInput.value.trim()));
    targetInput.addEventListener('blur', () => saveEntryField('target', targetInput.value.trim()));

    /* Alias chip × buttons. _aliasSaveBusy serializes alias PATCHes: the
       handlers close over the `aliases` array captured at render time, so a
       second click before the first PATCH re-renders would compute its
       payload from the pre-first-click array and undo the first change on
       the server. Ignore clicks while one save is in flight. */
    document.querySelectorAll('#dAliases .gl-chip button').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (_aliasSaveBusy) return;
        _aliasSaveBusy = true;
        try {
          const idx = parseInt(btn.dataset.idx, 10);
          const next = aliases.slice(); next.splice(idx, 1);
          await saveEntryField('target_aliases', next);
        } finally { _aliasSaveBusy = false; }
      });
    });
    document.getElementById('dAliasAdd').addEventListener('click', async () => {
      if (_aliasSaveBusy) return;
      const v = prompt('加入別名：');
      if (!v || !v.trim()) return;
      _aliasSaveBusy = true;
      try {
        await saveEntryField('target_aliases', [...aliases, v.trim()]);
      } finally { _aliasSaveBusy = false; }
    });
  }
  let _aliasSaveBusy = false;

  async function saveEntryField(field, value) {
    const entry = state.entries.find(e => e.id === state.selectedEntryId);
    if (!entry) return;
    if (entry[field] === value) return; // unchanged → skip
    const gid = state.activeId;
    const seq = ++_entriesSyncSeq;
    try {
      // Backend contract: PATCH /entries/<eid> returns the FULL updated
      // glossary (not the entry) — re-sync the whole entries list from it.
      const updated = await apiJson('PATCH',
        `/api/glossaries/${encodeURIComponent(gid)}/entries/${encodeURIComponent(entry.id)}`,
        { [field]: value });
      if (gid === state.activeId && seq === _entriesSyncSeq) {
        state.entries = updated.entries || [];
        renderTable();
        if (field === 'target_aliases') {
          renderDetail();
        } else if (state.selectedEntryId === entry.id) {
          // Echo the server-normalized value (e.g. wrapping quotes stripped)
          // back into the input — without a full re-render so focus is kept.
          const el = document.getElementById(field === 'source' ? 'dSource' : 'dTarget');
          const fresh = state.entries.find(e => e.id === entry.id);
          if (el && fresh && document.activeElement !== el) el.value = fresh[field] || '';
        }
      }
      toast('已儲存', 'success');
    } catch (e) {
      toast(`儲存失敗: ${e.message}`, 'error');
    }
  }

  async function addEntry() {
    if (!state.activeId) return;
    const source = prompt('原文：');
    if (!source || !source.trim()) return;
    const target = prompt(`譯文 for "${source.trim()}"：`);
    if (!target || !target.trim()) return;
    const gid = state.activeId;
    const seq = ++_entriesSyncSeq;
    try {
      // Backend contract: POST /entries returns the FULL updated glossary
      // (new entry appended at the end), not the created entry itself.
      const updated = await apiJson('POST',
        `/api/glossaries/${encodeURIComponent(gid)}/entries`,
        { source: source.trim(), target: target.trim() });
      const entries = updated.entries || [];
      // Bump entry_count on the glossary it was added TO (the list shows it
      // even if the user has switched away meanwhile).
      const g = state.glossaries.find(x => x.id === gid);
      if (g) g.entry_count = entries.length;
      renderList();
      if (gid === state.activeId && seq === _entriesSyncSeq) {
        state.entries = entries;
        const newEntry = entries[entries.length - 1];
        state.selectedEntryId = newEntry ? newEntry.id : null;
        renderTable();
        renderDetail();
      }
      toast('已加入術語', 'success');
    } catch (e) {
      toast(`加入失敗: ${e.message}`, 'error');
    }
  }

  async function deleteEntry() {
    const entry = state.entries.find(e => e.id === state.selectedEntryId);
    if (!entry) return;
    if (!confirm(`刪除「${entry.source} → ${entry.target}」？`)) return;
    try {
      await apiJson('DELETE',
        `/api/glossaries/${encodeURIComponent(state.activeId)}/entries/${encodeURIComponent(entry.id)}`);
      state.entries = state.entries.filter(e => e.id !== entry.id);
      state.selectedEntryId = null;
      const g = state.glossaries.find(x => x.id === state.activeId);
      if (g) g.entry_count = state.entries.length;
      renderList();
      renderTable();
      renderDetail();
      toast('已刪除', 'success');
    } catch (e) {
      toast(`刪除失敗: ${e.message}`, 'error');
    }
  }

  async function addGlossary() {
    const name = prompt('新術語表名稱：');
    if (!name || !name.trim()) return;
    const sourceLang = (document.getElementById('glSourceLang') || {}).value || 'en';
    const targetLang = (document.getElementById('glTargetLang') || {}).value || 'zh';
    try {
      const created = await apiJson('POST', '/api/glossaries',
        { name: name.trim(), description: '', source_lang: sourceLang, target_lang: targetLang });
      // POST returns the full glossary (no entry_count field — that only
      // exists on list summaries); derive it so the list shows 「0 條」
      // instead of '—', and keep the backend's name-sorted order.
      state.glossaries.push({ ...created, entry_count: (created.entries || []).length });
      state.glossaries.sort((a, b) =>
        ((a.name || '').toLowerCase()).localeCompare((b.name || '').toLowerCase()));
      state.activeId = created.id;
      renderList();
      renderHeader();
      await loadEntries(created.id);
      toast('已新增術語表', 'success');
    } catch (e) {
      toast(`新增失敗: ${e.message}`, 'error');
    }
  }

  /* CSV import — POST JSON {csv_content} matching backend api_import_glossary_csv */
  async function importCsv(file) {
    if (!state.activeId) {
      toast('請先揀一個術語表', 'error');
      return;
    }
    // Read the file as UTF-8 text before sending; backend expects JSON {csv_content: "..."}
    const csvText = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);
      reader.readAsText(file, 'utf-8');
    }).catch((e) => {
      toast('讀取檔案失敗: ' + e.message, 'error');
      throw e;
    });
    try {
      const r = await fetch(
        `${API_BASE}/api/glossaries/${encodeURIComponent(state.activeId)}/import`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ csv_content: csvText }),
        }
      );
      if (!r.ok) {
        const body = await r.json().catch(() => ({}));
        const msg = body.error || `HTTP ${r.status}`;
        toast(`匯入失敗: ${msg}`, 'error');
        return;
      }
      const result = await r.json();
      const added = result.added !== undefined ? result.added : '?';
      toast(`已匯入 ${added} 條`, 'success');
      await loadEntries(state.activeId);
      // Refresh entry_count in left list
      await loadGlossaries();
    } catch (e) {
      toast(`匯入失敗: ${e.message}`, 'error');
    }
  }

  async function exportCsv() {
    if (!state.activeId) {
      toast('請先揀一個術語表', 'error');
      return;
    }
    // fetch-then-blob instead of a blind anchor download, so an error
    // response (403/404 JSON) shows a toast instead of being saved as a .csv.
    try {
      const r = await fetch(
        `${API_BASE}/api/glossaries/${encodeURIComponent(state.activeId)}/export`,
        { credentials: 'same-origin' });
      if (!r.ok) {
        let msg = `HTTP ${r.status}`;
        try { msg = (await r.json()).error || msg; } catch (e) { /* keep HTTP code */ }
        toast(`匯出失敗: ${msg}`, 'error');
        return;
      }
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${state.activeId}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      toast(`匯出失敗: ${e.message}`, 'error');
    }
  }

  /* ============================================================
     Language selects
     ============================================================ */
  async function _loadLanguagesIntoSelects() {
    try {
      const r = await fetch(`${API_BASE}/api/glossaries/languages`, { credentials: 'same-origin' });
      if (!r.ok) return;
      const { languages } = await r.json();
      for (const selId of ['glSourceLang', 'glTargetLang']) {
        const sel = document.getElementById(selId);
        if (!sel) continue;
        sel.innerHTML = languages.map(l =>
          `<option value="${escapeHtml(l.code)}">${escapeHtml(l.display_name)} (${escapeHtml(l.code)})</option>`
        ).join('');
      }
      // Default selections: source=en, target=zh
      const ssrc = document.getElementById('glSourceLang');
      const stgt = document.getElementById('glTargetLang');
      if (ssrc) ssrc.value = 'en';
      if (stgt) stgt.value = 'zh';
    } catch (e) {
      console.error('Failed to load languages', e);
    }
  }

  /* ============================================================
     Variant toggle
     ============================================================ */
  function setVariant(v) {
    document.querySelectorAll('.gl-vtab').forEach(b =>
      b.classList.toggle('on', b.dataset.variant === v));
    document.getElementById('glEdit').style.display = v === 'a' ? '' : 'none';
    document.getElementById('glCompare').style.display = v === 'b' ? '' : 'none';
  }

  /* ============================================================
     Wire-up
     ============================================================ */
  document.getElementById('glListSearch').addEventListener('input', e => {
    state.listFilter = e.target.value;
    renderList();
  });
  document.getElementById('glSearch').addEventListener('input', e => {
    state.termFilter = e.target.value;
    document.getElementById('glSearchClr').style.display = e.target.value ? '' : 'none';
    renderTable();
  });
  document.getElementById('glSearchClr').addEventListener('click', () => {
    document.getElementById('glSearch').value = '';
    state.termFilter = '';
    document.getElementById('glSearchClr').style.display = 'none';
    renderTable();
  });
  document.getElementById('glSort').addEventListener('change', e => {
    state.sort = e.target.value;
    renderTable();
  });
  document.getElementById('glAddListBtn').addEventListener('click', addGlossary);
  document.getElementById('glAddEntryBtn').addEventListener('click', addEntry);
  document.getElementById('glDeleteEntryBtn').addEventListener('click', deleteEntry);
  document.getElementById('glImportBtn').addEventListener('click', () =>
    document.getElementById('glImportFile').click());
  document.getElementById('glImportFile').addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if (file) importCsv(file);
    e.target.value = '';
  });
  document.getElementById('glExportBtn').addEventListener('click', exportCsv);

  document.querySelectorAll('.gl-vtab').forEach(btn => {
    btn.addEventListener('click', () => setVariant(btn.dataset.variant));
  });

  /* Boot */
  _loadLanguagesIntoSelects();
  loadGlossaries().catch(e => {
    toast(`連線失敗: ${e.message}`, 'error');
  });
</script>

</body>
</html>
