<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>MoTitle — 管理</title>
<style>
  body { font-family: system-ui, -apple-system, "Microsoft JhengHei", sans-serif;
         background: #0a0a0f; color: #e6e6f0; margin: 0; padding: 20px; }
  h1 { margin: 0 0 16px; font-size: 18px; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid #2a2a3d; margin-bottom: 20px; }
  .tab { padding: 8px 16px; background: none; border: 0; color: #a8a8bf;
         cursor: pointer; font: inherit; border-bottom: 2px solid transparent; }
  .tab.active { color: #6c63ff; border-bottom-color: #6c63ff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid #2a2a3d; }
  th { color: #a8a8bf; font-weight: 500; }
  button.btn { background: #6c63ff; color: #fff; border: 0; border-radius: 4px;
               padding: 6px 12px; font: inherit; cursor: pointer; }
  button.btn-danger { background: #ef4444; }
  button.btn-secondary { background: transparent; border: 1px solid #2a2a3d; color: #a8a8bf; }
  input[type="text"], input[type="password"] {
    background: #1a1a24; color: #e6e6f0; border: 1px solid #2a2a3d;
    border-radius: 4px; padding: 6px 8px; font: inherit;
  }
  .panel { display: none; }
  .panel.active { display: block; }
  .admin-shell { display:flex; align-items:stretch; min-height:100vh; }
  .b-rail { width:56px; flex-shrink:0; background:#1a1c22; display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 0; border-right:1px solid #2a2d36; }
  .b-rail .mark { width:32px; height:32px; border-radius:8px; background:rgba(108,99,255,0.15); color:#8b85ff; display:flex; align-items:center; justify-content:center; font-weight:800; margin-bottom:8px; }
  .b-rail .rail-btn { position:relative; width:40px; height:40px; border:none; background:transparent; color:#9aa0ab; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; }
  .b-rail .rail-btn:hover { color:#e7e8ec; background:#1a1c22; }
  .b-rail .rail-btn.on { color:#8b85ff; background:rgba(108,99,255,0.15); }
  .b-rail .rail-btn .tt { position:absolute; left:48px; white-space:nowrap; background:#000; color:#fff; padding:3px 8px; border-radius:6px; font-size:12px; opacity:0; pointer-events:none; z-index:5; }
  .b-rail .rail-btn:hover .tt { opacity:1; }
  .admin-content { flex:1; min-width:0; padding:0 16px; }
</style>
</head>
<body>
<div class="admin-shell">
  <aside class="b-rail">
    <div class="mark" title="MoTitle">M</div>
    <a class="rail-btn" href="/" title="主頁"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8l6-5 6 5v6H2z M6 14V9h4v5"/></svg><span class="tt">主頁</span></a>
    <a class="rail-btn" href="/" title="檔案"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M2 6h12M2 10h12M5 3v10M11 3v10"/></svg><span class="tt">檔案</span></a>
    <a class="rail-btn" href="proofread.html" title="校對"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3-8 8H3v-3z"/></svg><span class="tt">校對</span></a>
    <a class="rail-btn" href="Glossary.html" title="術語表"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h4a3 3 0 013 3v8a2 2 0 00-2-2H3z M13 3H9a3 3 0 00-3 3v8a2 2 0 012-2h5z"/></svg><span class="tt">術語表</span></a>
    <a class="rail-btn on" href="user.html" title="User"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="5.5" r="2.75"/><path d="M2.5 14a5.5 5.5 0 0111 0"/></svg><span class="tt">User</span></a>
    <div style="flex:1"></div>
  </aside>
  <div class="admin-content">
  <h1>MoTitle 管理</h1>
  <div class="tabs">
    <button class="tab active" id="adminTabUsers" data-testid="admin-tab-users"
            onclick="switchTab('users')">用戶</button>
    <button class="tab" id="adminTabProfiles"
            onclick="switchTab('profiles')">Profiles</button>
    <button class="tab" id="adminTabGlossaries"
            onclick="switchTab('glossaries')">Glossaries</button>
    <button class="tab" id="adminTabAudit"
            onclick="switchTab('audit')">Audit Log</button>
    <a href="/" style="margin-left:auto;color:#a8a8bf;text-decoration:none;align-self:center;">← 返回 dashboard</a>
  </div>

  <div class="panel active" id="panelUsers">
    <form id="adminUserCreateForm" data-testid="admin-user-create-form"
          style="margin-bottom:20px;display:flex;gap:8px;align-items:center;">
      <input type="text" name="username" placeholder="新用戶名" required>
      <input type="password" name="password" placeholder="密碼" required>
      <label><input type="checkbox" name="is_admin"> Admin</label>
      <button type="submit" class="btn" data-testid="admin-user-create-submit">建立</button>
    </form>
    <table>
      <thead><tr><th>ID</th><th>用戶名</th><th>Admin</th><th>建立時間</th><th>操作</th></tr></thead>
      <tbody id="adminUserList"></tbody>
    </table>
  </div>

  <div class="panel" id="panelProfiles">
    <p>使用左側 dashboard 嘅 Profile 編輯器管理 Profile（admin 可以編輯任何 Profile）。</p>
  </div>

  <div class="panel" id="panelGlossaries">
    <p style="margin-bottom:12px;color:#a8a8bf;font-size:13px;">使用左側 dashboard 嘅 Glossary 編輯器管理 Glossary（admin 可以編輯任何 Glossary）。</p>
    <table>
      <thead><tr><th>ID</th><th>名稱</th><th>Source</th><th>Target</th><th>條目</th><th>Owner</th></tr></thead>
      <tbody id="adminGlossaryList"></tbody>
    </table>
  </div>

  <div class="panel" id="panelAudit">
    <table>
      <thead><tr><th>時間</th><th>Actor</th><th>Action</th><th>Target</th><th>Details</th></tr></thead>
      <tbody id="adminAuditList"></tbody>
    </table>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script>
    fetchMe().then(u => {
      if (!u || !u.is_admin) { window.location.href = "/"; return; }
      loadUsers(); loadAudit(); loadGlossaries();
    });
  </script>
  </div><!-- /.admin-content -->
</div><!-- /.admin-shell -->
</body>
</html>
