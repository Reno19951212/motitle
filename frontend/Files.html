<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoTitle — 檔案庫 Files</title>
  <style>
    /* ============================================================
       Files (檔案庫) — built on the index.html / MoTitle design
       system. Tokens, shell, rail, topbar, badges, buttons copied
       verbatim so it sits 1:1 with the Dashboard.
       ============================================================ */
    :root {
      --bg: #0a0a0f; --bg-soft: #0f0f18; --surface: #13131a; --surface-2: #1a1a24; --surface-3: #222232;
      --border: #2a2a3d; --border-strong: #35354d;
      --text: #e6e6f0; --text-mid: #a8a8bf; --text-dim: #6e6e85;
      --accent: #6c63ff; --accent-2: #a78bfa; --accent-soft: rgba(108,99,255,0.12); --accent-softer: rgba(108,99,255,0.06); --accent-ring: rgba(108,99,255,0.35);
      --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; --info: #38bdf8;
      --radius-sm: 6px; --radius: 10px; --radius-lg: 14px;
      --shadow-sm: 0 1px 0 rgba(255,255,255,0.03), 0 2px 8px rgba(0,0,0,0.25);
      --shadow: 0 12px 40px rgba(0,0,0,0.45);
      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #app { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; letter-spacing: -0.005em; overflow: hidden; }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
    input, select { font: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    .mono { font-family: var(--font-mono); font-size: 12.5px; letter-spacing: 0; }
    .dim { color: var(--text-dim); } .mid { color: var(--text-mid); }
    .tnum { font-variant-numeric: tabular-nums; }
    .kbd { display: inline-flex; align-items: center; padding: 2px 6px; font-family: var(--font-mono); font-size: 11px; color: var(--text-mid); background: var(--surface-2); border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px; line-height: 1; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; transition: background .15s, border-color .15s, color .15s, transform .05s; white-space: nowrap; border: 1px solid transparent; }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5b52e0; }
    .btn-ghost { color: var(--text-mid); }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
    .btn-secondary { background: var(--surface-2); color: var(--text); border-color: var(--border); }
    .btn-secondary:hover { border-color: var(--border-strong); background: var(--surface-3); }
    .btn-outline { background: transparent; color: var(--accent-2); border-color: var(--accent-ring); }
    .btn-outline:hover { background: var(--accent-soft); }
    .btn-danger-ghost { color: var(--text-mid); }
    .btn-danger-ghost:hover { color: var(--danger); background: rgba(239,68,68,0.08); }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
    .btn-icon { width: 30px; height: 30px; padding: 0; border-radius: 7px; color: var(--text-mid); }
    .btn-icon:hover { background: var(--surface-2); color: var(--text); }
    .btn[disabled] { opacity: 0.5; pointer-events: none; }

    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; font-size: 11px; font-weight: 600; border-radius: 999px; letter-spacing: 0.02em; line-height: 1.6; white-space: nowrap; }
    .badge--idle { background: rgba(168,168,191,0.12); color: var(--text-mid); }
    .badge--processing { background: rgba(245,158,11,0.15); color: var(--warning); }
    .badge--queued { background: rgba(56,189,248,0.15); color: var(--info); }
    .badge--done { color: var(--success); border: 1px solid currentColor; background: transparent; }
    .badge--done-solid { background: rgba(34,197,94,0.18); color: #4ade80; }
    .badge--error { background: rgba(239,68,68,0.15); color: var(--danger); }
    .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge--processing .dot { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    /* shell */
    .app { display: flex; flex-direction: column; height: 100vh; background: var(--bg); overflow: hidden; }
    .bold { display: grid; grid-template-columns: 64px 1fr; height: 100%; min-height: 0; background: var(--bg); }
    .b-rail { background: var(--bg-soft); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 14px 0; gap: 8px; }
    .b-rail .mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 15px; margin-bottom: 10px; }
    .rail-btn { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 16px; position: relative; }
    .rail-btn:hover { color: var(--text); background: var(--surface-2); }
    .rail-btn.on { color: var(--accent-2); background: var(--accent-soft); }
    .rail-btn.on::before { content: ""; position: absolute; left: -14px; top: 10px; bottom: 10px; width: 3px; border-radius: 2px; background: var(--accent); }
    .rail-btn .tt { position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%); background: var(--surface); color: var(--text); padding: 4px 10px; border-radius: 6px; font-size: 11px; white-space: nowrap; border: 1px solid var(--border); opacity: 0; pointer-events: none; transition: opacity .15s; z-index: 5; }
    .rail-btn:hover .tt { opacity: 1; }
    .b-rail .flex1 { flex: 1; }

    .b-main { display: grid; grid-template-rows: auto 1fr; min-height: 0; min-width: 0; }
    .b-topbar { display: grid; grid-template-columns: auto minmax(0,1fr) auto auto; align-items: center; gap: 12px; padding: 10px 18px; background: var(--surface); border-bottom: 1px solid var(--border); min-width: 0; position: relative; z-index: 40; }
    /* Backend model health pills (restored). */
    .health-cluster { display: flex; align-items: center; gap: 6px; }
    .hpill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 9px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface-2); white-space: nowrap; }
    .hpill .led { width: 7px; height: 7px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }
    .hpill .hk { font-size: 9px; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-dim); }
    .hpill .hv { font-size: 10.5px; color: var(--text-mid); font-family: var(--font-mono); }
    @media (max-width: 1100px) { .hpill { display: none; } }
    .b-topbar .search { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text-mid); font-size: 13px; min-width: 200px; max-width: 280px; }
    .b-topbar .page-id { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .page-id .pi-ic { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; background: var(--accent-soft); color: var(--accent-2); flex: 0 0 30px; }
    .page-id .pi-t { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
    .page-id .pi-s { font-size: 11px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    @media (max-width: 1500px) { .b-topbar .search .kbd { display: none; } }

    /* body */
    .files-body { min-height: 0; min-width: 0; overflow: auto; padding: 22px 26px 40px; }
    .files-inner { max-width: 1320px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

    /* page header */
    .fh { display: flex; align-items: flex-end; gap: 16px; }
    .fh .h-title { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
    .fh .h-sub { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .fh .spacer { flex: 1; }

    /* stat strip */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; position: relative; overflow: hidden; }
    .stat .s-k { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: center; gap: 7px; }
    .stat .s-k .sd { width: 7px; height: 7px; border-radius: 50%; }
    .stat .s-v { font-size: 26px; font-weight: 800; margin-top: 8px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
    .stat .s-v small { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-left: 4px; }

    /* toolbar */
    .toolbar { display: flex; align-items: center; gap: 10px; }
    .tabs { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 2px; }
    .tab { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 7px; font-size: 12.5px; font-weight: 600; color: var(--text-mid); transition: background .12s, color .12s; }
    .tab:hover { color: var(--text); }
    .tab.on { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
    .tab .cnt { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); background: var(--bg-soft); padding: 1px 6px; border-radius: 999px; }
    .tab.on .cnt { color: var(--accent-2); }
    .toolbar .spacer { flex: 1; }
    .filter-input { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-mid); min-width: 240px; }
    .filter-input input { background: none; border: 0; outline: none; flex: 1; font-size: 13px; color: var(--text); }
    .filter-input input::placeholder { color: var(--text-dim); }
    .sort-select { padding: 7px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: 12.5px; color: var(--text-mid); }

    /* table */
    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    table.files { width: 100%; border-collapse: collapse; }
    table.files thead th { text-align: left; font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--bg-soft); white-space: nowrap; user-select: none; }
    table.files thead th.sortable { cursor: pointer; }
    table.files thead th.sortable:hover { color: var(--text-mid); }
    th .caret { opacity: 0; font-size: 9px; }
    th.sorted .caret { opacity: 1; color: var(--accent-2); }
    table.files tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    table.files tbody tr { transition: background .1s; }
    table.files tbody tr:hover { background: var(--surface-2); }
    table.files tbody tr.sel { background: var(--accent-softer); }
    table.files tbody tr:last-child td { border-bottom: 0; }

    .cell-check { width: 40px; }
    .chk { width: 17px; height: 17px; border-radius: 5px; border: 1.6px solid var(--border-strong); display: inline-grid; place-items: center; color: transparent; transition: all .12s; cursor: pointer; }
    .chk:hover { border-color: var(--accent-ring); }
    .chk.on { background: var(--accent); border-color: var(--accent); color: #fff; }

    .cell-file { min-width: 280px; }
    .file-id { display: flex; align-items: center; gap: 11px; }
    .file-thumb { width: 46px; height: 30px; border-radius: 6px; flex: 0 0 46px; background: repeating-linear-gradient(135deg, #15151f 0 7px, #101019 7px 14px); border: 1px solid var(--border); display: grid; place-items: center; color: var(--text-dim); }
    .file-name { font-size: 13.5px; font-weight: 600; color: var(--text); max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-name.link { cursor: pointer; }
    .file-name.link:hover { color: var(--accent-2); }
    .file-sub { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 2px; }

    .lang-chips { display: inline-flex; gap: 5px; }
    .lchip { font-size: 10px; font-weight: 800; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 6px; }
    .lchip--1 { background: var(--accent-softer); color: var(--accent-2); border: 1px solid var(--accent-ring); }
    .lchip--2 { background: rgba(56,189,248,0.1); color: var(--info); border: 1px solid rgba(56,189,248,0.3); }

    .seg-cell { font-family: var(--font-mono); font-size: 12.5px; color: var(--text-mid); }
    .seg-cell .ap { color: var(--text-dim); font-size: 11px; }
    .miniprog { width: 90px; height: 5px; border-radius: 999px; background: var(--surface-3); overflow: hidden; margin-top: 5px; }
    .miniprog .mf { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }

    .row-acts { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
    .row-acts .btn-icon { opacity: 0.55; }
    tr:hover .row-acts .btn-icon { opacity: 1; }

    /* dropdown menu */
    .menu-wrap { position: relative; }
    .menu { position: absolute; top: calc(100% + 6px); right: 0; min-width: 188px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 12px; box-shadow: var(--shadow); padding: 5px; z-index: 60; }
    .menu button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px; border-radius: 7px; font-size: 13px; text-align: left; color: var(--text); }
    .menu button:hover { background: var(--surface-2); }
    .menu button.danger { color: var(--danger); }
    .menu button.danger:hover { background: rgba(239,68,68,0.08); }
    .menu .sep { height: 1px; background: var(--border); margin: 4px 2px; }

    /* bulk bar */
    .bulkbar { position: sticky; bottom: 0; display: flex; align-items: center; gap: 12px; padding: 11px 16px; background: var(--surface-3); border: 1px solid var(--border-strong); border-radius: 12px; box-shadow: var(--shadow); margin-top: 4px; }
    .bulkbar .bb-count { font-size: 13px; font-weight: 600; }
    .bulkbar .bb-count b { color: var(--accent-2); }
    .bulkbar .spacer { flex: 1; }

    /* empty */
    .empty-row td { padding: 60px 20px; text-align: center; }
    .empty-in { display: inline-flex; flex-direction: column; align-items: center; gap: 10px; color: var(--text-dim); }
    .empty-in .ei { width: 54px; height: 54px; border-radius: 14px; display: grid; place-items: center; background: var(--surface-2); border: 1px solid var(--border); }
    .empty-in .et { font-size: 13.5px; color: var(--text-mid); font-weight: 600; }

    /* toast */
    .toasts { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .toast { display: flex; align-items: center; gap: 9px; padding: 10px 15px; border-radius: 11px; background: var(--surface-3); border: 1px solid var(--border-strong); box-shadow: var(--shadow); font-size: 13px; animation: tin .18s ease; }
    @keyframes tin { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .toast.success svg { color: var(--success); } .toast.info svg { color: var(--info); } .toast.error svg { color: var(--danger); }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="bold">
      <!-- Left rail -->
      <aside class="b-rail" id="bRail">
        <div class="mark" title="MoTitle">M</div>
        <a class="rail-btn" href="/"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8l6-5 6 5v6H2z M6 14V9h4v5"/></svg><span class="tt">主頁</span></a>
        <a class="rail-btn on" href="Files.html"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M2 6h12M2 10h12M5 3v10M11 3v10"/></svg><span class="tt">檔案</span></a>
        <a class="rail-btn" href="proofread.html"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3-8 8H3v-3z"/></svg><span class="tt">校對</span></a>
        <a class="rail-btn" href="Glossary.html"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h4a3 3 0 013 3v8a2 2 0 00-2-2H3z M13 3H9a3 3 0 00-3 3v8a2 2 0 012-2h5z"/></svg><span class="tt">術語表</span></a>
        <a class="rail-btn" href="user.html"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="5.5" r="2.75"/><path d="M2.5 14a5.5 5.5 0 0111 0"/></svg><span class="tt">User</span></a>
        <div class="flex1"></div>
      </aside>

      <!-- Main -->
      <div class="b-main">
        <div class="b-topbar">
          <div class="page-id">
            <span class="pi-ic"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M2 6h12M2 10h12M5 3v10M11 3v10"/></svg></span>
            <div>
              <div class="pi-t">檔案庫</div>
              <div class="pi-s">Files</div>
            </div>
          </div>
          <div class="search">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4"/><path d="M10 10l3 3"/></svg>
            <span>搜尋檔案、術語、Profile…</span>
            <span style="margin-left:auto;" class="kbd">⌘K</span>
          </div>
          <span id="userChip" data-testid="user-chip" style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid var(--border);border-radius:14px;font-size:12px;color:var(--text-mid);">
            <span id="userChipName">使用者</span>
            <a id="adminLink" data-testid="admin-link" href="/user.html" style="display:none;color:var(--accent);text-decoration:none;font-size:11px;margin-right:6px;" title="管理">⚙</a>
            <button id="userChipLogout" data-testid="logout" style="background:none;border:0;color:var(--text-dim);cursor:pointer;font-size:11px;padding:0;" title="登出">⏻</button>
          </span>
        </div>

        <div class="files-body">
          <div class="files-inner">
            <div class="fh">
              <div>
                <div class="h-title">檔案庫</div>
                <div class="h-sub">所有上傳影片同字幕製作狀態 · All media &amp; subtitle jobs</div>
              </div>
              <div class="spacer"></div>
              <button class="btn btn-secondary" id="refreshBtn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8a6 6 0 1012 0 6 6 0 00-12 0M8 5v3l2 1"/></svg>重新整理</button>
              <button class="btn btn-primary" id="uploadBtn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M8 11V3M8 3L5 6M8 3l3 3M3 11v2h10v-2"/></svg>上傳影片</button>
            </div>

            <div class="stats" id="stats"></div>

            <div class="toolbar">
              <div class="tabs" id="tabs"></div>
              <div class="spacer"></div>
              <div class="filter-input">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4"/><path d="M10 10l3 3"/></svg>
                <input id="search" placeholder="篩選檔名…" />
              </div>
              <select class="sort-select" id="sort">
                <option value="date">最近上傳</option>
                <option value="name">檔名 A→Z</option>
                <option value="status">狀態</option>
                <option value="segs">段數</option>
              </select>
            </div>

            <div class="table-card">
              <table class="files">
                <thead>
                  <tr>
                    <th class="cell-check"><span class="chk" id="checkAll" role="checkbox"></span></th>
                    <th class="sortable" data-sort="name">檔案 File<span class="caret">▼</span></th>
                    <th>目標語言</th>
                    <th class="sortable" data-sort="segs">段數 / 核准<span class="caret">▼</span></th>
                    <th class="sortable" data-sort="status">狀態<span class="caret">▼</span></th>
                    <th class="sortable" data-sort="date">上傳<span class="caret">▼</span></th>
                    <th style="text-align:right;">操作</th>
                  </tr>
                </thead>
                <tbody id="rows"></tbody>
              </table>
            </div>
