  function flagLabel(type) {
    return ({
      'cps': 'CPS',
      'redundancy': '重複',
      'glossary': '詞彙',
      'number': '數字',
      'low-confidence-mt': 'MT低',
      'low-confidence-asr': 'ASR低',
      'untranslated': '未譯',
      'long': '過長',
      'review': '需覆檢',
    })[type] || type;
  }

  // Backend post-processor (backend/translation/post_processor.py) sets a
  // structured `flags` field on each translation. This helper parses any
  // legacy [LONG] / [NEEDS REVIEW] prefix that may still be inline in
  // zh_text from registry data written before the migration.
  const TRANSLATION_PREFIX_RE = /^\s*(\[LONG\]|\[NEEDS REVIEW\])\s*/;
  function parseTranslationFlags(zh) {
    const flags = [];
    const seen = new Set();
    let clean = zh || '';
    let m;
    while ((m = clean.match(TRANSLATION_PREFIX_RE))) {
      const tag = m[1];
      if (tag === '[LONG]' && !seen.has('long')) {
        flags.push({ type: 'long', msg: '中文長度超過 28 字（廣播單行上限）' });
        seen.add('long');
      } else if (tag === '[NEEDS REVIEW]' && !seen.has('review')) {
        flags.push({ type: 'review', msg: '翻譯品質有疑問，請覆檢' });
        seen.add('review');
      }
      clean = clean.slice(m[0].length);
    }
    return { clean, flags };
  }

  // Convert backend `flags` (array of strings like "long" / "review") into
  // the {type, msg} shape used by the renderer. Falls back to legacy prefix
  // parsing if the backend payload omits the field.
  const QA_FLAG_MESSAGES = {
    long: '中文長度超過 28 字（廣播單行上限）',
    review: '翻譯品質有疑問，請覆檢',
  };
  function qaFlagsFromBackend(apiFlags, prefixFlags) {
    if (apiFlags && apiFlags.length) {
      return apiFlags.map(type => ({ type, msg: QA_FLAG_MESSAGES[type] || '' }));
    }
    return [...prefixFlags];
  }

  function scrollSegIntoView(i) {
    const row = document.querySelector(`.rv-b-rail-item[data-idx="${i}"]`);
    if (!row) return;
    const scroll = document.getElementById('segList');
    const rBox = row.getBoundingClientRect();
    const sBox = scroll.getBoundingClientRect();
    const delta = rBox.top - sBox.top - 8;
    if (delta < 0 || delta > scroll.clientHeight - row.clientHeight - 40) {
      scroll.scrollTo({ top: Math.max(0, scroll.scrollTop + delta), behavior: 'smooth' });
    }
  }

  // ============================================================
  // Rendering — progress
  // ============================================================
  function renderProgress() {
    const done = segs.filter(s => s.approved).length;
    const total = segs.length;
    document.getElementById('rvProgDone').textContent = done;
    document.getElementById('rvProgTotal').textContent = total;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('rvProgFill').style.width = pct + '%';
  }

  // ============================================================
  // Rendering — detail panel
  // ============================================================
  // Helper: 取得 output_lang 模式嘅第一/第二語言 descriptor label
  function _outputLangLabel(role) {
    if (!fileInfo || !Array.isArray(fileInfo.languages)) return null;
    const entry = fileInfo.languages.find(l => l.role === role);
    if (!entry) return null;
    return `${entry.label || entry.lang} · ${(entry.lang || '').toUpperCase()}`;
  }

    const zhLabel = isOutputLang

    // output_lang 時第二語言 CPS（output_lang 有第二語言才顯示）
    const cpsSecondOver = (isOutputLang && s._cpsSecond > 12) ? 'over' : '';
    const secondCpsHtml = (isOutputLang && showZhField)

      ? `<div class="spacer"></div><span class="rv-b-detail-cps ${cpsOver}">CPS <b>${s.cps}</b> / 12</span>`

    el.innerHTML = `
      <div class="rv-b-detail-head">

        <div class="spacer"></div>
        ${s.flags.map(f => {
          const c = f.type === 'review' || f.type.startsWith('low-') || f.type === 'untranslated' ? 'rose' : 'amber';
          return `<div class="qa-flag qa-flag-${c}" title="${escapeHtml(f.msg || '')}">${flagLabel(f.type)}</div>`;
        }).join('')}
        ${isOutputLang ? `<button class="ae-btn" onclick="startSegmentRerun(${s.idx})" ${_rerunJob ? 'disabled' : ''} title="重新行 ASR + 翻譯鏈（淨係呢段）">⟳ AI Rerun</button>` : ''}
        ${s.approved ? '<span class="qa-flag" style="background:rgba(34,197,94,0.14);color:#4ade80;">✓ 已批核</span>' : ''}
      </div>

            ${confStub}
            ${cpsFirstHtml}
            ${isOutputLang ? `<button class="ae-btn" onclick="openAiEditModal('first')" title="AI 輔助修改第一語言">✦ AI</button>` : ''}
          </div>

                  `<span class="gl-after">${escapeHtml(gc.after)}</span>` +

        <button class="btn btn-ghost" onclick="approveAll()">✓ 全批核</button>

  // ============================================================
  // Waveform rendering
  // ============================================================
  const WF_BINS = 480;
  function renderWaveformBars() {
    const el = document.getElementById('waveformBars');
    if (!waveformPeaks) {
      // Fallback: neutral bars
      el.innerHTML = Array.from({length: WF_BINS}).map((_, i) => {
        const h = 20 + Math.abs(Math.sin(i * 0.31)) * 40;
        return `<div class="rv-wave-bar" style="height:${h}%"></div>`;
      }).join('');
      return;
    }
    el.innerHTML = waveformPeaks.map((p) => {
      const h = Math.max(4, Math.round(p * 100));
      return `<div class="rv-wave-bar" style="height:${h}%"></div>`;
    }).join('');
    updateWavePlayedBars();
  }

  function updateWavePlayedBars() {
    const v = document.getElementById('videoPlayer');
    const dur = (v?.duration || 0) * 1000 || totalMs;
    if (!dur || !waveformPeaks) return;
    const ratio = Math.min(1, ((v?.currentTime || 0) * 1000) / dur);
    const playedN = Math.floor(ratio * waveformPeaks.length);
    const bars = document.getElementById('waveformBars').children;
    for (let i = 0; i < bars.length; i++) {
      bars[i].classList.toggle('played', i < playedN);
    }
  }

  function renderWaveformRegions() {
    const el = document.getElementById('waveformRegions');
    if (!el || !totalMs || segs.length === 0) { if (el) el.innerHTML = ''; return; }
    el.innerHTML = segs.map((s, i) => {
      const left = (s.in / totalMs) * 100;
      const width = ((s.out - s.in) / totalMs) * 100;
      const cur = i === cursorIdx ? 'cur' : '';
      const ap = s.approved ? 'approved' : '';
      const fl = s.flags.length > 0 ? 'flagged' : '';
      return `<div class="rv-wave-region ${cur} ${ap} ${fl}" data-idx="${i}"
                style="left:${left}%;width:${width}%;"
                onclick="setCursor(${i}, true)"
                title="#${s.id} · ${escapeHtml(s.tsIn)}">
                <span class="rv-wave-region-label">${s.id}</span>
              </div>`;
    }).join('');
  }

  function renderWaveformTicks() {
    const el = document.getElementById('waveformTicks');
    if (!el || !totalMs) return;
    const n = 6;
    el.innerHTML = Array.from({length: n}).map((_, i) => {
      const ms = (i / (n - 1)) * totalMs;
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const ss = s - m * 60;
      return `<div class="rv-wave-tick" style="left:${(i / (n - 1)) * 100}%;">${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}</div>`;
    }).join('');
  }

  // Click on waveform (empty area) → seek
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('waveform').addEventListener('click', (e) => {
      if (e.target.closest('.rv-wave-region')) return;  // region clicks handled via setCursor
      const rect = e.currentTarget.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      const v = document.getElementById('videoPlayer');
      if (v && v.duration) v.currentTime = Math.max(0, Math.min(v.duration, v.duration * ratio));
    });
  });

  // ============================================================
  // Cursor navigation
  // ============================================================
  function setCursor(i, alsoSeek) {
    if (i < 0 || i >= segs.length) return;
    cursorIdx = i;
    const s = segs[i];
    document.getElementById('curId').textContent = s.id;
    document.getElementById('curIn').textContent = s.tsIn;
    document.getElementById('curOut').textContent = s.tsOut;
    document.getElementById('curDur').textContent = s.duration;
    renderDetail();
    renderSegList();
    renderWaveformRegions();
    scrollSegIntoView(i);
    if (alsoSeek) {
      const v = document.getElementById('videoPlayer');
      if (v && v.readyState > 0) v.currentTime = s.in / 1000;
    }
  }

  function nav(dir) {
    if (cursorIdx == null) { setCursor(0); return; }
    const next = cursorIdx + dir;
    if (next >= 0 && next < segs.length) {
      setCursor(next, true);
    }
  }

  // ============================================================
  // Edit + approve
  // ============================================================
  // Two parallel dirty flags — EN (original transcript) and ZH (translation)
  // are saved to different endpoints (/segments/<idx> vs /translations/<idx>).
  let dirty = false;     // ZH translation dirty
  let enDirty = false;   // EN transcript dirty
  function onZhInput() {
    const ta = document.getElementById('zhInput');
    if (!ta) return;
    const s = segs[cursorIdx];
    if (!s) return;
    if (ta.value !== s.zh) { ta.classList.add('dirty'); dirty = true; }
    else { ta.classList.remove('dirty'); dirty = false; }
    // Live-update CPS label without full re-render
    const durSec = (s.out - s.in) / 1000;
    const cps = durSec > 0 ? Math.round((ta.value.length / durSec) * 10) / 10 : 0;
    // output_lang: zhInput 係第二語言，CPS label 係第二個 .rv-b-detail-cps 元素
    // 其他模式（profile/V6）：只有一個 .rv-b-detail-cps，querySelector 拎第一個即可
    const isOutputLang = fileInfo && fileInfo.active_kind === 'output_lang';
    const cpsEls = document.querySelectorAll('.rv-b-detail-cps b');
    const cpsEl = isOutputLang ? cpsEls[cpsEls.length - 1] : cpsEls[0];
    if (cpsEl) {
      cpsEl.textContent = cps;
      cpsEl.parentElement.classList.toggle('over', cps > 12);
    }
  }

  function onEnInput() {
    const ta = document.getElementById('enInput');
    if (!ta) return;
    const s = segs[cursorIdx];
    if (!s) return;
    if (ta.value !== s.en) { ta.classList.add('dirty'); enDirty = true; }
    else { ta.classList.remove('dirty'); enDirty = false; }
  }

  function onZhKey(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      approveAndAdvance();
    }
  }

  async function saveEditIfDirty() {
    const ta = document.getElementById('zhInput');
    if (!ta || !dirty) return true;
    const s = segs[cursorIdx];
    if (!s) return true;
    const newText = ta.value.trim();
    // output_lang: 第二語言儲存到 /translations/<idx> with role:"second"
    if (fileInfo && fileInfo.active_kind === 'output_lang') {
      try {
        const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${s.idx}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: newText, role: 'second' }),
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        s.zh = newText;
        s.edited = true;
        // 重算第二語言 CPS
        const dur = (s.out - s.in) / 1000;
        s._cpsSecond = dur > 0 ? Math.round((newText.length / dur) * 10) / 10 : 0;
        dirty = false;
        ta.classList.remove('dirty');
        return true;
      } catch (e) {
        showToast(`儲存第二語言失敗: ${e.message}`, 'error');
        return false;
      }
    }
    // profile / V6 模式：用 zh_text 欄位
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${s.idx}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ zh_text: newText }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      s.zh = newText;
      s.edited = true;
      // Recompute CPS + flags
      const dur = (s.out - s.in) / 1000;
      s.cps = dur > 0 ? Math.round((newText.length / dur) * 10) / 10 : 0;
      s.flags = s.flags.filter(f => f.type !== 'cps');
      if (s.cps > 12) s.flags.push({ type: 'cps', msg: `CPS ${s.cps}` });
      dirty = false;
      ta.classList.remove('dirty');
      return true;
    } catch (e) {
      showToast(`儲存失敗: ${e.message}`, 'error');
      return false;
    }
  }

  async function saveEnIfDirty() {
    const ta = document.getElementById('enInput');
    if (!ta || !enDirty) return true;
    // V6: EN 係 Qwen3 原始粵語（read-only），跳過 PATCH，清 enDirty 讓下游流程繼續。
    if (fileInfo && fileInfo.active_kind === 'pipeline_v6') {
      enDirty = false;
      ta.classList.remove('dirty');
      return true;
    }
    const s = segs[cursorIdx];
    if (!s) return true;
    const newText = ta.value.trim();
    // output_lang: 第一語言儲存到 /translations/<idx> with role:"first"
    if (fileInfo && fileInfo.active_kind === 'output_lang') {
      try {
        const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${s.idx}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: newText, role: 'first' }),
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        s.en = newText;
        // 重算第一語言 CPS
        const dur = (s.out - s.in) / 1000;
        s.cps = dur > 0 ? Math.round((newText.length / dur) * 10) / 10 : 0;
        s.flags = s.flags.filter(f => f.type !== 'cps');
        if (s.cps > 12) s.flags.push({ type: 'cps', msg: `CPS ${s.cps}` });
        enDirty = false;
        ta.classList.remove('dirty');
        return true;
      } catch (e) {
        showToast(`儲存第一語言失敗: ${e.message}`, 'error');
        return false;
      }
    }
    // profile 模式：儲存到 /segments/<idx>
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/segments/${s.idx}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: newText }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      s.en = newText;
      enDirty = false;
      ta.classList.remove('dirty');
      return true;
    } catch (e) {
      showToast(`儲存原文失敗: ${e.message}`, 'error');
      return false;
    }
  }

  // ============================================================
  // AI 輔助修改（ae-*）— spec 2026-06-10-proofread-ai-edit-design.md
  // suggest: POST /api/files/<id>/ai-edit；套用: 現有 PATCH /translations/<idx>
  // ============================================================
  let _aeState = null;   // { idx, role, beforeText, resultText, busy }

  function openAiEditModal(role) {
    const s = segs[cursorIdx];
    if (!s) return;
    const beforeText = role === 'first' ? (s.en || '') : (s.zh || '');
    _aeState = { idx: s.idx, role, beforeText, resultText: null, busy: false };
    document.getElementById('aeTitleSub').textContent =
      ' · ' + (role === 'first' ? (_outputLangLabel('first') || '第一語言') : (_outputLangLabel('second') || '第二語言'));
    document.getElementById('aeBefore').textContent = beforeText || '（空白）';
    document.getElementById('aeInst').value = '';
    document.querySelectorAll('#aeChips .ae-chip').forEach(c => c.classList.remove('on'));
    // 對照翻譯 chip 要有另一語言先有意義
    const hasOther = role === 'first' ? !!s._hasSecond : true;
    document.querySelector('#aeChips [data-k="translate"]').style.display = hasOther ? '' : 'none';
    _aeResetResult();
    document.getElementById('aeOverlay').classList.add('open');
  }

  function closeAiEditModal() {
    document.getElementById('aeOverlay').classList.remove('open');
    _aeState = null;
  }

  function aePickChip(el) {
    document.querySelectorAll('#aeChips .ae-chip').forEach(c => c.classList.toggle('on', c === el));
    const role = _aeState ? _aeState.role : 'first';
    const otherLabel = role === 'first'
      ? (_outputLangLabel('second') || '第二語言')
      : (_outputLangLabel('first') || '第一語言');
    const targetLabel = _outputLangLabel(role) || (role === 'first' ? '第一語言' : '第二語言');
    const texts = {
      // 目標語言要講明 — 唔係 LLM 會將「重新翻譯」理解成譯去參考語言（曾經 en 欄出返中文）
      translate: `根據${otherLabel}嘅意思，將呢段字幕重新翻譯做${targetLabel}`,
      written: '將語氣改得更書面正式',
      spoken: '將語氣改得更口語自然',
      concise: '喺唔改變意思嘅前提下精簡呢句字幕',
    };
    document.getElementById('aeInst').value = texts[el.dataset.k] || '';
    _aeResetResult();
  }

  function _aeResetResult() {
    document.getElementById('aeResult').classList.remove('show');
    document.getElementById('aeAfterHead').style.display = 'none';
    document.getElementById('aeApply').style.display = 'none';
    document.getElementById('aeRetry').style.display = 'none';
    document.getElementById('aeGen').style.display = '';
    document.getElementById('aeLoading').classList.remove('show');
  }

  async function aeGenerate() {
    if (!_aeState || _aeState.busy) return;
    const inst = document.getElementById('aeInst').value.trim();
    if (!inst) { showToast('請輸入指令或撳快速選項', 'warning'); return; }
    if (inst.length > 500) { showToast('指令唔可以超過 500 字', 'warning'); return; }
    _aeState.busy = true;
    // 鎖定本次請求對應嘅 state object — 閂咗再開另一段時，舊 response 必須棄置，
    // 否則舊建議會錯綁落新段/新語言（identity check，唔係 null check）。
    const myState = _aeState;
    const genBtn = document.getElementById('aeGen');
    const retryBtn = document.getElementById('aeRetry');
    genBtn.disabled = true; retryBtn.disabled = true;
    document.getElementById('aeLoading').classList.add('show');
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/ai-edit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pos: myState.idx, role: myState.role, instruction: inst }),
      });
      const data = await r.json().catch(() => ({}));
      if (_aeState !== myState) return; // 生成期間 modal 閂咗/換咗段 — 棄置結果
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      myState.resultText = data.text;
      document.getElementById('aeResult').textContent = data.text;
      document.getElementById('aeResult').classList.add('show');
      document.getElementById('aeAfterHead').style.display = '';
      genBtn.style.display = 'none';
      retryBtn.style.display = '';
      document.getElementById('aeApply').style.display = '';
    } catch (e) {
      showToast(`AI 生成失敗：${e.message}`, 'error');
    } finally {
      myState.busy = false;
      if (_aeState === myState) {
        genBtn.disabled = false; retryBtn.disabled = false;
        document.getElementById('aeLoading').classList.remove('show');
      }
    }
  }

  async function aeApply() {
    if (!_aeState || !_aeState.resultText || _aeState.busy) return;
    _aeState.busy = true;
    const applyBtn = document.getElementById('aeApply');
    applyBtn.disabled = true;
    const { idx, role, resultText } = _aeState;
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${idx}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: resultText, role }),
      });
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        throw new Error(d.error || `HTTP ${r.status}`);
      }
      // 用 idx 搵返段（唔靠 cursorIdx — 防 modal 開住時 cursor 變）
      const s = segs.find(x => x.idx === idx);
      if (s) {
        const dur = (s.out - s.in) / 1000;
        if (role === 'first') {
          s.en = resultText;
          s.cps = dur > 0 ? Math.round((resultText.length / dur) * 10) / 10 : 0;
        } else {
          s.zh = resultText;
          s._cpsSecond = dur > 0 ? Math.round((resultText.length / dur) * 10) / 10 : 0;
        }
        s.edited = true;
        s.approved = true;   // PATCH 後端 auto-approve，前端鏡返
      }
      closeAiEditModal();
      renderDetail();
      renderSegList();
      showToast('已套用 AI 修改 ✓', 'success');
    } catch (e) {
      showToast(`套用失敗：${e.message}`, 'error');
      if (_aeState) _aeState.busy = false;
    } finally {
      applyBtn.disabled = false;
    }
  }

  // ============================================================
  // AI Rerun（單段 + 批量）— spec 2026-06-10-proofread-ai-rerun-design.md
  // POST /api/files/<id>/rerun {positions} → poll GET /api/reruns/<job_id>
  // ============================================================
  let _rerunJob = null;   // { jobId, total, lastDone, timer }

  function _rerunUiSync() {
    const isOL = fileInfo && fileInfo.active_kind === 'output_lang';
    const cluster = document.getElementById('bulkRerunCluster');
    if (!cluster) return;
    cluster.style.display = isOL ? '' : 'none';
    if (!isOL) return;
    const pending = segs.filter(s => !s.approved).length;
    document.getElementById('bulkRerunCount').textContent = pending;
    const running = !!_rerunJob;
    document.getElementById('bulkRerunBtn').style.display = running ? 'none' : '';
    document.getElementById('bulkRerunBtn').disabled = pending === 0;
    document.getElementById('bulkRerunProg').style.display = running ? '' : 'none';
    document.getElementById('bulkRerunCancel').style.display = running ? '' : 'none';
  }

  async function _startRerun(positions) {
    if (_rerunJob) { showToast('已有 AI Rerun 進行中', 'warning'); return; }
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/rerun`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ positions }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
      _rerunJob = { jobId: d.job_id, total: d.total, lastDone: 0, timer: null };
      _rerunJob.timer = setInterval(_pollRerun, 1500);
      _rerunUiSync();
      renderDetail();   // disable 單段掣
      showToast(`AI Rerun 開始（${d.total} 段）`, 'info');
    } catch (e) {
      showToast(`AI Rerun 開唔到：${e.message}`, 'error');
    }
  }

  function startSegmentRerun(pos) { _startRerun([pos]); }

  function startBulkRerun() {
    const positions = segs.filter(s => !s.approved).map(s => s.idx);
    if (!positions.length) { showToast('冇未批核段落', 'info'); return; }
    if (!window.confirm(`將 ${positions.length} 段未批核段落重新 ASR + 翻譯？現有文字會被覆蓋並 reset 做未批核。`)) return;
    _startRerun(positions);
  }

  async function _pollRerun() {
    if (!_rerunJob) return;
    const me = _rerunJob;
    try {
      const r = await fetch(`${API_BASE}/api/reruns/${me.jobId}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      if (_rerunJob !== me) return;
      document.getElementById('bulkRerunProg').textContent = `Rerun 中… ${d.done}/${d.total}`;
      if (d.done > me.lastDone) {
        me.lastDone = d.done;
        await _rerunRefresh();
        // refresh await 期間可能有另一個 tick 已經 finalize 咗呢個 job（甚至開咗新
        // job）— 唔好用 stale 嘅 d 行落去 terminal 分支搞亂新 job 嘅 state。
        if (_rerunJob !== me) return;
      }
      if (d.status !== 'running') {
        clearInterval(me.timer);
        _rerunJob = null;
        await _rerunRefresh();
        const failed = (d.failed_positions || []).length;
        if (d.status === 'cancelled') showToast(`已取消 — 完成咗 ${d.done - failed} 段`, 'info');
        else if (failed) showToast(`Rerun 完成：${d.done - failed} 段成功，${failed} 段失敗`, 'warning');
        else showToast(`Rerun 完成 ✓ ${d.total} 段（請再審核）`, 'success');
      }
    } catch (e) {
      if (_rerunJob !== me) return;
      clearInterval(me.timer);
      _rerunJob = null;
      _rerunUiSync();
      renderDetail();
      showToast(`Rerun 狀態查詢失敗：${e.message}`, 'error');
    }
  }

  async function _rerunRefresh() {
    const keep = cursorIdx;
    // PATCH 編輯冇被 rerun lock 住（係預期工作流）— 用戶喺 detail 欄打緊字時，
    // 唔好重繪 detail pane 抹走佢未儲存嘅輸入；段落表/進度照 refresh。
    const ae = document.activeElement;
    const editingDetail = (ae && (ae.id === 'enInput' || ae.id === 'zhInput')) || dirty || enDirty;
    await loadSegments();
    cursorIdx = (keep != null && keep < segs.length) ? keep : (segs.length ? 0 : null);
    renderProgress();
    renderSegList();
    renderWaveformRegions();
    if (!editingDetail) renderDetail();
    _rerunUiSync();
  }

  async function cancelRerun() {
    if (!_rerunJob) return;
    try {
      const r = await fetch(`${API_BASE}/api/reruns/${_rerunJob.jobId}`, { method: 'DELETE' });
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        throw new Error(d.error || `HTTP ${r.status}`);
      }
      showToast('取消緊… 現段做完即停', 'info');
    } catch (e) {
      showToast(`取消失敗：${e.message}`, 'error');
    }
  }

  async function approveAndAdvance() {
    const s = segs[cursorIdx];
    if (!s) return;
    // Save EN + ZH edits first if dirty (defensive — onblur usually fires
    // before keyboard shortcut, but Cmd+Enter inside a textarea bypasses blur).
    const enSaved = await saveEnIfDirty();
    const zhSaved = await saveEditIfDirty();
    if (!enSaved || !zhSaved) return;
    if (!s.approved) {
      try {
        const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${s.idx}/approve`, { method: 'POST' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        s.approved = true;
      } catch (e) {
        showToast(`批核失敗: ${e.message}`, 'error');
        return;
      }
    }
    renderProgress();
    renderSegList();
    renderWaveformRegions();
    _rerunUiSync();
    // Advance to next non-approved
    let next = cursorIdx + 1;
    while (next < segs.length && segs[next].approved) next++;
    if (next < segs.length) {
      setCursor(next, true);
    } else {
      renderDetail();
      showToast('所有段落已批核 🎉', 'success');
    }
  }

  async function approveAll() {
    if (!confirm('批核所有未批核嘅段落？')) return;
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/approve-all`, { method: 'POST' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      segs.forEach(s => s.approved = true);
      renderProgress();
      renderSegList();
      renderDetail();
      renderWaveformRegions();
      _rerunUiSync();
      showToast('全部已批核', 'success');
    } catch (e) {
      showToast(`批核失敗: ${e.message}`, 'error');
    }
  }

  // ============================================================
  // Video sync
  // ============================================================
  function onVideoTime() {
    const v = document.getElementById('videoPlayer');
    if (!v) return;
    const tMs = v.currentTime * 1000;
    // Playhead
    if (totalMs > 0) {
      const ratio = Math.min(1, tMs / totalMs);
      const ph = document.getElementById('waveformPlayhead');
      ph.style.display = 'block';
      ph.style.left = (ratio * 100) + '%';
    }
    updateWavePlayedBars();

    // Which segment covers the current time?
    const active = segs.findIndex(s => tMs >= s.in && tMs < s.out);

    // Video subtitle overlay — text rendered into FontPreview's SVG.
    if (typeof FontPreview !== 'undefined') {
      if (active >= 0) {
        const s = segs[active];
        const mode = resolveSubtitleSource(fileInfo, activeProfile);
        const order = resolveBilingualOrder(fileInfo, activeProfile);
        FontPreview.updateText(pickSubtitleText({ en: s.en, zh: s.zh }, mode, order));
      } else {
        FontPreview.updateText('');
      }
    }

    // Auto-follow cursor while playing: advance segment rail + timeline region +
    // detail panel to whichever segment contains the current playback time.
    // Skip when the user is editing the ZH textarea so we don't yank focus / lose
    // unsaved changes mid-edit.
    if (active >= 0 && active !== cursorIdx) {
      const editingZh = document.activeElement && document.activeElement.id === 'zhInput';
      if (!editingZh) {
        setCursor(active, false);  // false = don't re-seek video (we're already here)
      }
    }
  }

  // ============================================================
  // Unapprove
  // ============================================================
  async function unapproveSegment(idx) {
    const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${idx}/unapprove`, { method: 'POST' });
    if (!r.ok) { showToast('取消批核失敗', 'error'); return; }
    segs = segs.map((seg, i) => i === idx ? { ...seg, approved: false } : seg);
    renderProgress();
    renderSegList();
    renderWaveformRegions();
    renderDetail();
    _rerunUiSync();
    showToast('已取消批核', 'success');
  }

  // ============================================================
  // Render-resume on reload
  // ============================================================
  async function resumeOngoingRender() {
    if (!fileId) return;
    try {
      const r = await fetch(`${API_BASE}/api/renders/in-progress?file_id=${fileId}`);
      if (!r.ok) return;
      const data = await r.json();
      const job = (data.jobs || [])[0];
      if (!job) return;
      const banner = document.createElement('div');
      banner.id = 'renderResumeBanner';
      banner.style.cssText = 'position:fixed;top:8px;right:8px;background:#ff9800;color:#000;padding:8px 12px;border-radius:4px;font-size:12px;z-index:5000;';
      banner.innerHTML = `🎬 渲染進行中 (${job.format || job.render_id}) <button onclick="cancelRender('${job.render_id}', this.parentElement)" style="margin-left:8px;background:#0004;border:none;border-radius:3px;padding:2px 8px;cursor:pointer;font-size:11px;">取消</button>`;
      document.body.appendChild(banner);
    } catch (_) {}
  }

  async function cancelRender(renderId, bannerEl) {
    try {
      const r = await fetch(`${API_BASE}/api/renders/${renderId}`, { method: 'DELETE' });
      if (r.ok) {
        showToast('已取消渲染', 'success');
        bannerEl?.remove();
      } else {
        showToast('取消渲染失敗', 'error');
      }
    } catch (_) {
      showToast('取消渲染失敗', 'error');
    }
  }

  // ============================================================
  // Find & Replace
  // ============================================================
  let fbMatches = [];    // [{idx, field}]
  let fbCurMatch = -1;

  function openFindBar() {
    const bar = document.getElementById('findBar');
    bar.hidden = false;
    document.getElementById('fbFind').focus();
    document.getElementById('fbFind').select();
    fbSearch();
  }

  function closeFindBar() {
    document.getElementById('findBar').hidden = true;
    fbMatches = [];
    fbCurMatch = -1;
    document.getElementById('fbCount').textContent = '—';
    // Re-render to remove highlights
    renderSegList();
  }

  function fbGetField() {
    const radios = document.querySelectorAll('input[name="fbField"]');
    for (const r of radios) { if (r.checked) return r.value; }
    return 'zh';
  }

  function fbSearch() {
    const query = (document.getElementById('fbFind').value || '').trim();
    const onlyPending = document.getElementById('fbOnlyPending').checked;
    const field = fbGetField();
    fbMatches = [];
    if (!query) {
      fbCurMatch = -1;
      document.getElementById('fbCount').textContent = '—';
      renderSegList();
      return;
    }
    const lq = query.toLowerCase();
    segs.forEach((s, i) => {
      if (onlyPending && s.approved) return;
      const searchZh = field === 'zh' || field === 'both';
      const searchEn = field === 'en' || field === 'both';
      if (searchZh && (s.zh || '').toLowerCase().includes(lq)) {
        fbMatches.push({ idx: i, field: 'zh' });
      } else if (searchEn && (s.en || '').toLowerCase().includes(lq)) {
        fbMatches.push({ idx: i, field: 'en' });
      }
    });
    if (fbCurMatch >= fbMatches.length) fbCurMatch = fbMatches.length - 1;
    if (fbCurMatch < 0 && fbMatches.length > 0) fbCurMatch = 0;
    document.getElementById('fbCount').textContent =
      fbMatches.length > 0 ? `${fbCurMatch + 1}/${fbMatches.length}` : '0 個';
    renderSegList();
    if (fbMatches.length > 0) {
      const m = fbMatches[fbCurMatch];
      if (m) {
        setCursor(m.idx, false);
        scrollSegIntoView(m.idx);
      }
    }
  }

  function fbNav(dir) {
    if (!fbMatches.length) return;
    fbCurMatch = (fbCurMatch + dir + fbMatches.length) % fbMatches.length;
    document.getElementById('fbCount').textContent = `${fbCurMatch + 1}/${fbMatches.length}`;
    const m = fbMatches[fbCurMatch];
    if (m) {
      setCursor(m.idx, false);
      scrollSegIntoView(m.idx);
    }
    renderSegList();
  }

  async function fbReplaceCurrent() {
    if (!fbMatches.length || fbCurMatch < 0) return;
    const m = fbMatches[fbCurMatch];
    if (!m) return;
    if (m.field !== 'zh') { showToast('取代僅支援 ZH 欄位', 'warning'); return; }
    const query = document.getElementById('fbFind').value;
    const replacement = document.getElementById('fbReplace').value;
    const s = segs[m.idx];
    if (!s) return;
    const newZh = (s.zh || '').replaceAll(query, replacement);
    if (newZh === s.zh) return;
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${s.idx}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ zh_text: newZh }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      segs = segs.map((seg, i) => i === s.idx ? { ...seg, zh: newZh, approved: data.translation?.status === 'approved', edited: true } : seg);
      fbSearch();
      showToast('已取代', 'success');
    } catch (e) {
      showToast(`取代失敗: ${e.message}`, 'error');
    }
  }

  async function fbReplaceAll() {
    if (!fbMatches.length) return;
    const query = document.getElementById('fbFind').value;
    const replacement = document.getElementById('fbReplace').value;
    const zhMatches = fbMatches.filter(m => m.field === 'zh');
    if (!zhMatches.length) { showToast('無可取代的 ZH 匹配', 'warning'); return; }
    // R6 audit E3 — track failure count + first error message so the user
    // knows when some PATCHes silently failed (e.g. backend 403 / 500).
    // Pre-fix the loop did `if (!r.ok) continue;` with no count, leaving
    // the user to think "已取代 N 處" was the full picture when it might
    // have been partial.
    let count = 0;
    let failCount = 0;
    let firstErr = '';
    for (const m of zhMatches) {
      const s = segs[m.idx];
      if (!s) continue;
      const newZh = (s.zh || '').replaceAll(query, replacement);
      if (newZh === s.zh) continue;
      try {
        const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${s.idx}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ zh_text: newZh }),
        });
        if (!r.ok) {
          failCount++;
          if (!firstErr) {
            const body = await r.json().catch(() => ({}));
            firstErr = body.error || `HTTP ${r.status}`;
          }
          continue;
        }
        const repData = await r.json();
        segs = segs.map((seg, i) => i === s.idx ? { ...seg, zh: newZh, approved: repData.translation?.status === 'approved', edited: true } : seg);
        count++;
      } catch (e) {
        failCount++;
        if (!firstErr) firstErr = e.message || '網絡錯誤';
      }
    }
    if (failCount > 0) {
      showToast(`已取代 ${count} 處，${failCount} 處失敗（${firstErr}）`, count > 0 ? 'warning' : 'error');
    } else {
      showToast(`已取代 ${count} 處`, 'success');
    }
    fbSearch();
  }

  // renderSegList — wraps _renderSegListBase to add find-bar match highlights
  function renderSegList() {
    _renderSegListBase();
    const query = (document.getElementById('fbFind')?.value || '').trim();
    if (!query || document.getElementById('findBar')?.hidden) return;
    // Add highlight marks to matched rail items
    fbMatches.forEach((m, mi) => {
      const row = document.querySelector(`.rv-b-rail-item[data-idx="${m.idx}"]`);
      if (!row) return;
      // Source/first matches highlight line 1; translation/second matches line 2.
      const textEl = m.field === 'zh'
        ? row.querySelector('.rv-b-rail-text-2')
        : row.querySelector('.rv-b-rail-text-1');
      if (!textEl) return;
      const isCur = mi === fbCurMatch;
      const s = segs[m.idx];
      if (!s) return;
      const raw = m.field === 'zh' ? (s.zh || '(未翻譯)') : (s.en || '');
      const cls = isCur ? 'fb-match fb-cur' : 'fb-match';
      const lq = query.toLowerCase();
      let out = '';
      let last = 0;
      let idx = raw.toLowerCase().indexOf(lq, last);
      while (idx !== -1) {
        out += escapeHtml(raw.slice(last, idx));
        out += `<mark class="${cls}">${escapeHtml(raw.slice(idx, idx + query.length))}</mark>`;
        last = idx + query.length;
        idx = raw.toLowerCase().indexOf(lq, last);
      }
      out += escapeHtml(raw.slice(last));
      textEl.innerHTML = out;
    });
  }

  // ============================================================
  // Keyboard navigation
  // ============================================================
  document.addEventListener('keydown', (e) => {
    const tag = e.target.tagName;
    const inInput = tag === 'TEXTAREA' || tag === 'INPUT';

    // Cmd+F / Ctrl+F → open find bar (intercept even in inputs)
    if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
      e.preventDefault();
      openFindBar();
      return;
    }
    // Escape → close find bar first; if not open, let the GA modal listener handle it
    if (e.key === 'Escape') {
      const bar = document.getElementById('findBar');
      if (!bar.hidden) { closeFindBar(); e.preventDefault(); return; }
    }
    // Cmd+F / Ctrl+F handled above — skip everything else
    // Enter / Shift+Enter in find input → navigate
    if (inInput && e.target.id === 'fbFind') {
      if (e.key === 'Enter') {
        e.preventDefault();
        fbNav(e.shiftKey ? -1 : 1);
        return;
      }
    }

    // Segment split/merge — fire even while editing a textarea (before inInput guard).
    // Note: Ctrl+Shift+D / Ctrl+Shift+M may be shadowed by browser shortcuts on some
    // platforms; the row buttons are the primary path.
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'S' || e.key === 's')) {
      e.preventDefault(); if (cursorIdx != null && cursorIdx >= 0) splitSegment(cursorIdx, 'ai'); return;
    }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'D' || e.key === 'd')) {
      e.preventDefault(); if (cursorIdx != null && cursorIdx >= 0) splitSegment(cursorIdx, 'mechanical'); return;
    }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'M' || e.key === 'm')) {
      e.preventDefault(); if (cursorIdx != null && cursorIdx >= 0) mergeNext(cursorIdx); return;
    }

    // Cmd+Enter works even in textarea (handled by onZhKey) — skip here
    if (inInput) return;
    // 中文輸入法 composition 期間字母鍵會被 IME 食咗（e.key='Process'）— J/K 會「死」。
    // 箭咀鍵唔受 IME 影響，所以 ↑/↓ 係更可靠嘅段落導航（README 一直記載），J/K 保留。
    if (e.isComposing) return;
    if (e.key === 'j' || e.key === 'J' || e.key === 'ArrowUp') { e.preventDefault(); nav(-1); }
    else if (e.key === 'k' || e.key === 'K' || e.key === 'ArrowDown') { e.preventDefault(); nav(1); }
    else if (e.key === ' ') {
      e.preventDefault();
      const v = document.getElementById('videoPlayer');
      if (v) { v.paused ? v.play() : v.pause(); }
    }
    else if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      approveAndAdvance();
    }
  });

  // ============================================================
  // Init
  // ============================================================
  init();

  // Esc closes the open Glossary Apply modal — keyboard accessibility.
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (e.target && e.target.tagName === 'TEXTAREA') return;
    const ae = document.getElementById('aeOverlay');
    if (ae?.classList.contains('open')) {
      closeAiEditModal();
      e.preventDefault();
      return;
    }
    const ga = document.getElementById('gaOverlay');
    if (ga?.classList.contains('open')) {
      ga.classList.remove('open');
      e.preventDefault();
    }
  });

  // R5 Phase 4 — mobile tab switcher
  function switchProofreadMobileTab(tab) {
    const videoBtn = document.getElementById("proofreadMobileTabVideo");
    const segBtn = document.getElementById("proofreadMobileTabSegments");
    const videoPane = document.querySelector(".proofread-video-pane");
    const segPane = document.querySelector(".proofread-segments-pane");
    if (tab === "video") {
      videoBtn.classList.add("active");
      segBtn.classList.remove("active");
      videoPane.classList.add("active");
      segPane.classList.remove("active");
    } else {
      segBtn.classList.add("active");
      videoBtn.classList.remove("active");
      segPane.classList.add("active");
      videoPane.classList.remove("active");
    }
  }
  window.switchProofreadMobileTab = switchProofreadMobileTab;
</script>

<!-- Glossary Apply Modal -->
<div class="ga-overlay" id="gaOverlay">
  <div class="ga-modal">
    <div class="ga-header">
      <span id="gaTitle">詞彙表套用</span>
      <button class="ga-close" onclick="closeGlossaryApplyModal()" aria-label="關閉詞彙表套用">&times;</button>
    </div>
    <div class="ga-body" id="gaBody"></div>
    <div class="ga-footer" id="gaFooter">
      <button class="btn btn-ghost" onclick="closeGlossaryApplyModal()">取消</button>
      <button class="btn btn-primary" id="gaApplyBtn" onclick="applySelectedViolations()">套用選中 (0)</button>
    </div>
  </div>
</div>

<div class="ae-overlay" id="aeOverlay">
  <div class="ae-modal">
    <div class="ae-header">
      <span>✦ AI 輔助修改<span class="ae-sub" id="aeTitleSub"></span></span>
      <button class="ae-close" onclick="closeAiEditModal()" aria-label="關閉 AI 輔助修改">&times;</button>
    </div>
    <div class="ae-body">
      <div class="ae-sec">修改前</div>
      <div class="ae-before" id="aeBefore"></div>
      <div class="ae-sec">快速選項（撳完可再修改指令）</div>
      <div class="ae-chips" id="aeChips">
        <button class="ae-chip" data-k="translate" onclick="aePickChip(this)">⇄ 對照翻譯</button>
        <button class="ae-chip" data-k="written" onclick="aePickChip(this)">改更書面</button>
        <button class="ae-chip" data-k="spoken" onclick="aePickChip(this)">改更口語</button>
        <button class="ae-chip" data-k="concise" onclick="aePickChip(this)">精簡句子</button>
      </div>
      <div class="ae-sec">指令</div>
      <textarea class="ae-inst" id="aeInst" placeholder="輸入你想 AI 點樣修改呢段字幕，例如：將「傷感」改做「難過」"></textarea>
      <div class="ae-loading" id="aeLoading"><span class="ae-spin"></span>AI 生成中…</div>
      <div class="ae-sec" id="aeAfterHead" style="display:none">修改後（預覽）</div>
      <div class="ae-result" id="aeResult"></div>
    </div>
    <div class="ae-footer">
      <button class="btn btn-ghost" onclick="closeAiEditModal()">取消</button>
      <div class="spacer"></div>
      <button class="btn btn-ghost" id="aeRetry" onclick="aeGenerate()" style="display:none">↻ 再生成</button>
      <button class="btn btn-primary" id="aeGen" onclick="aeGenerate()">生成</button>
      <button class="btn btn-primary" id="aeApply" onclick="aeApply()" style="display:none">✓ 套用</button>
    </div>
  </div>
</div>
