<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoTitle — 字幕校對</title>
  <style>
    /* ============================================================
       Tokens — shared with Dashboard (Bold variant)
       ============================================================ */
    :root {
      --bg: #0a0a0f;
      --bg-soft: #0f0f18;
      --surface: #13131a;
      --surface-2: #1a1a24;
      --surface-3: #222232;
      --border: #2a2a3d;
      --border-strong: #35354d;
      --text: #e6e6f0;
      --text-mid: #a8a8bf;
      --text-dim: #6e6e85;
      --accent: #6c63ff;
      --accent-2: #a78bfa;
      --accent-soft: rgba(108, 99, 255, 0.12);
      --accent-softer: rgba(108, 99, 255, 0.06);
      --accent-ring: rgba(108, 99, 255, 0.35);
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #38bdf8;
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 0 rgba(255,255,255,0.03), 0 2px 8px rgba(0,0,0,0.25);
      --shadow: 0 12px 40px rgba(0,0,0,0.45);
      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
    }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
    input, select, textarea { font: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
    .mono { font-family: var(--font-mono); }
    .spacer { flex: 1; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; padding: 8px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 600; white-space: nowrap;
      border: 1px solid transparent;
      transition: background .15s, border-color .15s, color .15s, transform .05s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5b52e0; }
    .btn-primary[disabled] { opacity: 0.5; pointer-events: none; }
    .btn-secondary { background: var(--surface-2); color: var(--text); border-color: var(--border); }
    .btn-secondary:hover { border-color: var(--border-strong); background: var(--surface-3); }
    .btn-ghost { color: var(--text-mid); }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

    .kbd {
      display: inline-flex; align-items: center;
      padding: 2px 6px;
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-mid);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 5px;
      line-height: 1;
    }

    /* ============================================================
       Bold rail (same as Dashboard) — persistent left nav
       ============================================================ */
    .bold {
      display: grid;
      grid-template-columns: 64px 1fr;
      height: 100vh;
      min-height: 0;
      background: var(--bg);
    }
    .b-rail {
      background: var(--bg-soft);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center;
      padding: 14px 0;
      gap: 8px;
      z-index: 110;
      position: relative;
    }
    .b-rail .mark {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 15px;
      margin-bottom: 10px;
    }
    .rail-btn {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 16px;
      position: relative;
    }
    .rail-btn:hover { color: var(--text); background: var(--surface-2); }
    .rail-btn.on { color: var(--accent-2); background: var(--accent-soft); }
    .rail-btn.on::before {
      content: ""; position: absolute; left: -14px; top: 10px; bottom: 10px;
      width: 3px; border-radius: 2px; background: var(--accent);
    }
    .rail-btn .tt {
      position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%);
      background: var(--surface); color: var(--text);
      padding: 4px 10px; border-radius: 6px;
      font-size: 11px; white-space: nowrap;
      border: 1px solid var(--border);
      opacity: 0; pointer-events: none;
      transition: opacity .15s;
      z-index: 5;
    }
    .rail-btn:hover .tt { opacity: 1; }
    .b-rail .flex1 { flex: 1; }

    /* ============================================================
       Review shell — sits to the right of the rail
       ============================================================ */
    .rv-shell {
      display: flex; flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }

    .rv-header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-width: 0;
      position: relative; z-index: 40;
    }
    /* Backend model health pills (restored). */
    .health-cluster { display: flex; align-items: center; gap: 6px; }
    .hpill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 9px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface-2); white-space: nowrap; }
    .hpill .led { width: 7px; height: 7px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }
    .hpill .hk { font-size: 9px; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-dim); }
    .hpill .hv { font-size: 10.5px; color: var(--text-mid); font-family: var(--font-mono); }
    @media (max-width: 1100px) { .hpill { display: none; } }
    .rv-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-mid);
      font-size: 12px; font-weight: 600;
      cursor: pointer;
    }
    .rv-back:hover { background: var(--surface-3); border-color: var(--border-strong); color: var(--text); }
    .rv-sep { color: var(--text-dim); font-family: var(--font-mono); }
    .rv-title { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 0 1 auto; }
    .rv-mode { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
    .rv-fname {
      font-size: 13px; color: var(--text-mid);
      font-family: var(--font-mono);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 360px;
    }
    .rv-progress {
      display: flex; align-items: center; gap: 8px;
      margin-left: 8px;
      padding: 4px 12px;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    }
    .rv-prog-track { width: 120px; height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
    .rv-prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 2px; transition: width 0.3s; }
    .rv-prog-num { font-family: var(--font-mono); font-size: 11px; color: var(--text-mid); letter-spacing: 0.02em; }
    .rv-prog-num b { color: var(--text); font-weight: 700; }
    .rv-kbd-hint {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-dim);
      padding-left: 10px;
      border-left: 1px solid var(--border);
    }
    .rv-kbd-hint > span { margin-right: 4px; }

    .rv-body { flex: 1; min-height: 0; display: flex; overflow: hidden; }

    /* ============================================================
       Shared: QA flag pill, confidence bar, glossary chip
       ============================================================ */
    .qa-flag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px;
      font-size: 10.5px; font-weight: 700;
      border-radius: 4px;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .qa-flag-amber { background: rgba(245,158,11,0.14); color: #fbbf24; }
    .qa-flag-rose  { background: rgba(244,63,94,0.14);  color: #fb7185; }
    .qa-flag.lg { padding: 4px 10px; font-size: 11.5px; }

    .conf-bar { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); }
    .conf-track { width: 40px; height: 3px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
    .conf-fill { height: 100%; border-radius: 2px; }
    .conf-good .conf-fill { background: var(--success); }
    .conf-ok   .conf-fill { background: var(--warning); }
    .conf-bad  .conf-fill { background: var(--danger); }
    .conf-num { font-size: 10px; color: var(--text-dim); min-width: 16px; text-align: right; }
    .conf-stub .conf-fill { background: var(--border-strong); width: 100%; }
    .conf-stub .conf-num { color: var(--text-dim); }

    .rv-gloss-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px;
      background: var(--accent-softer);
      border: 1px solid var(--accent-ring);
      border-radius: 5px;
      font-size: 11.5px;
    }
    .rv-gloss-en { font-family: var(--font-mono); color: var(--text-mid); }
    .rv-gloss-arrow { color: var(--accent-2); }
    .rv-gloss-zh { color: var(--text); font-weight: 600; }

    /* ============================================================
       Waveform — shared across variants
       ============================================================ */
    .rv-wave {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }
    .rv-wave-bars {
      position: absolute; inset: 0 0 14px 0;
      display: flex; align-items: center; padding: 0 6px; gap: 0;
      pointer-events: none;
    }
    .rv-wave-bar {
      flex: 1 1 0;
      min-width: 1px;
      background: var(--border-strong);
      border-radius: 1px;
      min-height: 2px;
    }
    .rv-wave-bar.played { background: var(--accent-2); }
    .rv-wave-regions { position: absolute; inset: 0 0 14px 0; pointer-events: none; }
    .rv-wave-region {
      position: absolute; top: 0; bottom: 0;
      background: rgba(108,99,255,0.05);
      border-left: 1px solid rgba(108,99,255,0.25);
      border-right: 1px solid rgba(108,99,255,0.25);
      pointer-events: auto;
      cursor: pointer;
    }
    .rv-wave-region.approved { background: rgba(34,197,94,0.06); border-color: rgba(34,197,94,0.3); }
    .rv-wave-region.flagged { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.35); }
    .rv-wave-region.cur {
      background: rgba(108,99,255,0.18) !important;
      border-color: var(--accent) !important;
      box-shadow: inset 0 0 0 1px var(--accent);
    }
    .rv-wave-region-label {
      position: absolute; left: 2px; top: 2px;
      font-family: var(--font-mono); font-size: 9px; color: var(--text-dim);
      pointer-events: none;
    }
    .rv-wave-region.cur .rv-wave-region-label { color: var(--accent-2); font-weight: 700; }
    .rv-wave-playhead { position: absolute; top: 0; bottom: 14px; width: 1px; background: #fff; pointer-events: none; z-index: 2; }
    .rv-wave-playhead-dot {
      position: absolute; top: -3px; left: -4px;
      width: 9px; height: 9px; background: #fff;
      border-radius: 50%;
    }
    .rv-wave-ticks { position: absolute; left: 0; right: 0; bottom: 0; height: 14px; border-top: 1px solid var(--border); }
    .rv-wave-tick {
      position: absolute; top: 2px;
      font-family: var(--font-mono); font-size: 9px; color: var(--text-dim);
      transform: translateX(-50%);
    }

    /* ============================================================
       Variant B — Timeline Editor
       ============================================================ */
    .rv-b { display: grid; grid-template-columns: 340px 1fr; grid-template-rows: minmax(0, 1fr); gap: 12px; padding: 12px 14px; width: 100%; min-height: 0; flex: 1; overflow: hidden; }
    @media (max-width: 1280px) { .rv-b { grid-template-columns: 280px 1fr; } .rv-fname { max-width: 220px; } .rv-kbd-hint { display: none; } }
    @media (max-width: 768px) {
      .rv-b { grid-template-columns: 1fr; grid-template-rows: none; padding: 8px; gap: 8px; overflow-y: auto; overflow-x: hidden; }
      .rv-body { overflow-y: auto; }
    }

    /* flex:1 1 0 so each fills its .proofread-*-pane (the full-height grid cell); the
       inner rail-list / vid-panels then scroll and the timeline stays pinned. */
    .rv-b-left { display: flex; flex-direction: column; gap: 12px; min-height: 0; min-width: 0; flex: 1 1 0; }
    .rv-b-right { display: flex; flex-direction: column; gap: 12px; min-height: 0; min-width: 0; flex: 1 1 0; }
    /* flex: 1 1 0 + min-height:0 + overflow:hidden lets the whole top block SHRINK
       (panels scroll inside) instead of pushing the timeline off the bottom. */
    .rv-b-top-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; flex: 1 1 0; min-height: 0; overflow: hidden; }
    @media (max-width: 768px) { .rv-b-top-row { grid-template-columns: 1fr; } }
    .rv-b-video-col { display: flex; flex-direction: column; gap: 6px; min-height: 0; }

    /* Cap the video preview with a viewport-relative height (not its raw 16:9
       height) so the 詞彙表 / 字幕設定 panels below always get usable room and the
       字幕設定 controls don't get squeezed into a scroll. vh-based so it adapts to
       browser zoom (px would not). On short windows the video pillarboxes a touch
       (object-fit: contain) rather than eating all the column height. */
    /* Fixed-size video pinned to the TOP of the column (not stretched/centered), so the
       panels below get a stable expanded block beneath it. */
    .rv-b-video-wrap { flex: 0 0 auto; min-height: 0; max-height: clamp(200px, 42vh, 400px); overflow: hidden; }
    /* Panels grow to fill the space the capped video frees up, but min-height:0 lets
       them SHRINK + scroll internally on short windows so the timeline below is never
       clipped. The video cap (above) is what gives them height when there is room. */
    /* Glossary + 字幕設定: always expanded, side-by-side, filling the height below the
       fixed top-aligned video — a stable, balanced lower block. */
    .rv-b-vid-panels {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      flex: 1 1 auto; min-height: 0;
    }
    .rv-b-vid-panels > * { min-height: 0; }
    /* When stacked (≤1024) split the available height into two scrolling rows rather
       than letting content height push the layout (and the timeline) past the fold. */
    @media (max-width: 1024px) { .rv-b-vid-panels { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; min-height: 0; } }

    .rv-b-glossary {
      display: flex; flex-direction: column; min-height: 0; min-width: 0; overflow: hidden;
      background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
    }
    .rv-b-glossary-head {
      display: flex; align-items: center; gap: 6px; min-width: 0;
      padding: 7px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .rv-b-glossary-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); flex-shrink: 0; white-space: nowrap; }
    .rv-b-glossary-select { flex: 1; min-width: 0; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 11px; padding: 2px 4px; }
    .rv-b-glossary-body { flex: 1; min-height: 0; overflow-y: auto; }
    .rv-b-glossary-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .rv-b-glossary-table th { padding: 2px 6px; text-align: left; color: var(--text-dim); font-size: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); line-height: 1.3; }
    .rv-b-glossary-table td { padding: 1px 6px; color: var(--text); line-height: 1.3; }
    .rv-b-glossary-table tr:hover td { background: var(--surface-2); }
    .rv-b-glossary-table .btn-sm { padding: 1px 4px; font-size: 11px; min-height: 0; line-height: 1.2; gap: 2px; }
    .rv-b-glossary-table td:last-child { padding: 1px 2px; }
    .rv-b-glossary-table td:last-child .btn-sm + .btn-sm { margin-left: 2px; }
    .rv-b-glossary-input { width: 100%; background: var(--surface-2); border: 1px solid var(--accent); border-radius: 3px; color: var(--text); font-size: 11px; padding: 0 4px; box-sizing: border-box; line-height: 1.4; }

    .rv-b-subtitle-settings {
      display: flex; flex-direction: column; min-height: 0; min-width: 0; overflow: hidden;
      background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
    }
    .rv-b-ss-head { padding: 7px 10px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); flex-shrink: 0; white-space: nowrap; }

    /* 字幕設定 panel body — mirrors the dashboard inspector「字幕設定」display:
       a preview strip then grouped slider / colour-swatch sections. Controls
       write `fontConfig`, refresh the FontPreview SVG overlay, and debounce-PATCH
       the active profile (rendered into #ssBody by renderSubtitleSettings). */
    .rv-b-ss-body { flex: 1; min-height: 0; overflow-y: auto; }
    .rv-b-ss-body .sub-preview { padding: 10px 12px 12px; border-bottom: 1px solid var(--surface-2); background: var(--bg-soft, var(--surface-2)); }
    .rv-b-ss-body .sub-preview-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 6px; }
    .rv-b-ss-body .sub-preview-stage { height: 60px; border-radius: 6px; position: relative; overflow: hidden; background: linear-gradient(135deg, #1a1a2a 0%, #0a0a14 100%); }
    .rv-b-ss-body .sub-preview-text { position: absolute; left: 0; right: 0; bottom: 8px; text-align: center; color: #fff; font-weight: 500; text-shadow: 0 0 2px #000, 0 1px 2px rgba(0,0,0,0.8); padding: 4px 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rv-b-ss-body .ss-group { padding: 10px 12px; border-bottom: 1px solid var(--surface-2); }
    .rv-b-ss-body .ss-group:last-of-type { border-bottom: 0; }
    .rv-b-ss-body .ss-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 9px; }
    .rv-b-ss-body .ss-row { display: grid; grid-template-columns: 40px 1fr; gap: 8px; align-items: center; margin-bottom: 9px; }
    .rv-b-ss-body .ss-row:last-child { margin-bottom: 0; }
    .rv-b-ss-body .ss-row > label { font-size: 12px; color: var(--text-mid); }
    .rv-b-ss-body .ss-row select { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 5px 7px; border-radius: 6px; font-size: 12px; width: 100%; box-sizing: border-box; }
    .rv-b-ss-body .swatch-pick { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .rv-b-ss-body .swatch-pick .sw { width: 22px; height: 22px; border-radius: 5px; border: 2px solid transparent; cursor: pointer; position: relative; }
    .rv-b-ss-body .swatch-pick .sw.on { border-color: var(--text); box-shadow: 0 0 0 2px var(--accent-ring); }
    .rv-b-ss-body .swatch-pick .sw.custom { background: var(--surface-2); border: 1px dashed var(--border-strong); color: var(--text-dim); font-size: 13px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .rv-b-ss-body .swatch-pick .sw.custom input[type=color] { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; padding: 0; border: 0; }
    .rv-b-ss-body .slider-row { margin-bottom: 9px; }
    .rv-b-ss-body .slider-row:last-child { margin-bottom: 0; }
    .rv-b-ss-body .slider-row .labels { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; color: var(--text-mid); margin-bottom: 4px; }
    .rv-b-ss-body .slider-row .labels .v { color: var(--accent-2); font-family: var(--font-mono); }
    .rv-b-ss-body .slider-row input[type=range] { width: 100%; accent-color: var(--accent); }
    .rv-b-ss-body .range-hints { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 2px; }

    /* Glossary Apply Modal */
    .ga-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 3000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .ga-overlay.open { opacity: 1; pointer-events: auto; }
    .ga-modal {
      background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
      width: 520px; max-height: 70vh; display: flex; flex-direction: column;
      box-shadow: var(--shadow);
    }
    .ga-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; font-weight: 700; color: var(--text);
    }
    .ga-close {
      background: none; border: none; color: var(--text-dim); font-size: 18px;
      cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .ga-close:hover { color: var(--text); }
    .ga-body { flex: 1; overflow-y: auto; padding: 12px 18px; }
    .ga-section-head {

<script>
  // ============================================================
  // Config + state
  // ============================================================
  const API_BASE = '';
  const urlParams = new URLSearchParams(location.search);
  const fileId = urlParams.get('file_id');

  let fileInfo = null;        // { id, original_name, duration, ... }
  let segs = [];              // enriched: { idx, id, en, zh, in, out, tsIn, tsOut, duration, cps, approved, edited, flags, ... }
  let _olLangs = [];  // output_lang language descriptors, reused by split/merge
  let _segOpBusy = false;
  let cursorIdx = null;       // index into segs
  let totalMs = 0;            // video duration in ms
  let waveformPeaks = null;
  let glossaryId = null;          // selected glossary ID
  let glossaryEntries = [];       // current glossary entries
  let activeProfileId = null;     // for PATCH font settings (null in V6 / output_lang → global preset)
  let activeProfile = null;       // full profile so resolvers see font.subtitle_source / bilingual_order

  // Font config mirrors active profile's `font` — read-only on this page;
  // user edits live on the Dashboard's 字幕設定 tab + 💾 儲存為預設.
  // Defaults match backend's DEFAULT_FONT_CONFIG so the overlay never goes
  // bare-CSS even before /api/profiles/active resolves.
  let fontConfig = {
    family: 'Noto Sans TC',
    size: 32,
    color: '#ffffff',
    outline_color: '#000000',
    outline_width: 2,
    margin_bottom: 40,
  };

  // ============================================================
  // Helpers
  // ============================================================
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Resolve segment text per subtitle source mode.
  // Mirrors backend backend/subtitle_text.py resolve_segment_text exactly.
  // Handles role-based values: 'first' (= legacy 'en'), 'second' (= legacy 'zh').
  function pickSubtitleText(seg, mode = 'auto', order = 'en_top') {
    const en = (seg.en || seg._en_text || seg.text || '').trim();
    let zh = (seg.zh || seg.zh_text || '').trim();
    // Strip leading [long]/[review] QA markers (legacy registry data).
    zh = zh.replace(/^\s*(?:\[(?:NEEDS\s+REVIEW|long|review|LONG|REVIEW)\]\s*)+/, '').trim();
    // Map role-based values to their legacy equivalents.
    const _mode = mode === 'first' ? 'en' : mode === 'second' ? 'zh' : mode;
    if (_mode === 'en') return en;
    if (_mode === 'zh') return zh || en;
    if (_mode === 'bilingual') {
      if (!en) return zh;
      if (!zh) return en;
      return order === 'en_top' ? `${en}\n${zh}` : `${zh}\n${en}`;
    }
    return zh || en;
  }

  // Resolve subtitle source from a file entry, falling back to the active profile.
  // Accepts role-based values ('first'/'second') in addition to legacy values.
  function resolveSubtitleSource(fileEntry, profile) {
    const v = (fileEntry || {}).subtitle_source;
    if (v === 'auto' || v === 'en' || v === 'zh' || v === 'bilingual' || v === 'first' || v === 'second') return v;
    const p = ((profile || {}).font || {}).subtitle_source;
    if (p === 'auto' || p === 'en' || p === 'zh' || p === 'bilingual' || p === 'first' || p === 'second') return p;
    // No explicit override → DEFAULT by language count: 2 languages → 雙語, else the
    // single first language. Just a default — the user can still pick 第一/第二/雙語.
    const langs = (fileEntry && Array.isArray(fileEntry.languages)) ? fileEntry.languages : [];
    return langs.length >= 2 ? 'bilingual' : 'first';
  }
  function resolveBilingualOrder(fileEntry, profile) {
    const v = (fileEntry || {}).bilingual_order;
    if (v === 'en_top' || v === 'zh_top') return v;
    const p = ((profile || {}).font || {}).bilingual_order;
    if (p === 'en_top' || p === 'zh_top') return p;
    return 'en_top';
  }

  // ============================================================
  // Subtitle source dropdown handlers
  // ============================================================
  function syncSourceDropdowns() {
    const srcSel = document.getElementById('proofreadSourceMode');
    const ordSel = document.getElementById('proofreadBilingualOrder');
    if (!srcSel) return;

    // Rebuild options from the file's languages descriptor when available.
    const langs = (fileInfo && Array.isArray(fileInfo.languages)) ? fileInfo.languages : [];
    const firstLang = langs.find(l => l.role === 'first');
    const secondLang = langs.find(l => l.role === 'second');
    const hasDescriptor = langs.length > 0;

    if (hasDescriptor) {
      // Clear and rebuild dynamically.
      srcSel.innerHTML = '';

      // "Follow Profile" option (value = '').
      const followOpt = document.createElement('option');
      followOpt.value = '';
      followOpt.id = 'proofreadSourceModeFollow';
      const p = (activeProfile && activeProfile.font && activeProfile.font.subtitle_source) || 'auto';
      const pLabel = ({auto:'Auto', en:'EN', zh:'ZH', bilingual:'雙語', first:'第一語言', second:'第二語言'})[p] || 'Auto';
      followOpt.textContent = `— 跟 Profile（${pLabel}）—`;
      srcSel.appendChild(followOpt);

      if (firstLang) {
        const opt = document.createElement('option');
        opt.value = 'first';
        const _fc = (firstLang.lang || '').toUpperCase() || (firstLang.label || '原文');
        opt.textContent = `第一語言（${_fc}）`;
        opt.title = `第一語言 · ${firstLang.label || '原文'}（${(firstLang.lang || '').toUpperCase()}）`;
        srcSel.appendChild(opt);
      }
      if (secondLang) {
        const opt = document.createElement('option');
        opt.value = 'second';
        const _sc = (secondLang.lang || '').toUpperCase() || (secondLang.label || '譯文');
        opt.textContent = `第二語言（${_sc}）`;
        opt.title = `第二語言 · ${secondLang.label || '譯文'}（${(secondLang.lang || '').toUpperCase()}）`;
        srcSel.appendChild(opt);

        const biOpt = document.createElement('option');
        biOpt.value = 'bilingual';
        biOpt.textContent = '雙語';
        srcSel.appendChild(biOpt);
      }
    } else {
      // Keep static options but update the "Follow Profile" label.
      const followOpt = document.getElementById('proofreadSourceModeFollow');
      if (followOpt) {
        const p = (activeProfile && activeProfile.font && activeProfile.font.subtitle_source) || 'auto';
        const label = ({auto:'Auto', en:'EN', zh:'ZH', bilingual:'雙語'})[p] || 'Auto';
        followOpt.textContent = `— 跟 Profile（${label}）—`;
      }
    }

    // No explicit override → show the default selection (2 langs → 雙語, else 第一語言)
    // so the dropdown reflects what's displayed; the user can still change it.
    const _defaultSrc = secondLang ? 'bilingual' : 'first';
    srcSel.value = (fileInfo && fileInfo.subtitle_source) ? fileInfo.subtitle_source : _defaultSrc;

    if (ordSel) {
      ordSel.value = (fileInfo && fileInfo.bilingual_order) ? fileInfo.bilingual_order : 'en_top';
      // Show the order picker whenever the EFFECTIVE source is bilingual (incl. default).
      ordSel.style.display = (srcSel.value === 'bilingual') ? '' : 'none';
    }
  }

  // Parse JSON safely; if backend returned HTML (e.g. 405 from an outdated
  // server), fall back to a meaningful error rather than choking on `<!doctype`.
  async function _parseJsonOrThrow(r, fallbackMsg) {
    const text = await r.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch (_) { /* not JSON */ }
    if (!r.ok) {
      const apiErr = data && data.error;
      if (apiErr) throw new Error(apiErr);
      if (r.status === 405) throw new Error('伺服器未支援呢個操作（請重啟後端 server）');
      throw new Error(`${fallbackMsg}（HTTP ${r.status}）`);
    }
    return data;
  }

  async function updateProofreadSubtitleSource(selectEl) {
    const value = selectEl.value || null;
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subtitle_source: value }),
      });
      fileInfo = await _parseJsonOrThrow(r, '更新失敗');
      const ordSel = document.getElementById('proofreadBilingualOrder');
      if (ordSel) ordSel.style.display = (value === 'bilingual') ? '' : 'none';
      refreshOverlay();
      showToast('已更新字幕來源', 'success');
    } catch (e) {
      // Restore previous selection on failure.
      selectEl.value = (fileInfo && fileInfo.subtitle_source) ? fileInfo.subtitle_source : '';
      showToast(`更新失敗: ${e.message}`, 'error');
    }
  }

  async function updateProofreadBilingualOrder(selectEl) {
    const value = selectEl.value;
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bilingual_order: value }),
      });
      fileInfo = await _parseJsonOrThrow(r, '更新失敗');
      refreshOverlay();
    } catch (e) {
      showToast(`更新失敗: ${e.message}`, 'error');
    }
  }

  function refreshOverlay() {
    if (typeof FontPreview === 'undefined') return;
    if (cursorIdx == null || !segs[cursorIdx]) {
      FontPreview.updateText('');
      return;
    }
    const s = segs[cursorIdx];
    const mode = resolveSubtitleSource(fileInfo, activeProfile);
    const order = resolveBilingualOrder(fileInfo, activeProfile);
    FontPreview.updateText(pickSubtitleText({ en: s.en, zh: s.zh }, mode, order));
  }

  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }
  function hasUppercase(s) { return /[A-Z]/.test(s || ''); }

  // XSS-safe term highlight. Returns an HTML string with every match of `term`
  // wrapped in <mark class="cssClass">. Surrounding text is HTML-escaped slice
  // by slice; the wrapped term is also escaped before insertion. Never escapes
  // a string that already contains <mark>.
  // - ASCII-only term  → alphanumeric-bounded match (mirrors backend)
  // - Non-ASCII term   → plain substring match
  // - opts.caseSensitive: false → 'gi'; true → 'g'
  function highlightTerm(text, term, cssClass, opts) {
    opts = opts || {};
    if (!term || text == null) return escapeHtml(text == null ? '' : text);
    const flags = opts.caseSensitive ? 'g' : 'gi';
    const isAscii = /^[\x00-\x7f]+$/.test(term);
    const pattern = isAscii
      ? new RegExp('(?<![A-Za-z0-9])' + escapeRegex(term) + '(?![A-Za-z0-9])', flags)
      : new RegExp(escapeRegex(term), flags);
    let out = '';
    let last = 0;
    let m;
    while ((m = pattern.exec(text)) !== null) {
      out += escapeHtml(text.slice(last, m.index));
      out += `<mark class="${cssClass}">${escapeHtml(m[0])}</mark>`;
      last = m.index + m[0].length;
      if (m.index === pattern.lastIndex) pattern.lastIndex++;  // zero-width guard
    }
    out += escapeHtml(text.slice(last));
    return out;
  }
  function fmtMs(ms) {
    if (!ms && ms !== 0) return '—:—';
    const s = ms / 1000;
    const m = Math.floor(s / 60);
    const sec = (s - m * 60).toFixed(2).padStart(5, '0');
    return `${String(m).padStart(2, '0')}:${sec}`;
  }
  function showToast(msg, kind = 'info') {
    const stack = document.getElementById('toastStack');
    const t = document.createElement('div');
    t.className = `toast ${kind}`;
    t.textContent = msg;
    stack.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function backToDashboard() {
    // Use root '/' not 'index.html' — backend exposes @app.get("/") but
    // has no /index.html route, so the latter 404s.
    location.href = '/';
  }

  // ============================================================
  // Subtitle styling is fully delegated to FontPreview (frontend/js/font-preview.js).
  // FontPreview draws into <svg id="subtitleSvg"> using viewBox=1920×1080 so every
  // coordinate is one ASS pixel — fontConfig.size / outline_width / margin_bottom
  // pass through unchanged and the rendered overlay matches the burnt-in libass
  // output. No JS scaling math, no ResizeObserver needed (SVG viewBox handles it).
  function applySubtitleStyle() {
    if (typeof FontPreview !== 'undefined') {
      FontPreview.applyFontConfig(fontConfig);
    }
  }

  // ============================================================
  // Subtitle Settings Panel — mirrors the dashboard inspector「字幕設定」display:
  // a preview strip then grouped sliders + colour swatches. Every control writes
  // the in-memory `fontConfig`, refreshes the FontPreview SVG overlay on the
  // video, and debounce-PATCHes the active profile. Rendered into #ssBody so the
  // active swatch ring stays in sync with the chosen colour.
  // ============================================================
  const SS_TEXT_COLORS = ['#ffffff', '#ffe066', '#a3e635', '#f472b6'];
  const SS_OUTLINE_COLORS = ['#000000', '#1a1a2a', '#3a0a52', '#7f1d1d'];

  async function initSubtitleSettings() {
    renderSubtitleSettings();   // immediate render with current/default fontConfig
    try {
      const r = await fetch(`${API_BASE}/api/profiles/active`);
      if (r.ok) {
        const data = await r.json();
        activeProfileId = data.profile?.id || null;
        activeProfile = data.profile || null;
        if (data.profile?.font) {
          fontConfig = { ...fontConfig, ...data.profile.font };
        } else {
          // No active profile (V6 / output_lang) — load the GLOBAL font preset.
          try {
            const gf = await fetch(`${API_BASE}/api/settings/font`).then(x => x.ok ? x.json() : null);
            if (gf && gf.font) fontConfig = { ...fontConfig, ...gf.font };
          } catch (_) { /* keep defaults */ }
        }
        renderSubtitleSettings();   // re-render with loaded values
      }
    } catch (e) { /* keep defaults already rendered */ }
    applySubtitleStyle();
  }

  function renderSubtitleSettings() {
    const body = document.getElementById('ssBody');
    if (!body) return;
    const fc = fontConfig;
    const swatches = (colors, key, cur) => {
      const lc = (cur || '').toLowerCase();
      const isPreset = colors.some(c => c.toLowerCase() === lc);
      return colors.map(c =>
        `<div class="sw ${c.toLowerCase() === lc ? 'on' : ''}" style="background:${c}" title="${c}" onclick="proofreadPickColor('${key}','${c}')"></div>`
      ).join('')
        + `<label class="sw custom ${isPreset ? '' : 'on'}" title="自訂顏色">+<input type="color" value="${escapeHtml(cur || '#000000')}" oninput="proofreadPickColor('${key}', this.value)"></label>`;
    };
    body.innerHTML = `
      <div class="sub-preview">
        <div class="sub-preview-label">預覽</div>
        <div class="sub-preview-stage">
          <div class="sub-preview-text" id="ssPreviewText" style="font-size:${(fc.size || 32) * 0.6}px;color:${fc.color};">方案包括三條新港鐵線，連接新界地區。</div>
        </div>
      </div>
      <div class="ss-group">
        <div class="ss-title">字體</div>
        <div class="ss-row">
          <label>字型</label>
          <select onchange="proofreadUpdateFont('family', this.value)" aria-label="字幕字型">
            ${FontPreview.fontOptionsHtml(fc.family)}
          </select>
        </div>
        <div class="ss-row">
          <label></label>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-width:0;">
            <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('ssFontUpload').click()">＋ 新增字型</button>
            <input type="file" id="ssFontUpload" accept=".ttf,.otf" style="display:none" onchange="proofreadUploadFont(this)" />
            <span id="ssFontUploadMsg" style="font-size:11px;color:var(--text-dim);"></span>
          </div>
        </div>
        <div class="slider-row">
          <div class="labels"><span class="l">字幕大小</span><span class="v" id="ssSizeLbl">${fc.size}px</span></div>
          <input type="range" id="ssSize" min="12" max="120" value="${fc.size}" oninput="proofreadUpdateFont('size', +this.value)" aria-label="字幕大小">
          <div class="range-hints"><span>12</span><span>120</span></div>
        </div>
      </div>
      <div class="ss-group">
        <div class="ss-title">顏色 &amp; 描邊</div>
        <div class="ss-row">
          <label>文字</label>
          <div class="swatch-pick" id="ssTextSwatches">${swatches(SS_TEXT_COLORS, 'color', fc.color)}</div>
        </div>
        <div class="ss-row">
          <label>輪廓</label>
          <div class="swatch-pick" id="ssOutlineSwatches">${swatches(SS_OUTLINE_COLORS, 'outline_color', fc.outline_color)}</div>
        </div>
        <div class="slider-row">
          <div class="labels"><span class="l">描邊粗幼</span><span class="v" id="ssOutlineLbl">${fc.outline_width}px</span></div>
          <input type="range" id="ssOutlineWidth" min="0" max="10" step="0.5" value="${fc.outline_width}" oninput="proofreadUpdateFont('outline_width', +this.value)" aria-label="描邊粗幼">
        </div>
      </div>
      <div class="ss-group">
        <div class="ss-title">位置</div>
        <div class="slider-row">
          <div class="labels"><span class="l">底部邊距</span><span class="v" id="ssMarginLbl">${fc.margin_bottom}px</span></div>
          <input type="range" id="ssMarginBottom" min="0" max="200" value="${fc.margin_bottom}" oninput="proofreadUpdateFont('margin_bottom', +this.value)" aria-label="底部邊距">
          <div class="range-hints"><span>0</span><span>200</span></div>
        </div>
      </div>
      <div class="ss-group" style="border-bottom:0;">
        <button class="btn btn-secondary btn-sm" style="width:100%;" onclick="saveFontPreset()">💾 儲存為預設</button>
      </div>`;
  }

  function _ssSetLbl(id, text) { const el = document.getElementById(id); if (el) el.textContent = text; }

  // Slider / select change — update fontConfig + labels + live preview (SVG overlay).
  // Persisting is EXPLICIT via 儲存為預設 (matches the dashboard); no auto-save.
  // Upload a custom .ttf/.otf font, then make it the active family. The font
  // is shared (backend/assets/fonts) so it works in BOTH the live preview
  // (@font-face) and the burnt-in render (libass :fontsdir). Live-preview only
  // until 「儲存為預設」 persists it, matching the rest of this panel.
  async function proofreadUploadFont(input) {
    const file = input.files && input.files[0];
    input.value = '';  // allow re-selecting the same file later
    if (!file) return;
    const msg = document.getElementById('ssFontUploadMsg');
    if (msg) { msg.textContent = '上載中…'; msg.style.color = 'var(--text-dim)'; }
    try {
      const fd = new FormData();
      fd.append('file', file);
      const r = await fetch(`${API_BASE}/api/fonts`, { method: 'POST', body: fd, credentials: 'same-origin' });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        if (msg) { msg.textContent = '✕ ' + (data.error || `HTTP ${r.status}`); msg.style.color = 'var(--danger)'; }
        return;
      }
      await FontPreview.refreshFonts();            // re-inject @font-face + refresh list
      fontConfig = { ...fontConfig, family: data.family };
      renderSubtitleSettings();                    // rebuild picker (now incl. the new font, selected)
      applySubtitleStyle();                        // paint overlay with the new font
      const m2 = document.getElementById('ssFontUploadMsg');
      if (m2) { m2.textContent = `✓ 已新增「${data.family}」，記得撳「儲存為預設」`; m2.style.color = 'var(--success)'; }
    } catch (e) {
      const m3 = document.getElementById('ssFontUploadMsg');
      if (m3) { m3.textContent = '✕ 上載失敗'; m3.style.color = 'var(--danger)'; }
    }
  }

  function proofreadUpdateFont(key, value) {
    fontConfig = { ...fontConfig, [key]: value };
    _ssSetLbl('ssSizeLbl', fontConfig.size + 'px');
    _ssSetLbl('ssOutlineLbl', fontConfig.outline_width + 'px');
    _ssSetLbl('ssMarginLbl', fontConfig.margin_bottom + 'px');
    const pv = document.getElementById('ssPreviewText');
    if (pv) { pv.style.fontSize = (fontConfig.size * 0.6) + 'px'; pv.style.color = fontConfig.color; }
    applySubtitleStyle();
  }

  // Colour pick re-renders so the active swatch ring moves to the chosen colour,
  // then re-applies the live preview.
  function proofreadPickColor(key, value) {
    fontConfig = { ...fontConfig, [key]: value };
    renderSubtitleSettings();
    applySubtitleStyle();
  }

  // Clamp a numeric value to [lo, hi], falling back when not finite.
  function _clampNum(v, lo, hi, fallback) {
    let n = Number(v);
    if (!Number.isFinite(n)) n = fallback;
    return Math.min(hi, Math.max(lo, n));
  }

  // 儲存為預設 — persist the current font: to the active profile if there is one,
  // otherwise to the GLOBAL font preset (settings.json) read by V6 / output_lang render.
  async function saveFontPreset() {
    const font = {
      family: (fontConfig.family || '').trim() || 'Noto Sans TC',
      size: _clampNum(fontConfig.size, 12, 120, 32),
      color: fontConfig.color,
      outline_color: fontConfig.outline_color,
      outline_width: _clampNum(fontConfig.outline_width, 0, 10, 2),
      margin_bottom: _clampNum(fontConfig.margin_bottom, 0, 200, 40),
    };
    try {
      const r = activeProfileId
        ? await fetch(`${API_BASE}/api/profiles/${activeProfileId}`, {
            method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ font }) })
        : await fetch(`${API_BASE}/api/settings/font`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ font }) });
      if (!r.ok) throw new Error((await r.json()).error || `HTTP ${r.status}`);
      fontConfig = { ...fontConfig, ...font };
      applySubtitleStyle();
      showToast('已儲存為預設字體', 'success');
    } catch (e) {
      showToast(`字幕設定儲存失敗: ${e.message}`, 'error');
    }
  }

  // ============================================================
  // Glossary Panel
  // ============================================================
  async function initGlossaryPanel() {
    try {
      const r = await fetch(`${API_BASE}/api/glossaries`);
      if (!r.ok) return;
      const data = await r.json();
      const sel = document.getElementById('glossarySelect');
      (data.glossaries || []).forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = `${g.name} (${(g.source_lang||'?').toUpperCase()}→${(g.target_lang||'?').toUpperCase()})`;
        sel.appendChild(opt);
      });

      // Auto-select the glossary configured in the active Profile (sync mode A:
      // load-time only — no listener for later profile_updated events).
      // Sequenced after options-populate so setting .value matches an existing option.
      try {
        const pr = await fetch(`${API_BASE}/api/profiles/active`);
        if (!pr.ok) return;
        const pd = await pr.json();
        const pipelineGlossaryId = pd.profile?.translation?.glossary_id;
        if (pipelineGlossaryId &&
            Array.from(sel.options).some(o => o.value === pipelineGlossaryId)) {
          sel.value = pipelineGlossaryId;
          await onGlossarySelect();
        }
      } catch (e) { /* keep dropdown at default */ }
    } catch (e) { /* silent — panel stays in placeholder state */ }
  }

  async function onGlossarySelect() {
    const sel = document.getElementById('glossarySelect');
    glossaryId = sel.value || null;
    document.getElementById('glossaryApplyBtn').disabled = !glossaryId;
    document.getElementById('glossaryDeleteBtn').disabled = !glossaryId;
    if (!glossaryId) {
      document.getElementById('glossaryBody').innerHTML = '<div class="rv-b-rail-empty">選擇詞彙表以查看條目</div>';
      glossaryEntries = [];
      return;
    }
    await loadGlossaryEntries(glossaryId);
  }

  async function deleteCurrentGlossary() {
    if (!glossaryId) { showToast('請先選擇詞彙表', 'error'); return; }
    const sel = document.getElementById('glossarySelect');
    const name = sel.options[sel.selectedIndex]?.text || glossaryId;
    if (!confirm(`確定刪除詞彙表「${name}」？此動作無法還原。`)) return;
    try {
      const r = await fetch(`${API_BASE}/api/glossaries/${glossaryId}`, { method: 'DELETE' });
      if (!r.ok) throw new Error((await r.json()).error || `HTTP ${r.status}`);
      showToast(`已刪除詞彙表「${name}」`, 'success');
      glossaryId = null;
      glossaryEntries = [];
      document.getElementById('glossaryBody').innerHTML = '<div class="rv-b-rail-empty">選擇詞彙表以查看條目</div>';
      document.getElementById('glossaryApplyBtn').disabled = true;
      document.getElementById('glossaryDeleteBtn').disabled = true;
      // Rebuild dropdown options (initGlossaryPanel appends; rebuild prevents duplicates)
      const sel = document.getElementById('glossarySelect');
      sel.innerHTML = '<option value="">選擇詞彙表…</option>';
      await initGlossaryPanel();
    } catch (e) {
      showToast(`刪除失敗：${e.message}`, 'error');
    }
  }

  async function loadGlossaryEntries(id) {
    try {
      const r = await fetch(`${API_BASE}/api/glossaries/${id}`);
      if (!r.ok) return;
      const data = await r.json();
      glossaryEntries = data.entries || [];
      renderGlossaryTable();
    } catch (e) {
      showToast(`詞彙表載入失敗: ${e.message}`, 'error');
    }
  }

  function renderGlossaryTable() {
    const body = document.getElementById('glossaryBody');
    if (!glossaryEntries.length) {
      body.innerHTML = '<div class="rv-b-rail-empty">暫無條目</div>';
      return;
    }
    const rows = glossaryEntries.map(e => `
      <tr id="grow-${e.id}">
        <td>${escapeHtml(e.source)}</td>
        <td>${escapeHtml(e.target)}</td>
        <td style="text-align:center;white-space:nowrap;">
          <button class="btn btn-ghost btn-sm" onclick="startEditEntry('${e.id}')" title="編輯">✎</button>
          <button class="btn btn-ghost btn-sm" onclick="deleteGlossaryEntry('${e.id}')" title="刪除">🗑</button>
        </td>
      </tr>`).join('');
    body.innerHTML = `
      <table class="rv-b-glossary-table">
        <thead><tr><th>原文</th><th>譯文</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function startEditEntry(eid) {
    const entry = glossaryEntries.find(e => e.id === eid);
    if (!entry) return;
    const row = document.getElementById(`grow-${eid}`);
    if (!row) return;
    row.innerHTML = `
      <td><input class="rv-b-glossary-input" id="gedit-source-${eid}" value="${escapeHtml(entry.source)}"></td>
      <td><input class="rv-b-glossary-input" id="gedit-target-${eid}" value="${escapeHtml(entry.target)}"></td>
      <td style="text-align:center;white-space:nowrap;">
        <button class="btn btn-primary btn-sm" onclick="saveEditEntry('${eid}')" title="儲存到詞彙表 (Enter)">儲存</button>
        <button class="btn btn-ghost btn-sm" onclick="renderGlossaryTable()" title="取消 (Esc)">取消</button>
      </td>`;
    const sourceInput = document.getElementById(`gedit-source-${eid}`);
    const targetInput = document.getElementById(`gedit-target-${eid}`);
    [sourceInput, targetInput].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveEditEntry(eid);
        else if (e.key === 'Escape') renderGlossaryTable();
      });
    });
    sourceInput.focus();
  }

  async function saveEditEntry(eid) {
    const sourceEl = document.getElementById(`gedit-source-${eid}`);
    const targetEl = document.getElementById(`gedit-target-${eid}`);
    if (!sourceEl || !targetEl) return;
    const source = sourceEl.value.trim();
    const target = targetEl.value.trim();
    if (!source || !target) { showToast('原文同譯文不能為空', 'error'); return; }
    try {
      const r = await fetch(`${API_BASE}/api/glossaries/${glossaryId}/entries/${eid}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ source, target }),
      });
      if (!r.ok) throw new Error((await r.json()).error || '儲存失敗');
      const idx = glossaryEntries.findIndex(e => e.id === eid);
      if (idx >= 0) glossaryEntries = glossaryEntries.map((e, i) => i === idx ? { ...e, source, target } : e);
      renderGlossaryTable();
      showToast('已儲存到詞彙表', 'success');
    } catch (e) {
      showToast(`儲存失敗: ${e.message}`, 'error');
      renderGlossaryTable();
    }
  }

  async function deleteGlossaryEntry(eid) {
    if (!glossaryId) return;
    const entry = glossaryEntries.find(e => e.id === eid);
    if (!entry) return;
    if (!confirm(`確定刪除「${entry.source} → ${entry.target}」？`)) return;
    try {
      const r = await fetch(`${API_BASE}/api/glossaries/${glossaryId}/entries/${eid}`, { method: 'DELETE' });
      if (!r.ok) throw new Error((await r.json()).error || `HTTP ${r.status}`);
      glossaryEntries = glossaryEntries.filter(e => e.id !== eid);
      renderGlossaryTable();
    } catch (e) {
      showToast(`刪除失敗：${e.message}`, 'error');
    }
  }

  function addGlossaryEntry() {
    if (!glossaryId) { showToast('請先選擇詞彙表', 'error'); return; }
    const body = document.getElementById('glossaryBody');
    let tbl = body.querySelector('table tbody');
    if (!tbl) {
      body.innerHTML = `<table class="rv-b-glossary-table"><thead><tr><th>EN</th><th>ZH</th><th></th></tr></thead><tbody></tbody></table>`;
      tbl = body.querySelector('tbody');
    }
    if (document.getElementById('grow-new')) {
      document.getElementById('gnew-source').focus();
      return;
    }
    const newRow = document.createElement('tr');
    newRow.id = 'grow-new';
    newRow.innerHTML = `
      <td><input class="rv-b-glossary-input" id="gnew-source" placeholder="原文"></td>
      <td><input class="rv-b-glossary-input" id="gnew-target" placeholder="譯文"></td>
      <td style="text-align:center;white-space:nowrap;">
        <button class="btn btn-primary btn-sm" onclick="saveNewEntry()" title="儲存到詞彙表 (Enter)">儲存</button>
        <button class="btn btn-ghost btn-sm" onclick="cancelNewEntry()" title="取消 (Esc)">取消</button>
      </td>`;
    tbl.appendChild(newRow);
    const sourceInput = document.getElementById('gnew-source');
    const targetInput = document.getElementById('gnew-target');
    [sourceInput, targetInput].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveNewEntry();
        else if (e.key === 'Escape') cancelNewEntry();
      });
    });
    sourceInput.focus();
  }

  async function saveNewEntry() {
    const sourceEl = document.getElementById('gnew-source');
    const targetEl = document.getElementById('gnew-target');
    if (!sourceEl || !targetEl) return;
    const source = sourceEl.value.trim();
    const target = targetEl.value.trim();

        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ source, target }),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        showToast(err.error || '加入失敗', 'error');
        return;
      }
      await loadGlossaryEntries(glossaryId);
      sourceEl.value = '';
      targetEl.value = '';
      showToast(`已加入詞彙表：${source} → ${target}`, 'success');
    } catch (e) {
      showToast(`新增失敗: ${e.message}`, 'error');

  async function scanGlossary() {
    if (!glossaryId || !fileId) return;
    const btn = document.getElementById('glossaryApplyBtn');
    btn.disabled = true;
    btn.textContent = '掃描中…';
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/glossary-scan`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ glossary_id: glossaryId }),
      });
      if (!r.ok) throw new Error((await r.json()).error || '掃描失敗');
      const data = await r.json();
      // Support new response shape (strict_violations/loose_violations) and legacy (violations)
      const strictViolations = data.strict_violations || data.violations || [];
      const looseViolations = data.loose_violations || [];
      const matches = data.matches || [];
      const revertedCount = data.reverted_count || 0;
      if (revertedCount > 0) {
        showToast(`已自動回復 ${revertedCount} 段（詞彙表改動）`, 'info');
      }
      if (strictViolations.length === 0 && looseViolations.length === 0 && matches.length === 0) {
        showToast('字幕中無詞彙表覆蓋嘅詞，請檢查原文或新增條目', 'info');
        return;
      }
      showGlossaryApplyModal({
        strict_violations: strictViolations,
        loose_violations: looseViolations,
        matches,
        glossary_source_lang: data.glossary_source_lang || null,
        glossary_target_lang: data.glossary_target_lang || null,
      });
    } catch (e) {
      showToast(`掃描失敗: ${e.message}`, 'error');
    } finally {
      btn.disabled = !glossaryId;
      btn.textContent = '套用';
    }
  }

  let lastScanResult = null;  // module-level: store scan response for apply phase

  function showGlossaryApplyModal(scanResult) {
    lastScanResult = scanResult;
    const { strict_violations, loose_violations, matches,
            glossary_source_lang, glossary_target_lang } = scanResult;

    const body = document.getElementById('gaBody');
    const title = document.getElementById('gaTitle');
    const footer = document.getElementById('gaFooter');
    footer.style.display = '';

    const langPair = `${(glossary_source_lang||'?').toUpperCase()}→${(glossary_target_lang||'?').toUpperCase()}`;
    title.textContent = `詞彙表套用 — ${langPair}`;

    const showLoose = ['zh', 'ja', 'ko', 'th'].includes(glossary_source_lang);

    const sections = [];
    if (strict_violations.length > 0) {
      sections.push(_renderApplySection('嚴格匹配', strict_violations, true, 'strict'));
    }
    if (showLoose && loose_violations.length > 0) {
      sections.push(_renderApplySection('寬鬆匹配 — 需檢視', loose_violations, false, 'loose',
        '可能因同 script 字符包夾誤中（例如「源」喺「資源」入面）。'));
    }
    if (matches.length > 0) {
      sections.push(_renderApplySection('已符合', matches, false, 'matches'));
    }

    body.innerHTML = sections.join('\n');

    updateApplyCount();
    document.getElementById('gaOverlay').classList.add('open');
  }

  function _renderApplySection(title, rows, defaultChecked, sectionKey, hint) {
    const items = rows.map((r, idx) => {
      const checked = defaultChecked && !r.approved ? 'checked' : '';
      const badge = r.approved ? '<span class="ga-row-badge">已批核</span>' : '';
      const termSource = r.term_source || r.term_en || '';
      const termTarget = r.term_target || r.term_zh || '';
      const sourceText = r.source_text || r.en_text || '';
      const targetText = r.target_text || r.zh_text || '';
      const sourceHtml = highlightTerm(sourceText, termSource, 'hl-en',
                                       { caseSensitive: hasUppercase(termSource) });
      const targetHasHit = !!(termTarget && targetText.indexOf(termTarget) !== -1);
      const targetHtml = targetHasHit
        ? highlightTerm(targetText, termTarget, 'hl-zh', { caseSensitive: true })
        : escapeHtml(targetText);
      const hint2 = sectionKey === 'matches'
        ? `<span class="ga-hint match"><span class="ga-hint-default">✓ 已含目標詞</span><span class="ga-hint-override">⚠ 強制重新套用</span></span>`
        : `<span class="ga-hint warn">⚠ LLM 將判斷修改位置</span>`;
      const rowClass = sectionKey === 'matches' ? 'ga-row matched' : 'ga-row';
      return `<div class="${rowClass}">
        <input type="checkbox" class="ga-row-check" ${checked}
               data-section="${sectionKey}" data-idx="${idx}"
               onchange="updateApplyCount()">
        <div class="ga-row-body">
          <div class="ga-row-term">#${r.seg_idx + 1} &nbsp;"${escapeHtml(termSource)}" → "${escapeHtml(termTarget)}" ${badge}</div>
          <div class="ga-row-en">原文: ${sourceHtml}</div>
          <div class="ga-row-zh">譯文: ${targetHtml}${hint2}</div>
        </div>
      </div>`;
    }).join('');

    const selectAllRow = defaultChecked ? `
      <div class="ga-section-head ga-section-head-row">
        <label class="ga-select-all">
          <input type="checkbox" id="gaSelectAll-${sectionKey}" onchange="_toggleSection('${sectionKey}', this.checked)">
          <span>${title} (${rows.length}) — 全部選中</span>
        </label>
      </div>` : `<div class="ga-section-head">${title} (${rows.length})</div>`;

    return `<div class="ga-section" data-section="${sectionKey}">
      ${selectAllRow}
      ${hint ? `<div class="ga-section-hint" style="font-size:11px;color:var(--text-mid);padding:4px 12px 2px;">${escapeHtml(hint)}</div>` : ''}
      ${items}
    </div>`;
  }

  function _toggleSection(sectionKey, on) {
    document.querySelectorAll(`.ga-row-check[data-section="${sectionKey}"]`)
      .forEach(c => { c.checked = on; });
    updateApplyCount();
  }
  window._toggleSection = _toggleSection;

  function updateApplyCount() {
    const rowChecks = document.querySelectorAll('#gaBody .ga-row-check');
    const count = Array.from(rowChecks).filter(c => c.checked).length;
    const btn = document.getElementById('gaApplyBtn');
    btn.textContent = `套用選中 (${count})`;
    btn.disabled = count === 0;

    // Sync the master "strict" select-all checkbox indeterminate state
    const master = document.getElementById('gaSelectAll-strict');
    if (master) {
      const strictChecks = document.querySelectorAll('.ga-row-check[data-section="strict"]');
      const total = strictChecks.length;
      const checked = Array.from(strictChecks).filter(c => c.checked).length;
      master.checked = total > 0 && checked === total;
      master.indeterminate = checked > 0 && checked < total;
    }
  }

  // Legacy alias kept for any inline onclick that may still reference it
  async function applySelectedViolations() {
    const checked = Array.from(document.querySelectorAll('.ga-row-check:checked'));
    const violations = [];
    for (const c of checked) {
      const section = c.dataset.section;
      const idx = parseInt(c.dataset.idx, 10);
      if (section === 'strict' && lastScanResult?.strict_violations[idx]) {
        violations.push(lastScanResult.strict_violations[idx]);
      } else if (section === 'loose' && lastScanResult?.loose_violations[idx]) {
        violations.push(lastScanResult.loose_violations[idx]);
      }
      // 'matches' rows are not sent — they're already correct.
    }
    if (violations.length === 0) {
      showToast('未揀任何條目', 'info');
      return;
    }

    // Strip extra fields, send only what backend expects.
    const payload = violations.map(v => ({
      seg_idx: v.seg_idx,
      term_source: v.term_source || v.term_en,
      term_target: v.term_target || v.term_zh,
    }));

    // Show progress
    const body = document.getElementById('gaBody');
    const footer = document.getElementById('gaFooter');
    body.innerHTML = `<div class="ga-progress">正在套用 ${payload.length} 處…</div>`;
    footer.style.display = 'none';

    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/glossary-apply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ glossary_id: glossaryId, violations: payload }),
      });
      if (!r.ok) throw new Error((await r.json()).error || '套用失敗');
      const data = await r.json();
      closeGlossaryApplyModal();

      if (data.failed_count > 0) {
        showToast(`已套用 ${data.applied_count} 處，${data.failed_count} 處失敗`, 'warning');
      } else {
        showToast(`已套用 ${data.applied_count} 處`, 'success');
      }

      // Refresh segments to reflect changes
      await loadSegments();
      if (cursorIdx !== null) {
        renderDetail();
      }
    } catch (e) {
      showToast(`套用失敗: ${e.message}`, 'error');
      // Restore modal for retry
      footer.style.display = '';
      body.innerHTML = '<div class="ga-progress">套用失敗，請重試</div>';
    }
  }

  function closeGlossaryApplyModal() {
    document.getElementById('gaOverlay').classList.remove('open');
    lastScanResult = null;
  }

  // ============================================================
  // Load
  // ============================================================
  async function init() {
    // Wire the SVG subtitle overlay to active profile + Socket.IO updates so
    // changes from any tab propagate live and the preview matches burnt-in output.
    if (typeof FontPreview !== 'undefined') {
      FontPreview.init(null);
    }
    // Keep the subtitle overlay visible in fullscreen (native button swaps to container).
    if (typeof VideoFullscreen !== 'undefined') {
      const fsVideo = document.getElementById('videoPlayer');
      VideoFullscreen.wire(fsVideo, fsVideo ? fsVideo.closest('.rv-b-video') : null);
    }

    if (!fileId) {
      showToast('缺少 file_id 參數', 'error');
      document.getElementById('detailEmpty').textContent = '需要 file_id 參數 — 從 Dashboard 點「校對 →」';
      return;
    }

    try {
      // Kick panel inits in parallel — don't block main load
      initSubtitleSettings();
      initGlossaryPanel();

      // File metadata via /api/files (then filter)
      const fl = await fetch(`${API_BASE}/api/files`).then(r => r.json());
      fileInfo = (fl.files || []).find(f => f.id === fileId);
      if (!fileInfo) throw new Error('檔案不存在');
      document.getElementById('rvFname').textContent = fileInfo.original_name;
      document.getElementById('rvFname').title = fileInfo.original_name;
      syncSourceDropdowns();

      // Load segments + translations
      await loadSegments();
      _rerunUiSync();

      // Load video
      const v = document.getElementById('videoPlayer');
      v.src = `${API_BASE}/api/files/${fileId}/media`;
      v.style.display = 'block';
      document.getElementById('videoPlaceholder').style.display = 'none';
      v.addEventListener('loadedmetadata', () => {
        if (!totalMs) totalMs = Math.round((v.duration || 0) * 1000);
        renderWaveformRegions();
        renderWaveformTicks();
      });
      v.addEventListener('timeupdate', onVideoTime);
      v.addEventListener('seeked', onVideoTime);

      // Waveform peaks
      loadWaveformPeaks();

      // Start cursor at first non-approved, fallback to 0
      const firstPending = segs.findIndex(s => !s.approved);
      setCursor(firstPending >= 0 ? firstPending : 0);

      // Check for ongoing render and show resume banner
      resumeOngoingRender();
    } catch (e) {
      showToast(`載入失敗: ${e.message}`, 'error');
    }
  }

  // Build segs[] from output_lang translation rows + language descriptors.
  // Used by loadSegments AND by split/merge (to avoid an extra round-trip).
  function _rebuildSegsFromArrays(translations, langs) {
    const firstL = (langs[0] && langs[0].lang) || 'yue';
    const secondL = langs[1] && langs[1].lang;
    return translations.map((t, i) => {
      const firstText = t[`${firstL}_text`]
                     || (t.by_lang && t.by_lang[firstL] && t.by_lang[firstL].text) || '';
      const secondText = secondL
        ? (t[`${secondL}_text`] || (t.by_lang && t.by_lang[secondL] && t.by_lang[secondL].text) || '')
        : '';
      const inMs = Math.round((t.start || 0) * 1000);
      const outMs = Math.round((t.end || 0) * 1000);
      const durSec = (outMs - inMs) / 1000;
      const cpsFirst = durSec > 0 ? Math.round((firstText.length / durSec) * 10) / 10 : 0;
      const apiFlags = Array.isArray(t.flags) ? t.flags : [];
      const flags = qaFlagsFromBackend(apiFlags, []);
      if (cpsFirst > 12) flags.push({ type: 'cps', msg: `CPS ${cpsFirst}（上限 12）` });
      return {
        idx: (typeof t.idx === 'number') ? t.idx : i,
        id: i + 1,
        in: inMs, out: outMs,
        tsIn: fmtMs(inMs), tsOut: fmtMs(outMs),
        duration: durSec.toFixed(1),
        en: firstText, zh: secondText,
        cps: cpsFirst,
        _cpsSecond: secondL && durSec > 0 ? Math.round((secondText.length / durSec) * 10) / 10 : 0,
        _hasSecond: !!secondL,
        approved: t.status === 'approved' || t.approved === true,
        edited: t.edited === true,
        flags,
        glossary_changes: Array.isArray(t.glossary_changes) ? t.glossary_changes : [],
        speaker: null, candidates: [], glossary: [], asr: null, mt: null,
      };
    });
  }

  function _flashRows(idxs) {
    idxs.forEach(idx => {
      const el = document.querySelector(`.rv-b-rail-item[data-idx="${idx}"]`);
      if (el) { el.classList.add('rv-split-flash'); setTimeout(() => el.classList.remove('rv-split-flash'), 1500); }
    });
  }

  async function splitSegment(i, mode) {
    if (_segOpBusy) return;
    const s = segs[i];
    if (!s) return;
    if ((s.out - s.in) < 400) { showToast('段落太短，無法分割（最少 0.4 秒）', 'warning'); return; }
    _segOpBusy = true;
    const row = document.querySelector(`.rv-b-rail-item[data-idx="${i}"]`);
    if (row) row.classList.add('rv-seg-busy');
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/segments/${s.idx}/split`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode }),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      segs = _rebuildSegsFromArrays(data.translations, _olLangs);
      renderSegList();
      renderWaveformRegions();
      setCursor(Math.min(i + 1, segs.length - 1), false);
      _flashRows([i, i + 1]);
      showToast(mode === 'ai' ? '段落已 AI 分割' : '段落已對半分割', 'success');
    } catch (e) {
      showToast('分割失敗：' + e.message, 'error');
    } finally {
      _segOpBusy = false;
      const r2 = document.querySelector(`.rv-b-rail-item[data-idx="${i}"]`);
      if (r2) r2.classList.remove('rv-seg-busy');
    }
  }

  async function mergeNext(i) {
    if (_segOpBusy) return;
    const s = segs[i];
    if (!s) return;
    if (i + 1 >= segs.length) { showToast('已經係最後一段，無法合併下一段', 'warning'); return; }
    _segOpBusy = true;
    const row = document.querySelector(`.rv-b-rail-item[data-idx="${i}"]`);
    if (row) row.classList.add('rv-seg-busy');
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/segments/${s.idx}/merge-next`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      segs = _rebuildSegsFromArrays(data.translations, _olLangs);
      renderSegList();
      renderWaveformRegions();
      setCursor(Math.min(i, segs.length - 1), false);
      _flashRows([i]);
      showToast('段落已合併', 'success');
    } catch (e) {
      showToast('合併失敗：' + e.message, 'error');
    } finally {
      _segOpBusy = false;
      const r2 = document.querySelector(`.rv-b-rail-item[data-idx="${i}"]`);
      if (r2) r2.classList.remove('rv-seg-busy');
    }
  }

  async function loadSegments() {
    const isOutputLang = fileInfo && fileInfo.active_kind === 'output_lang';
    const isV6 = fileInfo && fileInfo.active_kind === 'pipeline_v6';

    if (isOutputLang) {
      // output_lang 模式：第一/第二輸出語言，直接由 translations + languages descriptor 建立 segs[]
      let langs = (fileInfo && Array.isArray(fileInfo.languages)) ? fileInfo.languages : [];
      if (!langs.length) {
        try {
          const lr = await fetch(`${API_BASE}/api/files/${fileId}/languages`).then(r => r.json());
          langs = lr.languages || [];
        } catch (e) {}
      }
      let translations = [];
      try {
        const tResp = await fetch(`${API_BASE}/api/files/${fileId}/translations`).then(r => r.json());
        translations = tResp.translations || [];
      } catch (e) {
        showToast('無法載入輸出語言翻譯: ' + e.message, 'error');
        translations = [];
      }

      _olLangs = langs;
      segs = _rebuildSegsFromArrays(translations, langs);
    } else if (isV6) {
      let translations = [];
      try {
        const tResp = await fetch(`${API_BASE}/api/files/${fileId}/translations`).then(r => r.json());
        translations = tResp.translations || [];
      } catch (e) {
        showToast('無法載入 V6 翻譯: ' + e.message, 'error');
        translations = [];
      }
      segs = translations.map((t, i) => {
        const srcLang = t.source_lang || 'zh';
        const rawZh = t[`${srcLang}_text`]
                   || (t.by_lang && t.by_lang[srcLang] && t.by_lang[srcLang].text)
                   || '';
        const { clean, flags: prefixFlags } = parseTranslationFlags(rawZh);
        const zh = clean;
        const apiFlags = Array.isArray(t.flags) ? t.flags : [];
        const inMs = Math.round((t.start || 0) * 1000);
        const outMs = Math.round((t.end || 0) * 1000);
        const durSec = (outMs - inMs) / 1000;
        const cps = durSec > 0 ? Math.round((zh.length / durSec) * 10) / 10 : 0;
        const flags = qaFlagsFromBackend(apiFlags, prefixFlags);
        if (cps > 12) flags.push({ type: 'cps', msg: `CPS ${cps}（上限 12）` });
        return {
          idx: (typeof t.idx === 'number') ? t.idx : i,
          id: i + 1,
          in: inMs, out: outMs,
          tsIn: fmtMs(inMs), tsOut: fmtMs(outMs),
          duration: durSec.toFixed(1),
          en: t.source_text || '',
          zh,
          cps,
          approved: t.status === 'approved' || t.approved === true,
          edited: t.edited === true,
          flags,
          speaker: null,
          candidates: [],
          glossary: [],
          asr: null,
          mt: null,
        };
      });
    } else {
      const sResp = await fetch(`${API_BASE}/api/files/${fileId}/segments`).then(r => r.json());
      const rawSegs = sResp.segments || [];
      let translations = [];
      try {
        const tResp = await fetch(`${API_BASE}/api/files/${fileId}/translations`).then(r => r.json());
        translations = tResp.translations || [];
      } catch (e) {}

      segs = rawSegs.map((s, i) => {
        const t = translations[i] || {};
        // Backend now returns structured { zh_text (clean), flags: [...] }.
        // parseTranslationFlags() is kept as a safety net for any legacy
        // payload still carrying [LONG] / [NEEDS REVIEW] prefixes inline.
        const rawZh = t.zh_text || '';
        const { clean, flags: prefixFlags } = parseTranslationFlags(rawZh);
        const zh = clean;
        const apiFlags = Array.isArray(t.flags) ? t.flags : [];
        const inMs = Math.round(s.start * 1000);
        const outMs = Math.round(s.end * 1000);
        const durSec = (outMs - inMs) / 1000;
        const cps = durSec > 0 ? Math.round((zh.length / durSec) * 10) / 10 : 0;
        const flags = qaFlagsFromBackend(apiFlags, prefixFlags);
        if (cps > 12) flags.push({ type: 'cps', msg: `CPS ${cps}（上限 12）` });
        return {
          idx: i,
          id: i + 1,
          in: inMs,
          out: outMs,
          tsIn: fmtMs(inMs),
          tsOut: fmtMs(outMs),
          duration: durSec.toFixed(1),
          en: s.text || '',
          zh,
          cps,
          approved: t.status === 'approved' || t.approved === true,
          edited: t.edited === true,
          flags,
          speaker: t.speaker || null,
          candidates: [],   // stub — backend doesn't expose yet
          glossary: [],     // stub — backend doesn't expose yet
          asr: null,        // stub
          mt: null,         // stub
        };
      });
    }

    // Overall duration fallback from last segment
    if (segs.length) {
      totalMs = Math.max(totalMs, segs[segs.length - 1].out + 2000);
    }

    // output_lang 模式：詞彙表套用係 MT 概念，隱藏套用掣（只保留 view-only 詞彙表）
    const applyBtn = document.getElementById('glossaryApplyBtn');
    if (applyBtn) {
      applyBtn.style.display = (fileInfo && fileInfo.active_kind === 'output_lang') ? 'none' : '';
    }
    // glossary-v2: show/hide the reapply button for output_lang files
    const reapplyBtn = document.getElementById('glossaryReapplyBtn');
    if (reapplyBtn) {
      reapplyBtn.style.display = (fileInfo && fileInfo.active_kind === 'output_lang') ? '' : 'none';
    }

    renderSegList();
    renderProgress();
    renderWaveformRegions();
    renderWaveformTicks();
  }

  async function loadWaveformPeaks() {
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/waveform?bins=480`);
      if (!r.ok) return;
      const data = await r.json();
      waveformPeaks = data.peaks;
      if (data.duration && !totalMs) totalMs = Math.round(data.duration * 1000);
      renderWaveformBars();
    } catch (e) {}
  }

  // ============================================================
  // Rendering — segment rail list
  // ============================================================
  function _renderSegListBase() {
    document.getElementById('segCount').textContent = segs.length;
    const list = document.getElementById('segList');

      list.innerHTML = '<div class="rv-b-rail-empty">未有段落</div>';

    }
    // Each rail row shows TWO stacked text blocks: line 1 = primary/source/first
    // track, line 2 = translated/second track (dimmed). output_lang single-language
    // files have no second track → only line 1 renders (so we never show a bogus
    // '(未翻譯)' second line for transcribe-only output).
    const isOutputLang = fileInfo && fileInfo.active_kind === 'output_lang';
    list.innerHTML = segs.map((s, i) => {
      const cur = i === cursorIdx ? 'cur' : '';
      const ap = s.approved ? 'ap' : '';

        return `<span class="qa-flag qa-flag-${color}" title="${escapeHtml(f.msg || '')}">${flagLabel(f.type)}</span>`;
      }).join('') + (s.glossary_changes && s.glossary_changes.length ? '<span class="qa-flag" title="詞彙表已套用">📖</span>' : '');
      // Split/merge is output_lang-only. The three actions (AI split / mechanical
      // split / merge-next) are consolidated into ONE trailing pill on the right edge.
      // Other pipeline kinds render the original 4-column row via the --noops modifier.
      const actionsHtml = isOutputLang ? `
          <div class="rv-b-rail-ops">
            <button class="rv-seg-btn rv-seg-ai" title="AI 智能分割 (Ctrl+Shift+S)"
              onclick="event.stopPropagation(); splitSegment(${i}, 'ai')" ${tooShort ? 'disabled' : ''}>
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 8h10M8 3l1.4 3.6L13 8l-3.6 1.4L8 13l-1.4-3.6L3 8l3.6-1.4z"/></svg>
            </button>
            <button class="rv-seg-btn rv-seg-mech" title="機械式對半分割 (Ctrl+Shift+D)"
              onclick="event.stopPropagation(); splitSegment(${i}, 'mechanical')" ${tooShort ? 'disabled' : ''}>
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 1v14M5 5L3 3M5 5a2 2 0 1 1-3 0 2 2 0 0 1 3 0zM5 11l-2 2M5 11a2 2 0 1 0-3 0 2 2 0 0 0 3 0z"/></svg>
            </button>
            <button class="rv-seg-btn rv-seg-merge" title="合併下一段 (Ctrl+Shift+M)"
              onclick="event.stopPropagation(); mergeNext(${i})" ${isLast ? 'disabled' : ''}>
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h8M4 12h8M6 7l2 2 2-2"/></svg>
            </button>
          </div>` : '';
      const noops = isOutputLang ? '' : 'rv-b-rail-item--noops';
      return `
        <div class="rv-b-rail-item ${cur} ${ap} ${noops}" data-idx="${i}" onclick="setCursor(${i}, true)">
          <div class="rv-b-rail-num">${s.id}</div>
          <div class="rv-b-rail-text">
            <div class="rv-b-rail-text-1">${escapeHtml(line1)}</div>
            ${hasLine2 ? `<div class="rv-b-rail-text-2">${escapeHtml(line2)}</div>` : ''}
          </div>
          <div class="rv-b-rail-flags">
            ${flagsHtml}
            ${s.approved ? '<span class="rv-b-rail-ok">✓</span>' : ''}
          </div>

    }).join('');
