<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoTitle — 字幕校對</title>
  <style>
    /* ============================================================
       Tokens — shared with Dashboard (Bold variant)
       ============================================================ */
    :root {
      --bg: #0a0a0f;
      --bg-soft: #0f0f18;
      --surface: #13131a;
      --surface-2: #1a1a24;
      --surface-3: #222232;
      --border: #2a2a3d;
      --border-strong: #35354d;
      --text: #e6e6f0;
      --text-mid: #a8a8bf;
      --text-dim: #6e6e85;
      --accent: #6c63ff;
      --accent-2: #a78bfa;
      --accent-soft: rgba(108, 99, 255, 0.12);
      --accent-softer: rgba(108, 99, 255, 0.06);
      --accent-ring: rgba(108, 99, 255, 0.35);
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #38bdf8;
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
    }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
    input, select, textarea { font: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
    .mono { font-family: var(--font-mono); }
    .spacer { flex: 1; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; padding: 8px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 600; white-space: nowrap;
      border: 1px solid transparent;
      transition: background .15s, border-color .15s, color .15s, transform .05s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5b52e0; }
    .btn-primary[disabled] { opacity: 0.5; pointer-events: none; }
    .btn-secondary { background: var(--surface-2); color: var(--text); border-color: var(--border); }
    .btn-secondary:hover { border-color: var(--border-strong); background: var(--surface-3); }
    .btn-ghost { color: var(--text-mid); }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

    .kbd {
      display: inline-flex; align-items: center;
      padding: 2px 6px;
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-mid);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 5px;
      line-height: 1;
    }

    /* ============================================================
       Bold rail (same as Dashboard) — persistent left nav
       ============================================================ */
    .bold {
      display: grid;
      grid-template-columns: 64px 1fr;
      height: 100vh;
      min-height: 0;
      background: var(--bg);
    }
    .b-rail {
      background: var(--bg-soft);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center;
      padding: 14px 0;
      gap: 8px;
      z-index: 110;
      position: relative;
    }
    .b-rail .mark {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 15px;
      margin-bottom: 10px;
    }
    .rail-btn {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 16px;
      position: relative;
    }
    .rail-btn:hover { color: var(--text); background: var(--surface-2); }
    .rail-btn.on { color: var(--accent-2); background: var(--accent-soft); }
    .rail-btn.on::before {
      content: ""; position: absolute; left: -14px; top: 10px; bottom: 10px;
      width: 3px; border-radius: 2px; background: var(--accent);
    }
    .rail-btn .tt {
      position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%);
      background: var(--surface); color: var(--text);
      padding: 4px 10px; border-radius: 6px;
      font-size: 11px; white-space: nowrap;
      border: 1px solid var(--border);
      opacity: 0; pointer-events: none;
      transition: opacity .15s;
      z-index: 5;
    }
    .rail-btn:hover .tt { opacity: 1; }
    .b-rail .flex1 { flex: 1; }

    /* ============================================================
       Review shell — sits to the right of the rail
       ============================================================ */
    .rv-shell {
      display: flex; flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .rv-header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-width: 0;
    }
    .rv-back {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px 6px 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-mid);
      font-size: 12px; font-weight: 600;
      cursor: pointer;
    }
    .rv-back:hover { color: var(--text); border-color: var(--border-strong); }
    .rv-sep { color: var(--text-dim); font-family: var(--font-mono); }
    .rv-title { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 0 1 auto; }
    .rv-mode { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
    .rv-fname {
      font-size: 13px; color: var(--text-mid);
      font-family: var(--font-mono);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 360px;
    }
    .rv-progress {
      display: flex; align-items: center; gap: 8px;
      margin-left: 8px;
      padding: 4px 12px;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    }
    .rv-prog-track { width: 120px; height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
    .rv-prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 2px; transition: width 0.3s; }
    .rv-prog-num { font-family: var(--font-mono); font-size: 11px; color: var(--text-mid); letter-spacing: 0.02em; }
    .rv-prog-num b { color: var(--text); font-weight: 700; }
    .rv-kbd-hint {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-dim);
      padding-left: 10px;
      border-left: 1px solid var(--border);
    }
    .rv-kbd-hint > span { margin-right: 4px; }

    .rv-body { flex: 1; min-height: 0; display: flex; overflow: hidden; }

    /* ============================================================
       Shared: QA flag pill, confidence bar, glossary chip
       ============================================================ */
    .qa-flag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px;
      font-size: 10.5px; font-weight: 700;
      border-radius: 4px;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .qa-flag-amber { background: rgba(245,158,11,0.14); color: #fbbf24; }
    .qa-flag-rose  { background: rgba(244,63,94,0.14);  color: #fb7185; }
    .qa-flag.lg { padding: 4px 10px; font-size: 11.5px; }

    .conf-bar { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); }
    .conf-track { width: 40px; height: 3px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
    .conf-fill { height: 100%; border-radius: 2px; }
    .conf-good .conf-fill { background: var(--success); }
    .conf-ok   .conf-fill { background: var(--warning); }
    .conf-bad  .conf-fill { background: var(--danger); }
    .conf-num { font-size: 10px; color: var(--text-dim); min-width: 16px; text-align: right; }
    .conf-stub .conf-fill { background: var(--border-strong); width: 100%; }
    .conf-stub .conf-num { color: var(--text-dim); }

    .rv-gloss-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px;
      background: var(--accent-softer);
      border: 1px solid var(--accent-ring);
      border-radius: 5px;
      font-size: 11.5px;
    }
    .rv-gloss-en { font-family: var(--font-mono); color: var(--text-mid); }
    .rv-gloss-arrow { color: var(--accent-2); }
    .rv-gloss-zh { color: var(--text); font-weight: 600; }

    /* ============================================================
       Waveform — shared across variants
       ============================================================ */
    .rv-wave {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }
    .rv-wave-bars {
      position: absolute; inset: 0 0 14px 0;
      display: flex; align-items: center; padding: 0 6px; gap: 0;
      pointer-events: none;
    }
    .rv-wave-bar {
      flex: 1 1 0;
      min-width: 1px;
      background: var(--border-strong);
      border-radius: 1px;
      min-height: 2px;
    }
    .rv-wave-bar.played { background: var(--accent-2); }
    .rv-wave-regions { position: absolute; inset: 0 0 14px 0; pointer-events: none; }
    .rv-wave-region {
      position: absolute; top: 0; bottom: 0;
      background: rgba(108,99,255,0.05);
      border-left: 1px solid rgba(108,99,255,0.25);
      border-right: 1px solid rgba(108,99,255,0.25);
      pointer-events: auto;
      cursor: pointer;
    }
    .rv-wave-region.approved { background: rgba(34,197,94,0.06); border-color: rgba(34,197,94,0.3); }
    .rv-wave-region.flagged { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.35); }
    .rv-wave-region.cur {
      background: rgba(108,99,255,0.18) !important;
      border-color: var(--accent) !important;
      box-shadow: inset 0 0 0 1px var(--accent);
    }
    .rv-wave-region-label {
      position: absolute; left: 2px; top: 2px;
      font-family: var(--font-mono); font-size: 9px; color: var(--text-dim);
      pointer-events: none;
    }
    .rv-wave-region.cur .rv-wave-region-label { color: var(--accent-2); font-weight: 700; }
    .rv-wave-playhead { position: absolute; top: 0; bottom: 14px; width: 1px; background: #fff; pointer-events: none; z-index: 2; }
    .rv-wave-playhead-dot {
      position: absolute; top: -3px; left: -4px;
      width: 9px; height: 9px; background: #fff;
      border-radius: 50%;
    }
    .rv-wave-ticks { position: absolute; left: 0; right: 0; bottom: 0; height: 14px; border-top: 1px solid var(--border); }
    .rv-wave-tick {
      position: absolute; top: 2px;
      font-family: var(--font-mono); font-size: 9px; color: var(--text-dim);
      transform: translateX(-50%);
    }

    /* ============================================================
       Variant B — Timeline Editor
       ============================================================ */
    .rv-b { display: grid; grid-template-columns: 340px 1fr; gap: 12px; padding: 12px 14px; width: 100%; min-height: 0; flex: 1; }
    @media (max-width: 1280px) { .rv-b { grid-template-columns: 280px 1fr; } .rv-fname { max-width: 220px; } .rv-kbd-hint { display: none; } }
    @media (max-width: 768px) {
      .rv-b { grid-template-columns: 1fr; padding: 8px; gap: 8px; overflow-y: auto; }
      .rv-body { overflow-y: auto; }
    }

    .rv-b-left { display: flex; flex-direction: column; gap: 12px; min-height: 0; min-width: 0; }
    .rv-b-right { display: flex; flex-direction: column; gap: 12px; min-height: 0; min-width: 0; }
    .rv-b-top-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex: 1; min-height: 0; }
    @media (max-width: 768px) { .rv-b-top-row { grid-template-columns: 1fr; } }
    .rv-b-video-col { display: flex; flex-direction: column; gap: 6px; min-height: 0; }

    .rv-b-video-wrap { flex-shrink: 1; min-height: 0; overflow: hidden; }
    /* Cap panels height so a large glossary scrolls inside instead of expanding
       the row and covering the video preview above. */
    .rv-b-vid-panels {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      flex-shrink: 0; min-height: 0;
      height: 220px; max-height: 40vh;
    }
    .rv-b-vid-panels > * { min-height: 0; }
    @media (max-width: 1024px) { .rv-b-vid-panels { grid-template-columns: 1fr; height: auto; max-height: 50vh; } }

    .rv-b-glossary {
      display: flex; flex-direction: column; min-height: 0; min-width: 0; overflow: hidden;
      background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
    }
    .rv-b-glossary-head {
      display: flex; align-items: center; gap: 6px; min-width: 0;
      padding: 7px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .rv-b-glossary-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); flex-shrink: 0; white-space: nowrap; }
    .rv-b-glossary-select { flex: 1; min-width: 0; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 11px; padding: 2px 4px; }
    .rv-b-glossary-body { flex: 1; min-height: 0; overflow-y: auto; }
    .rv-b-glossary-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .rv-b-glossary-table th { padding: 2px 6px; text-align: left; color: var(--text-dim); font-size: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); line-height: 1.3; }
    .rv-b-glossary-table td { padding: 1px 6px; color: var(--text); line-height: 1.3; }
    .rv-b-glossary-table tr:hover td { background: var(--surface-2); }
    .rv-b-glossary-table .btn-sm { padding: 1px 4px; font-size: 11px; min-height: 0; line-height: 1.2; gap: 2px; }
    .rv-b-glossary-table td:last-child { padding: 1px 2px; }
    .rv-b-glossary-table td:last-child .btn-sm + .btn-sm { margin-left: 2px; }
    .rv-b-glossary-input { width: 100%; background: var(--surface-2); border: 1px solid var(--accent); border-radius: 3px; color: var(--text); font-size: 11px; padding: 0 4px; box-sizing: border-box; line-height: 1.4; }

    .rv-b-subtitle-settings {
      display: flex; flex-direction: column; min-height: 0; min-width: 0; overflow: hidden;
      background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
    }
    .rv-b-ss-head { padding: 7px 10px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); flex-shrink: 0; white-space: nowrap; }
    .rv-b-ss-body { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
    .rv-b-ss-row { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .rv-b-ss-label { font-size: 11px; color: var(--text-mid); width: 52px; flex-shrink: 0; white-space: nowrap; }
    .rv-b-ss-input { background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 11px; padding: 2px 6px; min-width: 0; flex: 1; }
    .rv-b-ss-color { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; }
    .rv-b-ss-color input[type=color] { width: 24px; height: 24px; border: 1px solid var(--border); border-radius: 3px; padding: 1px; background: var(--surface-2); cursor: pointer; }
    .rv-b-ss-hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }

    /* Glossary Apply Modal */
    .ga-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 3000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .ga-overlay.open { opacity: 1; pointer-events: auto; }
    .ga-modal {
      background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
      width: 520px; max-height: 70vh; display: flex; flex-direction: column;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .ga-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; font-weight: 700; color: var(--text);
    }
    .ga-close {
      background: none; border: none; color: var(--text-dim); font-size: 18px;
      cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .ga-close:hover { color: var(--text); }
    .ga-body { flex: 1; overflow-y: auto; padding: 12px 18px; }
    .ga-section-head {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-mid);
      padding: 8px 12px 4px;
    }
    .ga-section-head:not(:first-child) { margin-top: 6px; border-top: 1px solid var(--border); }
    .ga-select-all { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
    .ga-select-all input[type="checkbox"] { margin: 0; }
    .ga-row.matched { opacity: 0.55; transition: opacity 0.15s ease; }
    .ga-row.matched:has(input:checked) { opacity: 1; }
    .ga-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 12px; color: var(--text);
    }
    .ga-row:last-child { border-bottom: none; }
    .ga-row input[type="checkbox"] { margin-top: 3px; flex-shrink: 0; }
    .ga-row-body { flex: 1; min-width: 0; }
    .ga-row-term { font-weight: 600; color: var(--accent); margin-bottom: 2px; }
    .ga-row-en {
      font-size: 11px; color: var(--text-mid);
      word-break: break-word; margin-bottom: 2px;
    }
    .ga-row-zh { color: var(--text-mid); font-size: 11px; word-break: break-word; }
    .hl-en {
      background: rgba(249, 226, 175, 0.35);
      color: #f9e2af;
      padding: 0 2px; border-radius: 2px; font-weight: 600;
    }
    .hl-zh {
      background: rgba(74, 222, 128, 0.20);
      color: #4ade80;
      padding: 0 2px; border-radius: 2px; font-weight: 600;
    }
    .ga-hint { font-size: 10px; margin-left: 8px; font-weight: normal; }
    .ga-hint.warn  { color: var(--text-mid); }
    .ga-hint.match { color: var(--success, #4ade80); }
    /* Match-row force-reapply: swap hint text via paired child spans */
    .ga-hint .ga-hint-override { display: none; }
    .ga-row.matched:has(input:checked) .ga-hint .ga-hint-default { display: none; }
    .ga-row.matched:has(input:checked) .ga-hint .ga-hint-override {
      display: inline; color: var(--accent, #f9e2af);
    }
    .ga-row-badge {
      font-size: 9px; padding: 1px 5px; border-radius: 3px;
      background: var(--surface-2); color: var(--text-dim); flex-shrink: 0;
    }
    .ga-footer {
      padding: 12px 18px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .ga-progress { padding: 24px 18px; text-align: center; color: var(--text-mid); font-size: 13px; }

    /* ============================================================
       Find & Replace bar
       ============================================================ */
    .find-bar {
      position: sticky; top: 0; z-index: 200;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 7px 14px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .find-bar[hidden] { display: none; }
    .find-bar-input {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-size: 12px;
      padding: 4px 8px; width: 160px;
    }
    .find-bar-input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
    .find-bar-sep { color: var(--border-strong); font-size: 11px; }
    .find-bar-count { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); min-width: 40px; }
    .find-bar-group { display: flex; align-items: center; gap: 4px; }
    mark.fb-match {
      background: rgba(108,99,255,0.3); color: var(--text);
      border-radius: 2px; padding: 0 1px;
    }
    mark.fb-match.fb-cur {
      background: rgba(245,158,11,0.5); color: #fff;
    }

    .rv-b-video {
      position: relative; background: #000;
      border: 1px solid var(--border); border-radius: 8px;
      aspect-ratio: 16/9; overflow: hidden;
    }
    .rv-b-video video { width: 100%; height: 100%; display: block; }
    .rv-b-video-placeholder {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1a1a2a, #0a0a14);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 13px;
    }
    /* SVG subtitle overlay — viewBox=PlayResX×PlayResY (1920×1080) so that
       every coordinate inside is one ASS pixel. paint-order:stroke fill +
       round joins reproduce libass FT_Stroker outline geometry, so the
       preview matches the burnt-in output as closely as possible. */
    .rv-b-video-sub {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    .rv-b-video-sub text {
      transition: opacity 0.15s ease;
    }
    .rv-b-video-controls {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      color: #fff;
      z-index: 3;
    }
    .rv-play {
      width: 32px; height: 32px; border-radius: 50%;
      background: #fff; color: #000;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 13px;
      flex-shrink: 0;
    }
    .rv-b-ts { font-family: var(--font-mono); font-size: 11.5px; min-width: 130px; }
    .rv-b-prog { flex: 1; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; cursor: pointer; }
    .rv-b-prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }

    .rv-b-rail {
      flex: 1; min-height: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .rv-b-rail-head {
      padding: 10px 14px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-mid);
      border-bottom: 1px solid var(--border);
    }
    .rv-b-rail-list { flex: 1; min-height: 0; overflow-y: auto; padding: 6px; }
    .rv-b-rail-item {
      display: grid;
      grid-template-columns: 24px 46px 1fr auto;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      align-items: center;
    }
    .rv-b-rail-item:hover { background: var(--surface-2); }
    .rv-b-rail-item.cur {
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px var(--accent-ring);
    }
    .rv-b-rail-item.ap { opacity: 0.6; }
    .rv-b-rail-num { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); font-weight: 700; text-align: right; }
    .rv-b-rail-ts { font-family: var(--font-mono); font-size: 11px; color: var(--accent-2); }
    .rv-b-rail-text { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rv-b-rail-item.cur .rv-b-rail-text { font-weight: 600; }
    .rv-b-rail-flags { display: flex; gap: 3px; }
    .rv-b-rail-flags .qa-flag { padding: 1px 5px; font-size: 9.5px; }
    .rv-b-rail-ok { color: var(--success); font-size: 11px; }
    .rv-b-rail-empty { padding: 30px 16px; text-align: center; color: var(--text-dim); font-size: 12px; }

    .rv-b-timeline-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
      padding: 12px; display: flex; flex-direction: column; gap: 10px;
      flex-shrink: 0;
    }
    .rv-b-timeline-head { display: flex; align-items: center; }
    .rv-b-tlh-l { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-mid); }
    .rv-b-tlh-l .k { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); }
    .rv-b-tlh-l .dot { color: var(--border-strong); }
    .rv-b-tlh-r { margin-left: auto; display: flex; gap: 4px; }
    .rv-b-wave-ctrl { display: flex; align-items: center; gap: 10px; border-top: 1px dashed var(--border); padding-top: 10px; flex-wrap: wrap; }
    .rv-b-wave-ctrl-l { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-mid); flex-wrap: wrap; }
    .rv-b-wave-ctrl-l .mono { font-family: var(--font-mono); color: var(--accent-2); }
    .rv-b-wave-ctrl-l .dot { color: var(--border-strong); }
    .rv-b-wave-ctrl-r { margin-left: auto; display: flex; gap: 4px; }

    .rv-b-detail {
      flex: 1; min-height: 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .rv-b-detail-head {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .rv-b-detail-num { font-family: var(--font-mono); font-weight: 700; font-size: 14px; color: var(--text); }
    .rv-b-detail-ts { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-mid); }
    .rv-b-detail-ts .mono { font-family: var(--font-mono); color: var(--accent-2); }
    .rv-b-detail-ts .dot { color: var(--border-strong); }
    .rv-b-detail-speaker { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-mid); }
    .rv-b-detail-body { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 18px; }
    .rv-b-detail-field { display: flex; flex-direction: column; gap: 7px; }
    .rv-b-detail-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-mid);
    }
    .rv-b-detail-label .dot { color: var(--border-strong); }
    .rv-b-detail-cps { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0; text-transform: none; font-weight: 500; }
    .rv-b-detail-cps b { color: var(--text); font-weight: 700; }
    .rv-b-detail-cps.over b { color: var(--warning); }
    .rv-b-detail-en {
      padding: 12px 14px;
      background: var(--surface-2);
      border-left: 2px solid var(--border-strong);
      border-radius: 0 6px 6px 0;
      font-size: 14px; line-height: 1.6; color: var(--text-mid);
    }
    .rv-b-detail-input {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 7px;
      padding: 12px 14px;
      font-family: inherit; font-size: 16px; line-height: 1.6;
      min-height: 60px; resize: vertical;
      width: 100%;
    }
    .rv-b-detail-input:focus { outline: 2px solid var(--accent-ring); border-color: var(--accent); }
    .rv-b-detail-input.dirty { border-color: var(--warning); }
    .rv-b-detail-stub {
      padding: 12px 14px;
      background: var(--surface-2);
      border: 1px dashed var(--border);
      border-radius: 6px;
      font-size: 12px; color: var(--text-dim);
      text-align: center;
      font-style: italic;
    }

    .rv-b-detail-footer {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .rv-b-empty {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 13px;
      padding: 20px;
      text-align: center;
    }

    /* Toast */
    .toast-stack {
      position: fixed; bottom: 18px; right: 18px;
      display: flex; flex-direction: column; gap: 8px; z-index: 4000; /* above modals (3000) */
    }
    .toast {
      padding: 10px 14px; background: var(--surface);
      border: 1px solid var(--border); border-left: 3px solid var(--info);
      border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      font-size: 13px; color: var(--text);
      min-width: 220px; max-width: 360px;
      animation: toastIn 0.2s ease;
    }
    .toast.success { border-left-color: var(--success); }
    .toast.warning { border-left-color: var(--warning); }
    .toast.error   { border-left-color: var(--danger); }
    @keyframes toastIn { from { transform: translateY(6px); opacity: 0; } to { transform: none; opacity: 1; } }

  </style>
</head>
<body>

<!-- Find & Replace bar -->
<div id="findBar" class="find-bar" hidden role="search" aria-label="尋找與取代工具列">

    </label>
    <label style="font-size:11px;color:var(--text-mid);display:flex;align-items:center;gap:4px;cursor:pointer;">
      <input type="radio" name="fbField" value="both"> 搜兩者
    </label>
  </div>
  <div class="find-bar-group">
    <button class="btn btn-secondary btn-sm" onclick="fbReplaceCurrent()">取代當前</button>
    <button class="btn btn-secondary btn-sm" onclick="fbReplaceAll()">全部取代</button>
    <button class="btn btn-ghost btn-sm" onclick="closeFindBar()" aria-label="關閉尋找工具列">關閉 ✕</button>
  </div>
</div>

<div class="bold">

  <!-- Persistent rail (mirrors Dashboard's). All non-active buttons return

  <aside class="b-rail">
    <div class="mark" title="MoTitle">M</div>
    <button class="rail-btn" title="主頁" onclick="backToDashboard()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8l6-5 6 5v6H2z M6 14V9h4v5"/></svg><span class="tt">主頁</span></button>
    <button class="rail-btn" title="檔案" onclick="backToDashboard()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M2 6h12M2 10h12M5 3v10M11 3v10"/></svg><span class="tt">檔案</span></button>
    <button class="rail-btn on" title="校對"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3-8 8H3v-3z"/></svg><span class="tt">校對</span></button>
    <button class="rail-btn" title="Pipeline" onclick="backToDashboard()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="5" width="4" height="6" rx="1"/><rect x="11" y="5" width="4" height="6" rx="1"/><circle cx="8" cy="2" r="1.5"/><circle cx="8" cy="14" r="1.5"/><path d="M5 8h6 M8 3.5v3 M8 9.5v3"/></svg><span class="tt">Pipeline</span></button>
    <a class="rail-btn" title="術語表" href="Glossary.html"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h4a3 3 0 013 3v8a2 2 0 00-2-2H3z M13 3H9a3 3 0 00-3 3v8a2 2 0 012-2h5z"/></svg><span class="tt">術語表</span></a>
    <button class="rail-btn" title="語言" onclick="backToDashboard()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2l6 3-6 3-6-3zM2 8l6 3 6-3M2 11l6 3 6-3"/></svg><span class="tt">語言</span></button>
    <div class="flex1"></div>
    <button class="rail-btn" title="服務狀態" onclick="backToDashboard()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6L13 13M3 13l1.4-1.4M11.6 4.4L13 3"/></svg></button>
  </aside>

  <!-- Review shell -->
  <div class="rv-shell">
    <div class="rv-header">
      <button class="rv-back" onclick="backToDashboard()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M7 4l-4 4 4 4"/></svg>
        <span>Dashboard</span>
      </button>
      <div class="rv-sep">/</div>
      <div class="rv-title">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="var(--accent-2)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3-8 8H3v-3z"/></svg>
        <span class="rv-mode">校對</span>
        <span class="rv-sep">/</span>
        <span class="rv-fname" id="rvFname">—</span>
      </div>
      <div class="rv-progress" title="已批核段數">
        <div class="rv-prog-track"><div class="rv-prog-fill" id="rvProgFill" style="width:0%"></div></div>
        <div class="rv-prog-num"><b id="rvProgDone">0</b>/<span id="rvProgTotal">0</span></div>
      </div>
      <div class="rv-kbd-hint">
        <span class="kbd">J</span><span class="kbd">K</span><span>導航</span>
        <span class="kbd">⌘↵</span><span>批核</span>
      </div>
      <div class="rv-header-source" style="display:inline-flex;gap:6px;align-items:center;margin-left:12px;font-size:11px;">
        <span style="color:var(--text-dim);">字幕來源</span>
        <select id="proofreadSourceMode" onchange="updateProofreadSubtitleSource(this)"
                aria-label="字幕來源"
                style="padding:2px 6px;background:var(--surface-2);border:1px solid var(--border);border-radius:4px;color:var(--text);">
          <option value="" id="proofreadSourceModeFollow">— 跟 Profile —</option>
          <option value="auto">Auto</option>
          <option value="en">EN 原文</option>
          <option value="zh">ZH 譯文</option>
          <option value="bilingual">雙語</option>
        </select>
        <select id="proofreadBilingualOrder" onchange="updateProofreadBilingualOrder(this)"
                aria-label="雙語字幕順序"
                style="display:none;min-width:120px;
                padding:2px 6px;background:var(--surface-2);border:1px solid var(--border);border-radius:4px;color:var(--text);">
          <option value="en_top">EN 上 / ZH 下</option>
          <option value="zh_top">ZH 上 / EN 下</option>
        </select>
      </div>
    </div>

    <div class="rv-body">
      <div class="rv-b">

        <!-- Left: segment rail only (full height) -->
        <div class="rv-b-left">
          <div class="rv-b-rail">
            <div class="rv-b-rail-head">
              段列表 · <span id="segCount">0</span> 段
            </div>
            <div class="rv-b-rail-list" id="segList">
              <div class="rv-b-rail-empty">載入中…</div>
            </div>
          </div>
        </div>

        <!-- Right: top row (video + detail) + timeline at bottom -->
        <div class="rv-b-right">
          <div class="rv-b-top-row">
            <div class="rv-b-video-col">
              <div class="rv-b-video-wrap">

                  <div class="rv-b-video-placeholder" id="videoPlaceholder">選擇檔案以預覽視頻</div>
                  <video id="videoPlayer" style="display:none;" controls></video>
                  <svg class="rv-b-video-sub" id="subtitleSvg" viewBox="0 0 1920 1080"
                       preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                    <text id="subtitleSvgText" text-anchor="middle"></text>
                  </svg>
                </div>
              </div>

              <div class="rv-b-vid-panels">
                <!-- 詞彙表對照 -->
                <div class="rv-b-glossary" id="glossaryPanel">

                    <span class="rv-b-glossary-title">詞彙表</span>
                    <select class="rv-b-glossary-select" id="glossarySelect" onchange="onGlossarySelect()" aria-label="選擇詞彙表">
                      <option value="">選擇詞彙表…</option>
                    </select>
                    <button class="btn btn-ghost btn-sm" id="glossaryApplyBtn" onclick="scanGlossary()" disabled>套用</button>
                    <button class="btn btn-ghost btn-sm" onclick="addGlossaryEntry()">+ 新增</button>
                    <button class="btn btn-ghost btn-sm" id="glossaryDeleteBtn" onclick="deleteCurrentGlossary()" title="刪除此詞彙表" disabled>🗑</button>
                  </div>
                  <div class="rv-b-glossary-body" id="glossaryBody">
                    <div class="rv-b-rail-empty">選擇詞彙表以查看條目</div>

                    <div class="rv-b-ss-row">

                      <input class="rv-b-ss-input" id="ssMarginBottom" type="number" min="0" max="200" oninput="onSubtitleSettingChange()" style="width:60px;" aria-label="字幕底部邊距 (px)">
                      <span style="font-size:11px;color:var(--text-dim);">px</span>

                  </div>
                </div>
              </div>
            </div>

            <div class="rv-b-detail" id="detailPanel">
              <div class="rv-b-empty" id="detailEmpty">選擇一段開始校對</div>
            </div>
          </div>

          <div class="rv-b-timeline-panel">
            <div class="rv-b-timeline-head">
              <div class="rv-b-tlh-l">

              <div class="rv-b-tlh-r">
              </div>
            </div>
            <div class="rv-wave" id="waveform" style="height:96px;">

            </div>
            <div class="rv-b-wave-ctrl">
              <div class="rv-b-wave-ctrl-l">
                <span>當前：段 #<span id="curId">—</span></span>
                <span class="dot">·</span>
                <span class="mono">In <span id="curIn">—</span></span>
                <span class="dot">·</span>
                <span class="mono">Out <span id="curOut">—</span></span>
                <span class="dot">·</span>
                <span><span id="curDur">—</span>s</span>
              </div>
              <div class="rv-b-wave-ctrl-r">
                <button class="btn btn-ghost btn-sm" onclick="nav(-1)" title="上一段 (J)" aria-label="上一段">◀</button>
                <button class="btn btn-ghost btn-sm" onclick="nav(1)" title="下一段 (K)" aria-label="下一段">▶</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // Config + state
  // ============================================================
  const API_BASE = 'http://127.0.0.1:5001';
  const urlParams = new URLSearchParams(location.search);
  const fileId = urlParams.get('file_id');

  let fileInfo = null;        // { id, original_name, duration, ... }
  let segs = [];              // enriched: { idx, id, en, zh, in, out, tsIn, tsOut, duration, cps, approved, edited, flags, ... }
  let cursorIdx = null;       // index into segs
  let totalMs = 0;            // video duration in ms
  let waveformPeaks = null;
  let glossaryId = null;          // selected glossary ID
  let glossaryEntries = [];       // current glossary entries
  let activeProfileId = null;     // for PATCH font settings
  let activeProfile = null;       // full profile so resolvers see font.subtitle_source / bilingual_order
  let ssDebounceTimer = null;     // subtitle settings save debounce

  // Font config mirrors active profile's `font` — read-only on this page;
  // user edits live on the Dashboard's 字幕設定 tab + 💾 儲存為預設.
  // Defaults match backend's DEFAULT_FONT_CONFIG so the overlay never goes
  // bare-CSS even before /api/profiles/active resolves.
  let fontConfig = {
    family: 'Noto Sans TC',
    size: 32,
    color: '#ffffff',
    outline_color: '#000000',
    outline_width: 2,
    margin_bottom: 40,
  };

  // ============================================================
  // Helpers
  // ============================================================
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Resolve segment text per subtitle source mode.
  // Mirrors backend backend/subtitle_text.py resolve_segment_text exactly.
  function pickSubtitleText(seg, mode = 'auto', order = 'en_top') {
    const en = (seg.en || seg._en_text || seg.text || '').trim();
    let zh = (seg.zh || seg.zh_text || '').trim();
    // Strip leading [long]/[review] QA markers (legacy registry data).
    zh = zh.replace(/^\s*(?:\[(?:NEEDS\s+REVIEW|long|review|LONG|REVIEW)\]\s*)+/, '').trim();
    if (mode === 'en') return en;
    if (mode === 'zh') return zh || en;
    if (mode === 'bilingual') {
      if (!en) return zh;
      if (!zh) return en;
      return order === 'en_top' ? `${en}\n${zh}` : `${zh}\n${en}`;
    }
    return zh || en;
  }

  // Resolve subtitle source from a file entry, falling back to the active profile.
  function resolveSubtitleSource(fileEntry, profile) {
    const v = (fileEntry || {}).subtitle_source;
    if (v === 'auto' || v === 'en' || v === 'zh' || v === 'bilingual') return v;
    const p = ((profile || {}).font || {}).subtitle_source;
    if (p === 'auto' || p === 'en' || p === 'zh' || p === 'bilingual') return p;
    return 'auto';
  }
  function resolveBilingualOrder(fileEntry, profile) {
    const v = (fileEntry || {}).bilingual_order;
    if (v === 'en_top' || v === 'zh_top') return v;
    const p = ((profile || {}).font || {}).bilingual_order;
    if (p === 'en_top' || p === 'zh_top') return p;
    return 'en_top';
  }

  // ============================================================
  // Subtitle source dropdown handlers
  // ============================================================
  function syncSourceDropdowns() {
    const srcSel = document.getElementById('proofreadSourceMode');
    const ordSel = document.getElementById('proofreadBilingualOrder');
    if (!srcSel) return;
    srcSel.value = (fileInfo && fileInfo.subtitle_source) ? fileInfo.subtitle_source : '';
    // Surface the effective profile-level mode in the placeholder so users see
    // what "follow Profile" actually resolves to (matches dashboard UX).
    const followOpt = document.getElementById('proofreadSourceModeFollow');
    if (followOpt) {
      const p = (activeProfile && activeProfile.font && activeProfile.font.subtitle_source) || 'auto';
      const label = ({auto:'Auto', en:'EN', zh:'ZH', bilingual:'雙語'})[p] || 'Auto';
      followOpt.textContent = `— 跟 Profile（${label}）—`;
    }
    if (ordSel) {
      ordSel.value = (fileInfo && fileInfo.bilingual_order) ? fileInfo.bilingual_order : 'en_top';
      ordSel.style.display = ((fileInfo && fileInfo.subtitle_source) === 'bilingual') ? '' : 'none';
    }
  }

  // Parse JSON safely; if backend returned HTML (e.g. 405 from an outdated
  // server), fall back to a meaningful error rather than choking on `<!doctype`.
  async function _parseJsonOrThrow(r, fallbackMsg) {
    const text = await r.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch (_) { /* not JSON */ }
    if (!r.ok) {
      const apiErr = data && data.error;
      if (apiErr) throw new Error(apiErr);
      if (r.status === 405) throw new Error('伺服器未支援呢個操作（請重啟後端 server）');
      throw new Error(`${fallbackMsg}（HTTP ${r.status}）`);
    }
    return data;
  }

  async function updateProofreadSubtitleSource(selectEl) {
    const value = selectEl.value || null;
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subtitle_source: value }),
      });
      fileInfo = await _parseJsonOrThrow(r, '更新失敗');
      const ordSel = document.getElementById('proofreadBilingualOrder');
      if (ordSel) ordSel.style.display = (value === 'bilingual') ? '' : 'none';
      refreshOverlay();
      showToast('已更新字幕來源', 'success');
    } catch (e) {
      showToast(`更新失敗: ${e.message}`, 'error');
    }
  }

  async function updateProofreadBilingualOrder(selectEl) {
    const value = selectEl.value;
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bilingual_order: value }),
      });
      fileInfo = await _parseJsonOrThrow(r, '更新失敗');
      refreshOverlay();
    } catch (e) {
      showToast(`更新失敗: ${e.message}`, 'error');
    }
  }

  function refreshOverlay() {
    if (typeof FontPreview === 'undefined') return;
    if (cursorIdx == null || !segs[cursorIdx]) {
      FontPreview.updateText('');
      return;
    }
    const s = segs[cursorIdx];
    const mode = resolveSubtitleSource(fileInfo, activeProfile);
    const order = resolveBilingualOrder(fileInfo, activeProfile);
    FontPreview.updateText(pickSubtitleText({ en: s.en, zh: s.zh }, mode, order));
  }

  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }
  function hasUppercase(s) { return /[A-Z]/.test(s || ''); }

  // XSS-safe term highlight. Returns an HTML string with every match of `term`
  // wrapped in <mark class="cssClass">. Surrounding text is HTML-escaped slice
  // by slice; the wrapped term is also escaped before insertion. Never escapes
  // a string that already contains <mark>.
  // - ASCII-only term  → alphanumeric-bounded match (mirrors backend)
  // - Non-ASCII term   → plain substring match
  // - opts.caseSensitive: false → 'gi'; true → 'g'
  function highlightTerm(text, term, cssClass, opts) {
    opts = opts || {};
    if (!term || text == null) return escapeHtml(text == null ? '' : text);
    const flags = opts.caseSensitive ? 'g' : 'gi';
    const isAscii = /^[\x00-\x7f]+$/.test(term);
    const pattern = isAscii
      ? new RegExp('(?<![A-Za-z0-9])' + escapeRegex(term) + '(?![A-Za-z0-9])', flags)
      : new RegExp(escapeRegex(term), flags);
    let out = '';
    let last = 0;
    let m;
    while ((m = pattern.exec(text)) !== null) {
      out += escapeHtml(text.slice(last, m.index));
      out += `<mark class="${cssClass}">${escapeHtml(m[0])}</mark>`;
      last = m.index + m[0].length;
      if (m.index === pattern.lastIndex) pattern.lastIndex++;  // zero-width guard
    }
    out += escapeHtml(text.slice(last));
    return out;
  }
  function fmtMs(ms) {
    if (!ms && ms !== 0) return '—:—';
    const s = ms / 1000;
    const m = Math.floor(s / 60);
    const sec = (s - m * 60).toFixed(2).padStart(5, '0');
    return `${String(m).padStart(2, '0')}:${sec}`;
  }
  function fmtSec(ms) {
    if (!ms && ms !== 0) return '—:—';
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    return `${String(m).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
  }
  function showToast(msg, kind = 'info') {
    const stack = document.getElementById('toastStack');
    const t = document.createElement('div');
    t.className = `toast ${kind}`;
    t.textContent = msg;
    stack.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function backToDashboard() {
    location.href = 'index.html';
  }

  // ============================================================
  // Subtitle styling is fully delegated to FontPreview (frontend/js/font-preview.js).
  // FontPreview draws into <svg id="subtitleSvg"> using viewBox=1920×1080 so every
  // coordinate is one ASS pixel — fontConfig.size / outline_width / margin_bottom
  // pass through unchanged and the rendered overlay matches the burnt-in libass
  // output. No JS scaling math, no ResizeObserver needed (SVG viewBox handles it).
  function applySubtitleStyle() {
    if (typeof FontPreview !== 'undefined') {
      FontPreview.applyFontConfig(fontConfig);
    }
  }

  async function loadFontConfig() {
    try {
      const r = await fetch(`${API_BASE}/api/profiles/active`);
      if (!r.ok) return;
      const data = await r.json();
      if (data.profile?.font) {
        fontConfig = { ...fontConfig, ...data.profile.font };
      }
    } catch (e) { /* keep defaults */ }
    applySubtitleStyle();
  }

  // ============================================================
  // Subtitle Settings Panel
  // ============================================================
  async function initSubtitleSettings() {
    try {
      const r = await fetch(`${API_BASE}/api/profiles/active`);
      if (!r.ok) return;
      const data = await r.json();
      activeProfileId = data.profile?.id || null;
      activeProfile = data.profile || null;
      const f = data.profile?.font || {};
      fontConfig = { ...fontConfig, ...f };
      document.getElementById('ssFamily').value = fontConfig.family;
      document.getElementById('ssSize').value = fontConfig.size;
      document.getElementById('ssColor').value = fontConfig.color;
      document.getElementById('ssColorHex').textContent = fontConfig.color;
      document.getElementById('ssOutlineColor').value = fontConfig.outline_color;
      document.getElementById('ssOutlineColorHex').textContent = fontConfig.outline_color;
      document.getElementById('ssOutlineWidth').value = fontConfig.outline_width;
      document.getElementById('ssMarginBottom').value = fontConfig.margin_bottom;
      applySubtitleStyle();
    } catch (e) { /* keep defaults */ }
  }

  function onColorInput(inputId, hexId) {
    document.getElementById(hexId).textContent = document.getElementById(inputId).value;
  }

  function onSubtitleSettingChange() {
    clearTimeout(ssDebounceTimer);
    ssDebounceTimer = setTimeout(saveSubtitleSettings, 500);
  }

  // Clamp a Number input to its [min, max] range — HTML min/max do not block
  // typed-in values, so we enforce them at save time.
  function _clampNumberInput(id, lo, hi, fallback) {
    const el = document.getElementById(id);
    let n = Number(el?.value);
    if (!Number.isFinite(n)) n = fallback;
    if (n < lo) n = lo;
    if (n > hi) n = hi;
    if (el) el.value = String(n);
    return n;
  }

  async function saveSubtitleSettings() {
    if (!activeProfileId) return;
    const font = {
      family: document.getElementById('ssFamily').value.trim(),
      size: _clampNumberInput('ssSize', 8, 120, 32),
      color: document.getElementById('ssColor').value,
      outline_color: document.getElementById('ssOutlineColor').value,
      outline_width: _clampNumberInput('ssOutlineWidth', 0, 10, 2),
      margin_bottom: _clampNumberInput('ssMarginBottom', 0, 200, 40),
    };
    try {
      const r = await fetch(`${API_BASE}/api/profiles/${activeProfileId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ font }),
      });
      if (!r.ok) throw new Error((await r.json()).error || '儲存失敗');
      fontConfig = { ...fontConfig, ...font };
      applySubtitleStyle();
    } catch (e) {
      showToast(`字幕設定儲存失敗: ${e.message}`, 'error');
    }
  }

  // ============================================================
  // Glossary Panel
  // ============================================================
  async function initGlossaryPanel() {
    try {
      const r = await fetch(`${API_BASE}/api/glossaries`);
      if (!r.ok) return;
      const data = await r.json();
      const sel = document.getElementById('glossarySelect');
      (data.glossaries || []).forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = g.name;
        sel.appendChild(opt);
      });

      // Auto-select the glossary configured in the active Profile (sync mode A:
      // load-time only — no listener for later profile_updated events).
      // Sequenced after options-populate so setting .value matches an existing option.
      try {
        const pr = await fetch(`${API_BASE}/api/profiles/active`);
        if (!pr.ok) return;
        const pd = await pr.json();
        const pipelineGlossaryId = pd.profile?.translation?.glossary_id;
        if (pipelineGlossaryId &&
            Array.from(sel.options).some(o => o.value === pipelineGlossaryId)) {
          sel.value = pipelineGlossaryId;
          await onGlossarySelect();
        }
      } catch (e) { /* keep dropdown at default */ }
    } catch (e) { /* silent — panel stays in placeholder state */ }
  }

  async function onGlossarySelect() {
    const sel = document.getElementById('glossarySelect');
    glossaryId = sel.value || null;
    document.getElementById('glossaryApplyBtn').disabled = !glossaryId;
    document.getElementById('glossaryDeleteBtn').disabled = !glossaryId;
    if (!glossaryId) {
      document.getElementById('glossaryBody').innerHTML = '<div class="rv-b-rail-empty">選擇詞彙表以查看條目</div>';
      glossaryEntries = [];
      return;
    }
    await loadGlossaryEntries(glossaryId);
  }

  async function deleteCurrentGlossary() {
    if (!glossaryId) { showToast('請先選擇詞彙表', 'error'); return; }
    const sel = document.getElementById('glossarySelect');
    const name = sel.options[sel.selectedIndex]?.text || glossaryId;
    if (!confirm(`確定刪除詞彙表「${name}」？此動作無法還原。`)) return;
    try {
      const r = await fetch(`${API_BASE}/api/glossaries/${glossaryId}`, { method: 'DELETE' });
      if (!r.ok) throw new Error((await r.json()).error || `HTTP ${r.status}`);
      showToast(`已刪除詞彙表「${name}」`, 'success');
      glossaryId = null;
      glossaryEntries = [];
      document.getElementById('glossaryBody').innerHTML = '<div class="rv-b-rail-empty">選擇詞彙表以查看條目</div>';
      document.getElementById('glossaryApplyBtn').disabled = true;
      document.getElementById('glossaryDeleteBtn').disabled = true;
      // Rebuild dropdown options (initGlossaryPanel appends; rebuild prevents duplicates)
      const sel = document.getElementById('glossarySelect');
      sel.innerHTML = '<option value="">選擇詞彙表…</option>';
      await initGlossaryPanel();
    } catch (e) {
      showToast(`刪除失敗：${e.message}`, 'error');
    }
  }

  async function loadGlossaryEntries(id) {
    try {
      const r = await fetch(`${API_BASE}/api/glossaries/${id}`);
      if (!r.ok) return;
      const data = await r.json();
      glossaryEntries = data.entries || [];
      renderGlossaryTable();
    } catch (e) {
      showToast(`詞彙表載入失敗: ${e.message}`, 'error');
    }
  }

  function renderGlossaryTable() {
    const body = document.getElementById('glossaryBody');
    if (!glossaryEntries.length) {
      body.innerHTML = '<div class="rv-b-rail-empty">暫無條目</div>';
      return;
    }
    const rows = glossaryEntries.map(e => `
      <tr id="grow-${e.id}">
        <td>${escapeHtml(e.en)}</td>
        <td>${escapeHtml(e.zh)}</td>
        <td style="text-align:center;white-space:nowrap;">
          <button class="btn btn-ghost btn-sm" onclick="startEditEntry('${e.id}')" title="編輯">✎</button>
          <button class="btn btn-ghost btn-sm" onclick="deleteGlossaryEntry('${e.id}')" title="刪除">🗑</button>
        </td>
      </tr>`).join('');
    body.innerHTML = `
      <table class="rv-b-glossary-table">
        <thead><tr><th>EN</th><th>ZH</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function startEditEntry(eid) {
    const entry = glossaryEntries.find(e => e.id === eid);
    if (!entry) return;
    const row = document.getElementById(`grow-${eid}`);
    if (!row) return;
    row.innerHTML = `
      <td><input class="rv-b-glossary-input" id="gedit-en-${eid}" value="${escapeHtml(entry.en)}"></td>
      <td><input class="rv-b-glossary-input" id="gedit-zh-${eid}" value="${escapeHtml(entry.zh)}"></td>
      <td style="text-align:center;white-space:nowrap;">
        <button class="btn btn-primary btn-sm" onclick="saveEditEntry('${eid}')" title="儲存到詞彙表 (Enter)">儲存</button>
        <button class="btn btn-ghost btn-sm" onclick="renderGlossaryTable()" title="取消 (Esc)">取消</button>
      </td>`;
    const enInput = document.getElementById(`gedit-en-${eid}`);
    const zhInput = document.getElementById(`gedit-zh-${eid}`);
    [enInput, zhInput].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveEditEntry(eid);
        else if (e.key === 'Escape') renderGlossaryTable();
      });
    });
    enInput.focus();
  }

  async function saveEditEntry(eid) {
    const enEl = document.getElementById(`gedit-en-${eid}`);
    const zhEl = document.getElementById(`gedit-zh-${eid}`);
    if (!enEl || !zhEl) return;
    const en = enEl.value.trim();
    const zh = zhEl.value.trim();
    if (!en || !zh) { showToast('EN 同 ZH 不能為空', 'error'); return; }
    try {
      const r = await fetch(`${API_BASE}/api/glossaries/${glossaryId}/entries/${eid}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ en, zh }),
      });
      if (!r.ok) throw new Error((await r.json()).error || '儲存失敗');
      const idx = glossaryEntries.findIndex(e => e.id === eid);
      if (idx >= 0) glossaryEntries = glossaryEntries.map((e, i) => i === idx ? { ...e, en, zh } : e);
      renderGlossaryTable();
      showToast('已儲存到詞彙表', 'success');
    } catch (e) {
      showToast(`儲存失敗: ${e.message}`, 'error');
      renderGlossaryTable();
    }
  }

  async function deleteGlossaryEntry(eid) {
    if (!glossaryId) return;
    const entry = glossaryEntries.find(e => e.id === eid);
    if (!entry) return;
    if (!confirm(`確定刪除「${entry.en} → ${entry.zh}」？`)) return;
    try {
      const r = await fetch(`${API_BASE}/api/glossaries/${glossaryId}/entries/${eid}`, { method: 'DELETE' });
      if (!r.ok) throw new Error((await r.json()).error || `HTTP ${r.status}`);
      glossaryEntries = glossaryEntries.filter(e => e.id !== eid);
      renderGlossaryTable();
    } catch (e) {
      showToast(`刪除失敗：${e.message}`, 'error');
    }
  }

  function addGlossaryEntry() {
    if (!glossaryId) { showToast('請先選擇詞彙表', 'error'); return; }
    const body = document.getElementById('glossaryBody');
    let tbl = body.querySelector('table tbody');
    if (!tbl) {
      body.innerHTML = `<table class="rv-b-glossary-table"><thead><tr><th>EN</th><th>ZH</th><th></th></tr></thead><tbody></tbody></table>`;
      tbl = body.querySelector('tbody');
    }
    if (document.getElementById('grow-new')) {
      document.getElementById('gnew-en').focus();
      return;
    }
    const newRow = document.createElement('tr');
    newRow.id = 'grow-new';
    newRow.innerHTML = `
      <td><input class="rv-b-glossary-input" id="gnew-en" placeholder="English"></td>
      <td><input class="rv-b-glossary-input" id="gnew-zh" placeholder="中文"></td>
      <td style="text-align:center;white-space:nowrap;">
        <button class="btn btn-primary btn-sm" onclick="saveNewEntry()" title="儲存到詞彙表 (Enter)">儲存</button>
        <button class="btn btn-ghost btn-sm" onclick="cancelNewEntry()" title="取消 (Esc)">取消</button>
      </td>`;
    tbl.appendChild(newRow);
    const enInput = document.getElementById('gnew-en');
    const zhInput = document.getElementById('gnew-zh');
    [enInput, zhInput].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveNewEntry();
        else if (e.key === 'Escape') cancelNewEntry();
      });
    });
    enInput.focus();
  }

  function cancelNewEntry() {
    const row = document.getElementById('grow-new');
    if (row) row.remove();
  }

  async function saveNewEntry() {
    const enEl = document.getElementById('gnew-en');
    const zhEl = document.getElementById('gnew-zh');
    if (!enEl || !zhEl) return;
    const en = enEl.value.trim();
    const zh = zhEl.value.trim();
    if (!en || !zh) { showToast('EN 同 ZH 不能為空', 'error'); return; }
    try {
      const r = await fetch(`${API_BASE}/api/glossaries/${glossaryId}/entries`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ en, zh }),
      });
      if (!r.ok) throw new Error((await r.json()).error || '新增失敗');
      await loadGlossaryEntries(glossaryId);
      showToast(`已加入詞彙表：${en} → ${zh}`, 'success');
    } catch (e) {
      showToast(`新增失敗: ${e.message}`, 'error');
    }
  }

  async function scanGlossary() {
    if (!glossaryId || !fileId) return;
    const btn = document.getElementById('glossaryApplyBtn');
    btn.disabled = true;
    btn.textContent = '掃描中…';
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/glossary-scan`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ glossary_id: glossaryId }),
      });
      if (!r.ok) throw new Error((await r.json()).error || '掃描失敗');
      const data = await r.json();
      const violations = data.violations || [];
      const matches = data.matches || [];
      const revertedCount = data.reverted_count || 0;
      if (revertedCount > 0) {
        showToast(`已自動回復 ${revertedCount} 段（詞彙表改動）`, 'info');
      }
      if (violations.length === 0 && matches.length === 0) {
        showToast('字幕中無詞彙表覆蓋嘅詞，請檢查 EN 文本或新增條目', 'info');
        return;
      }
      showGlossaryApplyModal(violations, matches);
    } catch (e) {
      showToast(`掃描失敗: ${e.message}`, 'error');
    } finally {
      btn.disabled = !glossaryId;
      btn.textContent = '套用';
    }
  }

  function showGlossaryApplyModal(violations, matches) {
    matches = matches || [];
    const body = document.getElementById('gaBody');
    const title = document.getElementById('gaTitle');
    const footer = document.getElementById('gaFooter');
    footer.style.display = '';
    title.textContent =
      `詞彙表套用 — ${violations.length} 處不符 · ${matches.length} 處已符合`;

    const renderRow = (row, i, isMatch) => {
      const checked = !isMatch && !row.approved ? 'checked' : '';
      const badge = row.approved ? '<span class="ga-row-badge">已批核</span>' : '';
      const enText = row.en_text || '';
      const zhText = row.zh_text || '';
      const enHtml = highlightTerm(enText, row.term_en, 'hl-en',
                                   { caseSensitive: hasUppercase(row.term_en) });
      const zhHasTarget = !!(row.term_zh && zhText.indexOf(row.term_zh) !== -1);
      const zhHtml = zhHasTarget
        ? highlightTerm(zhText, row.term_zh, 'hl-zh', { caseSensitive: true })
        : escapeHtml(zhText);
      const hint = zhHasTarget
        ? `<span class="ga-hint match"><span class="ga-hint-default">✓ 已含目標詞</span><span class="ga-hint-override">⚠ 強制重新套用</span></span>`
        : `<span class="ga-hint warn">⚠ LLM 將判斷修改位置</span>`;
      const rowClass = isMatch ? 'ga-row matched' : 'ga-row';
      const dataAttrs = isMatch ? `data-type="match" data-idx="${i}"` : `data-idx="${i}"`;
      return `<div class="${rowClass}">
        <input type="checkbox" ${checked} ${dataAttrs} onchange="updateApplyCount()">
        <div class="ga-row-body">
          <div class="ga-row-term">#${row.seg_idx + 1} &nbsp;"${escapeHtml(row.term_en)}" → ${escapeHtml(row.term_zh)} ${badge}</div>
          <div class="ga-row-en">EN: ${enHtml}</div>
          <div class="ga-row-zh">ZH: ${zhHtml}${hint}</div>
        </div>
      </div>`;
    };

    const violationRows = violations.map((v, i) => renderRow(v, i, false)).join('');
    const matchRows = matches.map((m, i) => renderRow(m, i, true)).join('');

    let html = '';
    if (violations.length > 0) {
      html += `<div class="ga-section-head ga-section-head-row">
        <label class="ga-select-all">
          <input type="checkbox" id="gaSelectAllViolations" onchange="toggleSelectAllViolations(this.checked)">
          <span>需要修正 (${violations.length}) — 全部選中</span>
        </label>
      </div>${violationRows}`;
    }
    if (matches.length > 0) {
      html += `<div class="ga-section-head">已符合 (${matches.length}) — 可剔選強制重新套用</div>${matchRows}`;
    }
    body.innerHTML = html;

    // Both violations and matches are submittable; matches are opt-in
    window._gaViolations = violations;
    window._gaMatches = matches;

    updateApplyCount();
    document.getElementById('gaOverlay').classList.add('open');
  }

  function updateApplyCount() {
    // Master "select all" excluded from row count
    const rowChecks = document.querySelectorAll(
      '#gaBody .ga-row input[type="checkbox"]'
    );
    const count = Array.from(rowChecks).filter(c => c.checked).length;
    const btn = document.getElementById('gaApplyBtn');
    btn.textContent = `套用選中 (${count})`;
    btn.disabled = count === 0;

    // Sync the master checkbox indeterminate / checked state for violations
    const master = document.getElementById('gaSelectAllViolations');
    if (master) {
      const violationChecks = document.querySelectorAll(
        '#gaBody .ga-row:not(.matched) input[type="checkbox"]'
      );
      const total = violationChecks.length;
      const checked = Array.from(violationChecks).filter(c => c.checked).length;
      master.checked = total > 0 && checked === total;
      master.indeterminate = checked > 0 && checked < total;
    }
  }

  function toggleSelectAllViolations(checked) {
    document.querySelectorAll('#gaBody .ga-row:not(.matched) input[type="checkbox"]').forEach(c => {
      c.checked = checked;
    });
    updateApplyCount();
  }

  async function applySelectedViolations() {
    const checks = document.querySelectorAll('#gaBody input[type="checkbox"]');
    const selected = [];
    checks.forEach(c => {
      if (!c.checked) return;
      const idx = parseInt(c.dataset.idx);
      const item = c.dataset.type === 'match'
        ? (window._gaMatches || [])[idx]
        : (window._gaViolations || [])[idx];
      if (item) {
        selected.push({ seg_idx: item.seg_idx, term_en: item.term_en, term_zh: item.term_zh });
      }
    });
    if (!selected.length) return;

    // Show progress
    const body = document.getElementById('gaBody');
    const footer = document.getElementById('gaFooter');
    body.innerHTML = `<div class="ga-progress">正在套用 ${selected.length} 處…</div>`;
    footer.style.display = 'none';

    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/glossary-apply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ glossary_id: glossaryId, violations: selected }),
      });
      if (!r.ok) throw new Error((await r.json()).error || '套用失敗');
      const data = await r.json();
      closeGlossaryApplyModal();

      if (data.failed_count > 0) {
        showToast(`已套用 ${data.applied_count} 處，${data.failed_count} 處失敗`, 'warning');
      } else {
        showToast(`已套用 ${data.applied_count} 處`, 'success');
      }

      // Refresh segments to reflect changes
      await loadSegments();
      if (cursorIdx !== null) {
        renderDetail();
      }
    } catch (e) {
      showToast(`套用失敗: ${e.message}`, 'error');
      // Restore modal for retry
      footer.style.display = '';
      body.innerHTML = '<div class="ga-progress">套用失敗，請重試</div>';
    }
  }

  function closeGlossaryApplyModal() {
    document.getElementById('gaOverlay').classList.remove('open');
    window._gaViolations = null;
  }

  // ============================================================
  // Load
  // ============================================================
  async function init() {
    // Wire the SVG subtitle overlay to active profile + Socket.IO updates so
    // changes from any tab propagate live and the preview matches burnt-in output.
    if (typeof FontPreview !== 'undefined') {
      FontPreview.init(null);
    }

    if (!fileId) {
      showToast('缺少 file_id 參數', 'error');
      document.getElementById('detailEmpty').textContent = '需要 file_id 參數 — 從 Dashboard 點「校對 →」';
      return;
    }

    try {
      // Kick panel inits in parallel — don't block main load
      initSubtitleSettings();
      initGlossaryPanel();

      // File metadata via /api/files (then filter)
      const fl = await fetch(`${API_BASE}/api/files`).then(r => r.json());
      fileInfo = (fl.files || []).find(f => f.id === fileId);
      if (!fileInfo) throw new Error('檔案不存在');
      document.getElementById('rvFname').textContent = fileInfo.original_name;
      document.getElementById('rvFname').title = fileInfo.original_name;
      syncSourceDropdowns();

      // Load segments + translations
      await loadSegments();

      // Load video
      const v = document.getElementById('videoPlayer');
      v.src = `${API_BASE}/api/files/${fileId}/media`;
      v.style.display = 'block';
      document.getElementById('videoPlaceholder').style.display = 'none';
      v.addEventListener('loadedmetadata', () => {
        if (!totalMs) totalMs = Math.round((v.duration || 0) * 1000);
        renderWaveformRegions();
        renderWaveformTicks();
      });
      v.addEventListener('timeupdate', onVideoTime);
      v.addEventListener('seeked', onVideoTime);

      // Waveform peaks
      loadWaveformPeaks();

      // Start cursor at first non-approved, fallback to 0
      const firstPending = segs.findIndex(s => !s.approved);
      setCursor(firstPending >= 0 ? firstPending : 0);

      // Check for ongoing render and show resume banner
      resumeOngoingRender();
    } catch (e) {
      showToast(`載入失敗: ${e.message}`, 'error');
    }
  }

  async function loadSegments() {
    const sResp = await fetch(`${API_BASE}/api/files/${fileId}/segments`).then(r => r.json());
    const rawSegs = sResp.segments || [];
    let translations = [];
    try {
      const tResp = await fetch(`${API_BASE}/api/files/${fileId}/translations`).then(r => r.json());
      translations = tResp.translations || [];
    } catch (e) {}

    segs = rawSegs.map((s, i) => {
      const t = translations[i] || {};
      // Backend now returns structured { zh_text (clean), flags: [...] }.
      // parseTranslationFlags() is kept as a safety net for any legacy
      // payload still carrying [LONG] / [NEEDS REVIEW] prefixes inline.
      const rawZh = t.zh_text || '';
      const { clean, flags: prefixFlags } = parseTranslationFlags(rawZh);
      const zh = clean;
      const apiFlags = Array.isArray(t.flags) ? t.flags : [];
      const inMs = Math.round(s.start * 1000);
      const outMs = Math.round(s.end * 1000);
      const durSec = (outMs - inMs) / 1000;
      const cps = durSec > 0 ? Math.round((zh.length / durSec) * 10) / 10 : 0;
      const flags = qaFlagsFromBackend(apiFlags, prefixFlags);
      if (cps > 12) flags.push({ type: 'cps', msg: `CPS ${cps}（上限 12）` });
      return {
        idx: i,
        id: i + 1,
        in: inMs,
        out: outMs,
        tsIn: fmtMs(inMs),
        tsOut: fmtMs(outMs),
        duration: durSec.toFixed(1),
        en: s.text || '',
        zh,
        cps,
        approved: t.status === 'approved' || t.approved === true,
        edited: t.edited === true,
        flags,
        speaker: t.speaker || null,
        candidates: [],   // stub — backend doesn't expose yet
        glossary: [],     // stub — backend doesn't expose yet
        asr: null,        // stub
        mt: null,         // stub
      };
    });

    // Overall duration fallback from last segment
    if (segs.length) {
      totalMs = Math.max(totalMs, segs[segs.length - 1].out + 2000);
    }

    renderSegList();
    renderProgress();
    renderWaveformRegions();
    renderWaveformTicks();
  }

  async function loadWaveformPeaks() {
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/waveform?bins=480`);
      if (!r.ok) return;
      const data = await r.json();
      waveformPeaks = data.peaks;
      if (data.duration && !totalMs) totalMs = Math.round(data.duration * 1000);
      renderWaveformBars();
    } catch (e) {}
  }

  // ============================================================
  // Rendering — segment rail list
  // ============================================================
  function _renderSegListBase() {
    document.getElementById('segCount').textContent = segs.length;
    const list = document.getElementById('segList');
    if (segs.length === 0) {
      list.innerHTML = '<div class="rv-b-rail-empty">未有段落</div>';
      return;
    }
    list.innerHTML = segs.map((s, i) => {
      const cur = i === cursorIdx ? 'cur' : '';
      const ap = s.approved ? 'ap' : '';
      const flagsHtml = s.flags.slice(0, 2).map(f => {
        const color = f.type === 'review' || f.type.startsWith('low-') || f.type === 'untranslated' ? 'rose' : 'amber';
        return `<span class="qa-flag qa-flag-${color}" title="${escapeHtml(f.msg || '')}">${flagLabel(f.type)}</span>`;
      }).join('');
      return `
        <div class="rv-b-rail-item ${cur} ${ap}" data-idx="${i}" onclick="setCursor(${i})">
          <div class="rv-b-rail-num">${s.id}</div>
          <div class="rv-b-rail-ts">${escapeHtml(s.tsIn)}</div>
          <div class="rv-b-rail-text">${escapeHtml(s.zh || '(未翻譯)')}</div>
          <div class="rv-b-rail-flags">
            ${flagsHtml}
            ${s.approved ? '<span class="rv-b-rail-ok">✓</span>' : ''}
          </div>
        </div>`;
    }).join('');
  }

  function flagLabel(type) {
    return ({
      'cps': 'CPS',
      'redundancy': '重複',
      'glossary': '詞彙',
      'number': '數字',
      'low-confidence-mt': 'MT低',
      'low-confidence-asr': 'ASR低',
      'untranslated': '未譯',
      'long': '過長',
      'review': '需覆檢',
    })[type] || type;
  }

  // Backend post-processor (backend/translation/post_processor.py) sets a
  // structured `flags` field on each translation. This helper parses any
  // legacy [LONG] / [NEEDS REVIEW] prefix that may still be inline in
  // zh_text from registry data written before the migration.
  const TRANSLATION_PREFIX_RE = /^\s*(\[LONG\]|\[NEEDS REVIEW\])\s*/;
  function parseTranslationFlags(zh) {
    const flags = [];
    const seen = new Set();
    let clean = zh || '';
    let m;
    while ((m = clean.match(TRANSLATION_PREFIX_RE))) {
      const tag = m[1];
      if (tag === '[LONG]' && !seen.has('long')) {
        flags.push({ type: 'long', msg: '中文長度超過 28 字（廣播單行上限）' });
        seen.add('long');
      } else if (tag === '[NEEDS REVIEW]' && !seen.has('review')) {
        flags.push({ type: 'review', msg: '翻譯品質有疑問，請覆檢' });
        seen.add('review');
      }
      clean = clean.slice(m[0].length);
    }
    return { clean, flags };
  }

  // Convert backend `flags` (array of strings like "long" / "review") into
  // the {type, msg} shape used by the renderer. Falls back to legacy prefix
  // parsing if the backend payload omits the field.
  const QA_FLAG_MESSAGES = {
    long: '中文長度超過 28 字（廣播單行上限）',
    review: '翻譯品質有疑問，請覆檢',
  };
  function qaFlagsFromBackend(apiFlags, prefixFlags) {
    if (apiFlags && apiFlags.length) {
      return apiFlags.map(type => ({ type, msg: QA_FLAG_MESSAGES[type] || '' }));
    }
    return [...prefixFlags];
  }

  function scrollSegIntoView(i) {
    const row = document.querySelector(`.rv-b-rail-item[data-idx="${i}"]`);
    if (!row) return;
    const scroll = document.getElementById('segList');
    const rBox = row.getBoundingClientRect();
    const sBox = scroll.getBoundingClientRect();
    const delta = rBox.top - sBox.top - 8;
    if (delta < 0 || delta > scroll.clientHeight - row.clientHeight - 40) {
      scroll.scrollTo({ top: Math.max(0, scroll.scrollTop + delta), behavior: 'smooth' });
    }
  }

  // ============================================================
  // Rendering — progress
  // ============================================================
  function renderProgress() {
    const done = segs.filter(s => s.approved).length;
    const total = segs.length;
    document.getElementById('rvProgDone').textContent = done;
    document.getElementById('rvProgTotal').textContent = total;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('rvProgFill').style.width = pct + '%';
  }

  // ============================================================
  // Rendering — detail panel

      el.innerHTML = '<div class="rv-b-empty" id="detailEmpty">選擇一段開始校對</div>';

    const s = segs[cursorIdx];

    const confStub = '<span class="conf-bar conf-stub"><span class="conf-track"><span class="conf-fill"></span></span><span class="conf-num">—</span></span>';

          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="var(--text-dim)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l2 2"/></svg>
          <span class="mono">${escapeHtml(s.tsIn)}</span>

          <span class="mono">${escapeHtml(s.tsOut)}</span>

        <div class="spacer"></div>
        ${s.flags.map(f => {
          const c = f.type === 'review' || f.type.startsWith('low-') || f.type === 'untranslated' ? 'rose' : 'amber';
          return `<div class="qa-flag qa-flag-${c}" title="${escapeHtml(f.msg || '')}">${flagLabel(f.type)}</div>`;
        }).join('')}
        ${s.approved ? '<span class="qa-flag" style="background:rgba(34,197,94,0.14);color:#4ade80;">✓ 已批核</span>' : ''}
      </div>

      <div class="rv-b-detail-body">

        <div class="rv-b-detail-field">
          <div class="rv-b-detail-label">
            <span>其他譯文候選</span>
