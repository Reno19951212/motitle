          </div>
          <div class="rv-b-detail-stub">— 尚未有候選翻譯 —</div>
        </div>

        <div class="rv-b-detail-field">
          <div class="rv-b-detail-label">
            <span>詞彙對照</span>
            <span class="dot">·</span>
            <span style="color:var(--text-dim); text-transform:none; letter-spacing:0; font-weight:500;">後端未實作</span>
          </div>
          <div class="rv-b-detail-stub">— 尚未有詞彙比對 —</div>
        </div>
      </div>

      <div class="rv-b-detail-footer">
        <button class="btn btn-ghost" onclick="nav(-1)" aria-label="上一段">
          ◀ 上一段 <span class="kbd">J</span>
        </button>
        <button class="btn btn-ghost" onclick="nav(1)" aria-label="下一段">
          下一段 ▶ <span class="kbd">K</span>
        </button>
        <div class="spacer"></div>
        ${s.approved ? `<button class="btn btn-ghost" style="color:var(--warning)" onclick="unapproveSegment(${s.idx})" aria-label="取消批核此段">取消批核</button>` : ''}
        <button class="btn btn-ghost" onclick="approveAll()">✓ 全批核</button>
        <button class="btn btn-primary" onclick="approveAndAdvance()" ${s.approved ? 'disabled' : ''}>
          ✓ 批核並前進 <span class="kbd">⌘↵</span>
        </button>
      </div>`;
    // Fresh DOM matches segment data — reset dirty flags so a stale flag
    // from a failed save on the previous segment doesn't accidentally
    // re-PATCH (and re-flip approval status of) the new segment.
    dirty = false;
    enDirty = false;
  }

  // ============================================================
  // Waveform rendering
  // ============================================================
  const WF_BINS = 480;
  function renderWaveformBars() {
    const el = document.getElementById('waveformBars');
    if (!waveformPeaks) {
      // Fallback: neutral bars
      el.innerHTML = Array.from({length: WF_BINS}).map((_, i) => {
        const h = 20 + Math.abs(Math.sin(i * 0.31)) * 40;
        return `<div class="rv-wave-bar" style="height:${h}%"></div>`;
      }).join('');
      return;
    }
    el.innerHTML = waveformPeaks.map((p) => {
      const h = Math.max(4, Math.round(p * 100));
      return `<div class="rv-wave-bar" style="height:${h}%"></div>`;
    }).join('');
    updateWavePlayedBars();
  }

  function updateWavePlayedBars() {
    const v = document.getElementById('videoPlayer');
    const dur = (v?.duration || 0) * 1000 || totalMs;
    if (!dur || !waveformPeaks) return;
    const ratio = Math.min(1, ((v?.currentTime || 0) * 1000) / dur);
    const playedN = Math.floor(ratio * waveformPeaks.length);
    const bars = document.getElementById('waveformBars').children;
    for (let i = 0; i < bars.length; i++) {
      bars[i].classList.toggle('played', i < playedN);
    }
  }

  function renderWaveformRegions() {
    const el = document.getElementById('waveformRegions');
    if (!el || !totalMs || segs.length === 0) { if (el) el.innerHTML = ''; return; }
    el.innerHTML = segs.map((s, i) => {
      const left = (s.in / totalMs) * 100;
      const width = ((s.out - s.in) / totalMs) * 100;
      const cur = i === cursorIdx ? 'cur' : '';
      const ap = s.approved ? 'approved' : '';
      const fl = s.flags.length > 0 ? 'flagged' : '';
      return `<div class="rv-wave-region ${cur} ${ap} ${fl}" data-idx="${i}"
                style="left:${left}%;width:${width}%;"
                onclick="setCursor(${i}, true)"
                title="#${s.id} · ${escapeHtml(s.tsIn)}">
                <span class="rv-wave-region-label">${s.id}</span>
              </div>`;
    }).join('');
  }

  function renderWaveformTicks() {
    const el = document.getElementById('waveformTicks');
    if (!el || !totalMs) return;
    const n = 6;
    el.innerHTML = Array.from({length: n}).map((_, i) => {
      const ms = (i / (n - 1)) * totalMs;
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const ss = s - m * 60;
      return `<div class="rv-wave-tick" style="left:${(i / (n - 1)) * 100}%;">${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}</div>`;
    }).join('');
  }

  // Click on waveform (empty area) → seek
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('waveform').addEventListener('click', (e) => {
      if (e.target.closest('.rv-wave-region')) return;  // region clicks handled via setCursor
      const rect = e.currentTarget.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      const v = document.getElementById('videoPlayer');
      if (v && v.duration) v.currentTime = Math.max(0, Math.min(v.duration, v.duration * ratio));
    });
  });

  // ============================================================
  // Cursor navigation
  // ============================================================
  function setCursor(i, alsoSeek) {
    if (i < 0 || i >= segs.length) return;
    cursorIdx = i;
    const s = segs[i];
    document.getElementById('curId').textContent = s.id;
    document.getElementById('curIn').textContent = s.tsIn;
    document.getElementById('curOut').textContent = s.tsOut;
    document.getElementById('curDur').textContent = s.duration;
    renderDetail();
    renderSegList();
    renderWaveformRegions();
    scrollSegIntoView(i);
    if (alsoSeek) {
      const v = document.getElementById('videoPlayer');
      if (v && v.readyState > 0) v.currentTime = s.in / 1000;
    }
  }

  function nav(dir) {
    if (cursorIdx == null) { setCursor(0); return; }
    const next = cursorIdx + dir;
    if (next >= 0 && next < segs.length) {
      setCursor(next, true);
    }
  }

  // ============================================================
  // Edit + approve
  // ============================================================
  // Two parallel dirty flags — EN (original transcript) and ZH (translation)
  // are saved to different endpoints (/segments/<idx> vs /translations/<idx>).
  let dirty = false;     // ZH translation dirty
  let enDirty = false;   // EN transcript dirty
  function onZhInput() {
    const ta = document.getElementById('zhInput');
    if (!ta) return;
    const s = segs[cursorIdx];
    if (!s) return;
    if (ta.value !== s.zh) { ta.classList.add('dirty'); dirty = true; }
    else { ta.classList.remove('dirty'); dirty = false; }
    // Live-update CPS label without full re-render
    const durSec = (s.out - s.in) / 1000;
    const cps = durSec > 0 ? Math.round((ta.value.length / durSec) * 10) / 10 : 0;
    const cpsEl = document.querySelector('.rv-b-detail-cps b');
    if (cpsEl) {
      cpsEl.textContent = cps;
      cpsEl.parentElement.classList.toggle('over', cps > 12);
    }
  }

  function onEnInput() {
    const ta = document.getElementById('enInput');
    if (!ta) return;
    const s = segs[cursorIdx];
    if (!s) return;
    if (ta.value !== s.en) { ta.classList.add('dirty'); enDirty = true; }
    else { ta.classList.remove('dirty'); enDirty = false; }
  }

  function onZhKey(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      approveAndAdvance();
    }
  }

  async function saveEditIfDirty() {
    const ta = document.getElementById('zhInput');
    if (!ta || !dirty) return true;
    const s = segs[cursorIdx];
    if (!s) return true;
    const newText = ta.value.trim();
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${s.idx}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ zh_text: newText }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      s.zh = newText;
      s.edited = true;
      // Recompute CPS + flags
      const dur = (s.out - s.in) / 1000;
      s.cps = dur > 0 ? Math.round((newText.length / dur) * 10) / 10 : 0;
      s.flags = s.flags.filter(f => f.type !== 'cps');
      if (s.cps > 12) s.flags.push({ type: 'cps', msg: `CPS ${s.cps}` });
      dirty = false;
      ta.classList.remove('dirty');
      return true;
    } catch (e) {
      showToast(`儲存失敗: ${e.message}`, 'error');
      return false;
    }
  }

  async function saveEnIfDirty() {
    const ta = document.getElementById('enInput');
    if (!ta || !enDirty) return true;
    const s = segs[cursorIdx];
    if (!s) return true;
    const newText = ta.value.trim();
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/segments/${s.idx}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: newText }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      s.en = newText;
      enDirty = false;
      ta.classList.remove('dirty');
      return true;
    } catch (e) {
      showToast(`儲存原文失敗: ${e.message}`, 'error');
      return false;
    }
  }

  async function approveAndAdvance() {
    const s = segs[cursorIdx];
    if (!s) return;
    // Save EN + ZH edits first if dirty (defensive — onblur usually fires
    // before keyboard shortcut, but Cmd+Enter inside a textarea bypasses blur).
    const enSaved = await saveEnIfDirty();
    const zhSaved = await saveEditIfDirty();
    if (!enSaved || !zhSaved) return;
    if (!s.approved) {
      try {
        const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${s.idx}/approve`, { method: 'POST' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        s.approved = true;
      } catch (e) {
        showToast(`批核失敗: ${e.message}`, 'error');
        return;
      }
    }
    renderProgress();
    renderSegList();
    renderWaveformRegions();
    // Advance to next non-approved
    let next = cursorIdx + 1;
    while (next < segs.length && segs[next].approved) next++;
    if (next < segs.length) {
      setCursor(next, true);
    } else {
      renderDetail();
      showToast('所有段落已批核 🎉', 'success');
    }
  }

  async function approveAll() {
    if (!confirm('批核所有未批核嘅段落？')) return;
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/approve-all`, { method: 'POST' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      segs.forEach(s => s.approved = true);
      renderProgress();
      renderSegList();
      renderDetail();
      renderWaveformRegions();
      showToast('全部已批核', 'success');
    } catch (e) {
      showToast(`批核失敗: ${e.message}`, 'error');
    }
  }

  // ============================================================
  // Video sync
  // ============================================================
  function onVideoTime() {
    const v = document.getElementById('videoPlayer');
    if (!v) return;
    const tMs = v.currentTime * 1000;
    // Playhead
    if (totalMs > 0) {
      const ratio = Math.min(1, tMs / totalMs);
      const ph = document.getElementById('waveformPlayhead');
      ph.style.display = 'block';
      ph.style.left = (ratio * 100) + '%';
    }
    updateWavePlayedBars();

    // Which segment covers the current time?
    const active = segs.findIndex(s => tMs >= s.in && tMs < s.out);

    // Video subtitle overlay — text rendered into FontPreview's SVG.
    if (typeof FontPreview !== 'undefined') {
      if (active >= 0) {
        const s = segs[active];
        const mode = resolveSubtitleSource(fileInfo, activeProfile);
        const order = resolveBilingualOrder(fileInfo, activeProfile);
        FontPreview.updateText(pickSubtitleText({ en: s.en, zh: s.zh }, mode, order));
      } else {
        FontPreview.updateText('');
      }
    }

    // Auto-follow cursor while playing: advance segment rail + timeline region +
    // detail panel to whichever segment contains the current playback time.
    // Skip when the user is editing the ZH textarea so we don't yank focus / lose
    // unsaved changes mid-edit.
    if (active >= 0 && active !== cursorIdx) {
      const editingZh = document.activeElement && document.activeElement.id === 'zhInput';
      if (!editingZh) {
        setCursor(active, false);  // false = don't re-seek video (we're already here)
      }
    }
  }

  // ============================================================
  // Unapprove
  // ============================================================
  async function unapproveSegment(idx) {
    const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${idx}/unapprove`, { method: 'POST' });
    if (!r.ok) { showToast('取消批核失敗', 'error'); return; }
    if (segs[idx]) segs[idx].approved = false;
    renderProgress();
    renderSegList();
    renderWaveformRegions();
    renderDetail();
    showToast('已取消批核', 'success');
  }

  // ============================================================
  // Render-resume on reload
  // ============================================================
  async function resumeOngoingRender() {
    if (!fileId) return;
    try {
      const r = await fetch(`${API_BASE}/api/renders/in-progress?file_id=${fileId}`);
      if (!r.ok) return;
      const data = await r.json();
      const job = (data.jobs || [])[0];
      if (!job) return;
      const banner = document.createElement('div');
      banner.id = 'renderResumeBanner';
      banner.style.cssText = 'position:fixed;top:8px;right:8px;background:#ff9800;color:#000;padding:8px 12px;border-radius:4px;font-size:12px;z-index:5000;';
      banner.innerHTML = `🎬 渲染進行中 (${job.format || job.render_id}) <button onclick="cancelRender('${job.render_id}', this.parentElement)" style="margin-left:8px;background:#0004;border:none;border-radius:3px;padding:2px 8px;cursor:pointer;font-size:11px;">取消</button>`;
      document.body.appendChild(banner);
    } catch (_) {}
  }

  async function cancelRender(renderId, bannerEl) {
    try {
      const r = await fetch(`${API_BASE}/api/renders/${renderId}`, { method: 'DELETE' });
      if (r.ok) {
        showToast('已取消渲染', 'success');
        bannerEl?.remove();
      } else {
        showToast('取消渲染失敗', 'error');
      }
    } catch (_) {
      showToast('取消渲染失敗', 'error');
    }
  }

  // ============================================================
  // Find & Replace
  // ============================================================
  let fbMatches = [];    // [{idx, field}]
  let fbCurMatch = -1;

  function openFindBar() {
    const bar = document.getElementById('findBar');
    bar.hidden = false;
    document.getElementById('fbFind').focus();
    document.getElementById('fbFind').select();
    fbSearch();
  }

  function closeFindBar() {
    document.getElementById('findBar').hidden = true;
    fbMatches = [];
    fbCurMatch = -1;
    document.getElementById('fbCount').textContent = '—';
    // Re-render to remove highlights
    renderSegList();
  }

  function fbGetField() {
    const radios = document.querySelectorAll('input[name="fbField"]');
    for (const r of radios) { if (r.checked) return r.value; }
    return 'zh';
  }

  function fbSearch() {
    const query = (document.getElementById('fbFind').value || '').trim();
    const onlyPending = document.getElementById('fbOnlyPending').checked;
    const field = fbGetField();
    fbMatches = [];
    if (!query) {
      fbCurMatch = -1;
      document.getElementById('fbCount').textContent = '—';
      renderSegList();
      return;
    }
    const lq = query.toLowerCase();
    segs.forEach((s, i) => {
      if (onlyPending && s.approved) return;
      const searchZh = field === 'zh' || field === 'both';
      const searchEn = field === 'en' || field === 'both';
      if (searchZh && (s.zh || '').toLowerCase().includes(lq)) {
        fbMatches.push({ idx: i, field: 'zh' });
      } else if (searchEn && (s.en || '').toLowerCase().includes(lq)) {
        fbMatches.push({ idx: i, field: 'en' });
      }
    });
    if (fbCurMatch >= fbMatches.length) fbCurMatch = fbMatches.length - 1;
    if (fbCurMatch < 0 && fbMatches.length > 0) fbCurMatch = 0;
    document.getElementById('fbCount').textContent =
      fbMatches.length > 0 ? `${fbCurMatch + 1}/${fbMatches.length}` : '0 個';
    renderSegList();
    if (fbMatches.length > 0) {
      const m = fbMatches[fbCurMatch];
      if (m) {
        setCursor(m.idx, false);
        scrollSegIntoView(m.idx);
      }
    }
  }

  function fbNav(dir) {
    if (!fbMatches.length) return;
    fbCurMatch = (fbCurMatch + dir + fbMatches.length) % fbMatches.length;
    document.getElementById('fbCount').textContent = `${fbCurMatch + 1}/${fbMatches.length}`;
    const m = fbMatches[fbCurMatch];
    if (m) {
      setCursor(m.idx, false);
      scrollSegIntoView(m.idx);
    }
    renderSegList();
  }

  async function fbReplaceCurrent() {
    if (!fbMatches.length || fbCurMatch < 0) return;
    const m = fbMatches[fbCurMatch];
    if (!m) return;
    if (m.field !== 'zh') { showToast('取代僅支援 ZH 欄位', 'warning'); return; }
    const query = document.getElementById('fbFind').value;
    const replacement = document.getElementById('fbReplace').value;
    const s = segs[m.idx];
    if (!s) return;
    const newZh = (s.zh || '').replaceAll(query, replacement);
    if (newZh === s.zh) return;
    try {
      const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${s.idx}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ zh_text: newZh }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      segs = segs.map((seg, i) => i === s.idx ? { ...seg, zh: newZh, approved: true, edited: true } : seg);
      fbSearch();
      showToast('已取代', 'success');
    } catch (e) {
      showToast(`取代失敗: ${e.message}`, 'error');
    }
  }

  async function fbReplaceAll() {
    if (!fbMatches.length) return;
    const query = document.getElementById('fbFind').value;
    const replacement = document.getElementById('fbReplace').value;
    const zhMatches = fbMatches.filter(m => m.field === 'zh');
    if (!zhMatches.length) { showToast('無可取代的 ZH 匹配', 'warning'); return; }
    let count = 0;
    for (const m of zhMatches) {
      const s = segs[m.idx];
      if (!s) continue;
      const newZh = (s.zh || '').replaceAll(query, replacement);
      if (newZh === s.zh) continue;
      try {
        const r = await fetch(`${API_BASE}/api/files/${fileId}/translations/${s.idx}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ zh_text: newZh }),
        });
        if (!r.ok) continue;
        segs = segs.map((seg, i) => i === s.idx ? { ...seg, zh: newZh, approved: true, edited: true } : seg);
        count++;
      } catch (_) {}
    }
    showToast(`已取代 ${count} 處`, 'success');
    fbSearch();
  }

  // renderSegList — wraps _renderSegListBase to add find-bar match highlights
  function renderSegList() {
    _renderSegListBase();
    const query = (document.getElementById('fbFind')?.value || '').trim();
    if (!query || document.getElementById('findBar')?.hidden) return;
    // Add highlight marks to matched rail items
    fbMatches.forEach((m, mi) => {
      const row = document.querySelector(`.rv-b-rail-item[data-idx="${m.idx}"]`);
      if (!row) return;
      const textEl = row.querySelector('.rv-b-rail-text');
      if (!textEl) return;
      const isCur = mi === fbCurMatch;
      const s = segs[m.idx];
      if (!s) return;
      const raw = m.field === 'zh' ? (s.zh || '(未翻譯)') : (s.en || '');
      const cls = isCur ? 'fb-match fb-cur' : 'fb-match';
      const lq = query.toLowerCase();
      let out = '';
      let last = 0;
      let idx = raw.toLowerCase().indexOf(lq, last);
      while (idx !== -1) {
        out += escapeHtml(raw.slice(last, idx));
        out += `<mark class="${cls}">${escapeHtml(raw.slice(idx, idx + query.length))}</mark>`;
        last = idx + query.length;
        idx = raw.toLowerCase().indexOf(lq, last);
      }
      out += escapeHtml(raw.slice(last));
      textEl.innerHTML = out;
    });
  }

  // ============================================================
  // Keyboard navigation
  // ============================================================
  document.addEventListener('keydown', (e) => {
    const tag = e.target.tagName;
    const inInput = tag === 'TEXTAREA' || tag === 'INPUT';

    // Cmd+F / Ctrl+F → open find bar (intercept even in inputs)
    if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
      e.preventDefault();
      openFindBar();
      return;
    }
    // Escape → close find bar first; if not open, let the GA modal listener handle it
    if (e.key === 'Escape') {
      const bar = document.getElementById('findBar');
      if (!bar.hidden) { closeFindBar(); e.preventDefault(); return; }
    }
    // Cmd+F / Ctrl+F handled above — skip everything else
    // Enter / Shift+Enter in find input → navigate
    if (inInput && e.target.id === 'fbFind') {
      if (e.key === 'Enter') {
        e.preventDefault();
        fbNav(e.shiftKey ? -1 : 1);
        return;
      }
    }

    // Cmd+Enter works even in textarea (handled by onZhKey) — skip here
    if (inInput) return;
    if (e.key === 'j' || e.key === 'J') { e.preventDefault(); nav(-1); }
    else if (e.key === 'k' || e.key === 'K') { e.preventDefault(); nav(1); }
    else if (e.key === ' ') {
      e.preventDefault();
      const v = document.getElementById('videoPlayer');
      if (v) { v.paused ? v.play() : v.pause(); }
    }
    else if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      approveAndAdvance();
    }
  });

  // ============================================================
  // Init
  // ============================================================
  init();

  // Esc closes the open Glossary Apply modal — keyboard accessibility.
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (e.target && e.target.tagName === 'TEXTAREA') return;
    const ga = document.getElementById('gaOverlay');
    if (ga?.classList.contains('open')) {
      ga.classList.remove('open');
      e.preventDefault();
    }
  });
</script>

<!-- Glossary Apply Modal -->
<div class="ga-overlay" id="gaOverlay">
  <div class="ga-modal">
    <div class="ga-header">
      <span id="gaTitle">詞彙表套用</span>
      <button class="ga-close" onclick="closeGlossaryApplyModal()" aria-label="關閉詞彙表套用">&times;</button>
    </div>
    <div class="ga-body" id="gaBody"></div>
    <div class="ga-footer" id="gaFooter">
      <button class="btn btn-ghost" onclick="closeGlossaryApplyModal()">取消</button>
      <button class="btn btn-primary" id="gaApplyBtn" onclick="applySelectedViolations()">套用選中 (0)</button>
    </div>
  </div>
</div>

</body>
